const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const hoy = () => new Date().toISOString().slice(0, 10);
const fmtFecha = (d) => { try { return new Date(d + "T00:00:00").toLocaleDateString("es-PE", { weekday:"short", day:"2-digit", month:"short" }); } catch { return d; } };
const semColor = (n) => n === "Rojo" ? "var(--rojo)" : n === "Ámbar" ? "var(--ambar)" : "var(--verde)";
const sevColor = (s) => s === "Alta" ? "var(--rojo)" : s === "Media" ? "var(--ambar)" : "var(--ink2)";
const diasPara = (d) => { if (!d) return null; const ms = new Date(d + "T00:00:00") - new Date(hoy() + "T00:00:00"); return Math.round(ms / 86400000); };
const addDays = (iso, n) => { const d = new Date(iso + "T00:00:00"); d.setDate(d.getDate() + n); return d.toISOString().slice(0, 10); };
const mailtoHref = (to, subj, body) => `mailto:${to || ""}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
const whatsappHref = (msg, tel) => tel ? `https://wa.me/${(tel||"").replace(/[^0-9]/g,"")}?text=${encodeURIComponent(msg)}` : `https://wa.me/?text=${encodeURIComponent(msg)}`;

function compressImage(file, maxDim = 1200, q = 0.6) {
  return new Promise((res) => { const r = new FileReader(); r.onload = (e) => { const img = new Image(); img.onload = () => { let { width: w, height: h } = img; if (w > h && w > maxDim) { h = h * maxDim / w; w = maxDim; } else if (h > maxDim) { w = w * maxDim / h; h = maxDim; } const c = document.createElement("canvas"); c.width = w; c.height = h; c.getContext("2d").drawImage(img, 0, 0, w, h); res(c.toDataURL("image/jpeg", q)); }; img.onerror = () => res(null); img.src = e.target.result; }; r.onerror = () => res(null); r.readAsDataURL(file); });
}
function fileToDataURL(file) { return new Promise((res) => { const r = new FileReader(); r.onload = (e) => res(e.target.result); r.onerror = () => res(null); r.readAsDataURL(file); }); }
async function shareOrCopy(text) {
  try { if (navigator.share) { await navigator.share({ text }); return "ok"; } } catch {}
  try { await navigator.clipboard.writeText(text); return "copy"; } catch {}
  return "manual";
}

const PFX = "gld:";
/* Store híbrido: localStorage como caché + Supabase como backend opcional para sync.
   Si Supabase no está configurado, funciona 100% local (sin cambios).
   Si está configurado: lecturas desde caché (rápido); escrituras se replican a Supabase async (background).
   Sync: pullAll() al iniciar la app + cada 30s + botón manual en Ajustes. */
const store = {
  _sb: null,       // { url, key } cuando hay Supabase configurado
  _sbStatus: "local",  // "local" | "syncing" | "online" | "error"
  _lastSync: 0,
  _listeners: new Set(),
  setSupabase(url, key) {
    if (url && key && url.startsWith("http")) {
      this._sb = { url: url.replace(/\/$/, ""), key };
      this._sbStatus = "syncing";
    } else {
      this._sb = null;
      this._sbStatus = "local";
    }
    this._notify();
  },
  onStatus(fn) { this._listeners.add(fn); return () => this._listeners.delete(fn); },
  _notify() { this._listeners.forEach(fn => { try { fn(this._sbStatus, this._lastSync); } catch {} }); },
  getStatus() { return { status: this._sbStatus, lastSync: this._lastSync, configured: !!this._sb }; },

  _localGet(k) { try { const v = localStorage.getItem(PFX+k); return v==null ? null : JSON.parse(v); } catch { return null; } },
  _localSet(k, v) { try { localStorage.setItem(PFX+k, JSON.stringify(v)); return true; } catch (e) { console.error(e); return false; } },
  _localDel(k) { try { localStorage.removeItem(PFX+k); } catch {} },
  _localList(prefix="") { const out = []; for (let i=0; i<localStorage.length; i++) { const k = localStorage.key(i); if (k && k.startsWith(PFX+prefix)) out.push(k.slice(PFX.length)); } return out; },

  async _sbReq(path, opts={}) {
    if (!this._sb) return null;
    const headers = { apikey: this._sb.key, Authorization: `Bearer ${this._sb.key}`, "Content-Type":"application/json", ...(opts.headers || {}) };
    return fetch(`${this._sb.url}/rest/v1${path}`, { ...opts, headers });
  },
  async _sbGet(k) {
    try {
      const r = await this._sbReq(`/kv?key=eq.${encodeURIComponent(k)}&select=value`);
      if (!r || !r.ok) return undefined;
      const data = await r.json();
      return data[0]?.value;
    } catch { return undefined; }
  },
  async _sbSet(k, v) {
    try {
      const r = await this._sbReq(`/kv?on_conflict=key`, {
        method:"POST",
        headers:{ Prefer:"resolution=merge-duplicates,return=minimal" },
        body: JSON.stringify({ key:k, value:v, updated_at: new Date().toISOString() })
      });
      return r && r.ok;
    } catch { return false; }
  },
  async _sbDel(k) {
    try {
      const r = await this._sbReq(`/kv?key=eq.${encodeURIComponent(k)}`, { method:"DELETE" });
      return r && r.ok;
    } catch { return false; }
  },
  async _sbList() {
    try {
      const r = await this._sbReq(`/kv?select=key`);
      if (!r || !r.ok) return null;
      const data = await r.json();
      return data.map(x => x.key);
    } catch { return null; }
  },

  async get(k, def=null) {
    const v = this._localGet(k);
    return v == null ? def : v;
  },
  _setCounter: 0,
  async set(k, v) {
    if (!this._localSet(k, v)) { alert("Sin espacio en el navegador. Exportá respaldo y limpiá fotos viejas."); return false; }
    // Snapshot cada 10 escrituras (no en cada una para no llenar localStorage)
    this._setCounter = (this._setCounter || 0) + 1;
    if (this._setCounter % 10 === 0) this._snapshot("auto-set");
    if (this._sb) {
      this._sbSet(k, v).then(ok => {
        if (ok) { this._lastSync = Date.now(); this._sbStatus = "online"; }
        else { this._sbStatus = "error"; }
        this._notify();
      });
    }
    return true;
  },
  async del(k) {
    this._localDel(k);
    if (this._sb) this._sbDel(k).catch(() => {});
  },
  async list(prefix="") { return this._localList(prefix); },

  async testConnection() {
    if (!this._sb) return { ok:false, msg:"Supabase no configurado" };
    try {
      const r = await this._sbReq(`/kv?select=key&limit=1`);
      if (r && r.ok) { this._sbStatus = "online"; this._notify(); return { ok:true, msg:"Conexión OK" }; }
      const err = r ? await r.text() : "Sin respuesta";
      this._sbStatus = "error"; this._notify();
      return { ok:false, msg: `Error ${r?.status}: ${err.slice(0, 200)}` };
    } catch (e) { this._sbStatus = "error"; this._notify(); return { ok:false, msg: e.message }; }
  },
  // === SAFETY: detecta si un valor remoto está "vacío" (no debe sobreescribir local con datos) ===
  _esVacio(v) {
    if (v == null) return true;
    if (Array.isArray(v) && v.length === 0) return true;
    if (typeof v === "object" && !Array.isArray(v) && Object.keys(v).length === 0) return true;
    return false;
  },
  // Snapshot: backup atómico en localStorage para rollback (últimos 5)
  _snapshot(motivo="auto") {
    try {
      const keys = this._localList("");
      const dump = {};
      for (const k of keys) {
        if (k.startsWith("snapshot:")) continue;
        if (k.startsWith("plano:")) continue; // planos son grandes (PDFs)
        dump[k] = this._localGet(k);
      }
      const snap = { ts: Date.now(), motivo, dump };
      const arr = JSON.parse(localStorage.getItem(PFX+"snapshot:list") || "[]");
      arr.push(snap);
      while (arr.length > 5) arr.shift();
      localStorage.setItem(PFX+"snapshot:list", JSON.stringify(arr));
    } catch (e) { console.warn("snapshot fail", e); }
  },
  getSnapshots() {
    try { return JSON.parse(localStorage.getItem(PFX+"snapshot:list") || "[]"); } catch { return []; }
  },
  restoreSnapshot(ts) {
    const arr = this.getSnapshots();
    const snap = arr.find(s => s.ts === ts);
    if (!snap) return false;
    Object.entries(snap.dump).forEach(([k, v]) => this._localSet(k, v));
    return true;
  },
  async pullAll() {
    if (!this._sb) return { ok:false, count:0, msg:"Local only" };
    this._sbStatus = "syncing"; this._notify();
    // Snapshot ANTES de sobreescribir nada
    this._snapshot("pre-pull");
    const keys = await this._sbList();
    if (!keys) { this._sbStatus = "error"; this._notify(); return { ok:false, count:0, msg:"No se pudo listar" }; }
    let count = 0, skipped = 0;
    for (const k of keys) {
      const remoto = await this._sbGet(k);
      if (remoto === undefined) continue;
      // ANTI-PÉRDIDA: si remoto está vacío pero local tiene datos, NO sobreescribir
      const local = this._localGet(k);
      if (this._esVacio(remoto) && !this._esVacio(local)) {
        skipped++;
        continue;
      }
      this._localSet(k, remoto);
      count++;
    }
    this._lastSync = Date.now(); this._sbStatus = "online"; this._notify();
    return { ok:true, count, skipped };
  },
  async pushAll() {
    if (!this._sb) return { ok:false, count:0 };
    this._sbStatus = "syncing"; this._notify();
    let count = 0, errors = 0;
    const localKeys = this._localList("");
    for (const k of localKeys) {
      const v = this._localGet(k);
      if (v != null) {
        const ok = await this._sbSet(k, v);
        if (ok) count++; else errors++;
      }
    }
    this._lastSync = Date.now(); this._sbStatus = errors ? "error" : "online"; this._notify();
    return { ok: errors === 0, count, errors };
  },
};

async function askClaude(messages, apiKey, maxTokens=1200) {
  if (!apiKey) {
    const full = messages.map(m => `[${m.role}] ${typeof m.content === "string" ? m.content : "(multimodal)"}`).join("\n\n");
    try { await navigator.clipboard.writeText(full); } catch {}
    return "⚠ No tenés API key de Claude configurada. Copié el prompt al portapapeles — pegalo en claude.ai y la respuesta la pegás en el campo.\n\nPara activar la IA automática, andá a Ajustes → API key de Claude.";
  }
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{ "Content-Type":"application/json", "x-api-key": apiKey, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
      body: JSON.stringify({ model:"claude-sonnet-4-5", max_tokens: maxTokens, messages })
    });
    const d = await r.json();
    if (d.error) return "⚠ Error de Claude: " + (d.error.message || "desconocido");
    const t = (d.content || []).filter(i => i.type === "text").map(i => i.text).join("\n").trim();
    return t || "No recibí respuesta.";
  } catch (e) { return "⚠ No pude conectar con Claude. Revisá tu conexión y la API key. Detalle: " + e.message; }
}

function descargarArchivo(nombre, contenido, mime) {
  try {
    const blob = new Blob([contenido], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = nombre;
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
    return true;
  } catch (e) { console.error(e); alert("No pude descargar: " + e.message); return false; }
}

function descargarCSV(nombreSinExt, headers, rows) {
  const esc = (v) => { const s = String(v == null ? "" : v); return /[;\n"]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s; };
  const lines = [headers.map(esc).join(";"), ...rows.map(r => headers.map(h => esc(r[h])).join(";"))];
  // BOM para Excel reconozca UTF-8
  return descargarArchivo(nombreSinExt + ".csv", "﻿" + lines.join("\n"), "text/csv;charset=utf-8");
}
function descargarExcelXML(nombreSinExt, hojas) {
  // Excel XML 2003 (.xls) — sin librería, Excel lo abre perfecto y deja editar
  const escXml = (s) => String(s == null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  const cell = (v) => {
    if (v == null) return '<Cell><Data ss:Type="String"></Data></Cell>';
    if (typeof v === "number") return `<Cell><Data ss:Type="Number">${v}</Data></Cell>`;
    return `<Cell><Data ss:Type="String">${escXml(v)}</Data></Cell>`;
  };
  const sheetsXml = hojas.map(h => {
    const headerRow = `<Row>${h.headers.map(c => `<Cell ss:StyleID="head"><Data ss:Type="String">${escXml(c)}</Data></Cell>`).join("")}</Row>`;
    const dataRows = h.rows.map(r => `<Row>${h.headers.map(col => cell(r[col])).join("")}</Row>`).join("");
    return `<Worksheet ss:Name="${escXml(h.nombre || "Hoja").slice(0,31)}"><Table>${headerRow}${dataRows}</Table></Worksheet>`;
  }).join("");
  const xml = `<?xml version="1.0"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
<Styles><Style ss:ID="head"><Font ss:Bold="1" ss:Color="#FFFFFF"/><Interior ss:Color="#191712" ss:Pattern="Solid"/></Style></Styles>
${sheetsXml}
</Workbook>`;
  return descargarArchivo(nombreSinExt + ".xls", xml, "application/vnd.ms-excel");
}

    `🏢 Empresa: ${obra?.empresa || ""}`,
    "",
    "🎨 Actividades:",
    acts || "- (definir)",
    "",
    "👷 Personal en campo:",
    datos.pdr ? `- PDR: ${datos.pdr}` : null,
    datos.residente ? `- Residente: ${datos.residente}` : null,
    datos.supervisora ? `- Supervisora: ${datos.supervisora}` : null,

const TimeInput = ({ value, onChange, placeholder="HH:MM" }) => {
  const [local, setLocal] = useState(value || "");
  useEffect(() => { setLocal(value || ""); }, [value]);
  const commit = (v) => {
    let cleaned = (v || "").replace(/[^\d:]/g, "");
    if (cleaned.length === 4 && !cleaned.includes(":")) cleaned = cleaned.slice(0,2) + ":" + cleaned.slice(2);
    if (cleaned.length === 3 && !cleaned.includes(":")) cleaned = "0" + cleaned.slice(0,1) + ":" + cleaned.slice(1);
    if (/^(\d{1,2}):(\d{2})$/.test(cleaned)) {
      const [h, m] = cleaned.split(":").map(Number);
      if (h >= 0 && h <= 23 && m >= 0 && m <= 59) {
        const fmt = String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0");
        setLocal(fmt);
        onChange({ target: { value: fmt } });
        return;
      }
    }
    setLocal(value || "");
  };
  const ahora = () => {
    const d = new Date();
    const fmt = String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
    setLocal(fmt);
    onChange({ target: { value: fmt } });
  };
  return (
    <div style={{ display:"flex", gap:5 }}>
      <input className="inp" type="text" inputMode="numeric" pattern="[0-9]{2}:[0-9]{2}" maxLength={5} value={local} placeholder={placeholder} onChange={e => setLocal(e.target.value)} onBlur={e => commit(e.target.value)} onKeyDown={e => { if (e.key === "Enter") { commit(e.target.value); e.target.blur(); } }} style={{ flex:1, fontFamily:"'JetBrains Mono',monospace", letterSpacing:"1px", textAlign:"center" }} />

/* ============================ BRIEFING DE VISITA ============================ */
/* Lo que el supervisor debe revisar HOY en esta obra:
   - Notas/recordatorios pendientes (de WhatsApp, coordinación, etc.)
   - Observaciones de la visita anterior (puntos de control "Observado", incidencias abiertas, requerimientos)
   - Partidas del cronograma que deberían estar activas hoy
   - Avance esperado vs real (si hay desfase) */
function calcBriefing(obraId, opts) {
  const { notas=[], visitas=[], incidencias=[], crono=[], obras=[] } = opts;
  const obra = obras.find(o => o.id === obraId);
  const notasPend = notas.filter(n => n.obraId === obraId && n.estado === "Pendiente").sort((a,b) => (b.fecha||"").localeCompare(a.fecha||""));
  const visitasObra = visitas.filter(v => v.obraId === obraId).sort((a,b) => b.fecha.localeCompare(a.fecha));
  const ultVisita = visitasObra[0] || null;
  const observados = ultVisita ? Object.values(ultVisita.controlResults || {}).filter(c => c.estado === "Observado") : [];
  const requerimientos = ultVisita?.requerimientos || "";
  const desvAnt = ultVisita?.desviacion ? ultVisita.desviacionNota : "";
  const riesgoAnt = ultVisita?.riesgoCuello ? ultVisita.riesgoNota : "";
  const incAbiertas = incidencias.filter(i => i.obraId === obraId && i.estado === "Abierta");
  const today = hoy();
  const partidasHoy = crono.filter(r => r.inicio && r.fin && r.inicio <= today && r.fin >= today);
  const partidasAtrasadas = crono.filter(r => {
    if (!r.inicio || !r.fin) return false;
    const tot = (new Date(r.fin) - new Date(r.inicio)) / 86400000 || 1;
    const trans = (new Date(today) - new Date(r.inicio)) / 86400000;
    if (trans < 0) return false;
    const esp = Math.max(0, Math.min(100, trans / tot * 100));
    return (+r.avance || 0) < esp - 15;
  });
  return { obra, ultVisita, notasPend, observados, requerimientos, desvAnt, riesgoAnt, incAbiertas, partidasHoy, partidasAtrasadas };
}

  if (f.huboCoordCliente || f.coordCliente || f.infoCliente || f.requerimientos) {

  const cr = Object.values(f.controlResults || {}).filter(c => c.estado);

  const zEstados = f.zonasEstado || {}, zObs = f.zonasObs || {};

  if (f.aiAlertaNivel && f.aiAlerta) {

    f.aiAcciones.forEach((a, i) => L.push(`   ${i+1}. ${a}`));
  }
  if (f.aiCritico) { L.push(""); L.push("ANÁLISIS EJECUTIVO (IA):"); L.push(f.aiCritico); }

  const totalFotos = (f.fachadaFotos?.length||0) + (f.eppFotos?.length||0) + (f.procesosFotos?.length||0) + PARTIDAS_AVANCE.reduce((a,[k]) => a + ((f.avancePartidas?.[k]?.fotos||[]).length), 0) + (f.fotos?.length||0);
  if (totalFotos) L.push(`\n📷 Total: ${totalFotos} foto(s)`);
  return L.join("\n");
}

    // Si no, intentar restaurar draft sincrónicamente desde localStorage
    try {
      if (typeof window !== "undefined" && window.localStorage) {
        const raw = window.localStorage.getItem("gld:" + DRAFT_KEY);
        if (raw) {
          const draft = JSON.parse(raw);
          // Solo restaurar si el draft es de hoy

        }

    return blankVisita(obras[0]?.id || "");

  const obra = obras.find((o) => o.id === f.obraId);
  const up = (k, v) => setF((s) => ({ ...s, [k]: v }));
  // Ref para acceder al último f desde callbacks/unmount

    const onVis = () => { if (document.visibilityState === "hidden") flush(); };
    window.addEventListener("beforeunload", flush);

        <Field label="Falta de personal / soluciones técnicas o de avance"><TArea placeholder="Si falta personal o se necesita una solución, anotalo" value={f.faltaPersonal} onChange={e => up("faltaPersonal", e.target.value)} rows={2} /></Field>
        <Field><Toggle label="¿Desviación vs. cronograma?" value={f.desviacion} onChange={v => up("desviacion", v)} /></Field>
        {f.desviacion && <Field><TArea placeholder="Magnitud y causa" value={f.desviacionNota} onChange={e => up("desviacionNota", e.target.value)} /></Field>}
        <Field><Toggle label="⚠ Riesgo de cuello de botella" value={f.riesgoCuello} onChange={v => up("riesgoCuello", v)} /></Field>
        {f.riesgoCuello && <Field><TArea placeholder="Causa y acción preventiva" value={f.riesgoNota} onChange={e => up("riesgoNota", e.target.value)} /></Field>}
        <div className="lbl" style={{ marginTop:4 }}>Incidencias</div>
        {f.incidencias.map(c => (
          <div key={c.id} style={{ border:"1px solid var(--line)", borderRadius:10, padding:10, marginBottom:8 }}>
            <div style={{ display:"flex", gap:8, marginBottom:8 }}><div style={{ flex:1 }}><Sel value={c.sev} onChange={e => setInc(c.id, "sev", e.target.value)} options={["Baja","Media","Alta"]} /></div><button className="btn" onClick={() => up("incidencias", f.incidencias.filter(x => x.id !== c.id))} style={{ background:"transparent", padding:6 }}><Trash2 size={18} color="var(--rojo)" /></button></div>
            <TArea placeholder="Descripción" value={c.desc} onChange={e => setInc(c.id, "desc", e.target.value)} rows={2} />
            <input className="inp" style={{ marginTop:8 }} placeholder="Acción / recomendación" value={c.accion} onChange={e => setInc(c.id, "accion", e.target.value)} />
          </div>
        ))}
        <button className="btn" onClick={addInc} style={{ background:"var(--surface3)", color:"var(--ink)", padding:"9px 12px", width:"100%" }}><Plus size={15} style={{verticalAlign:-2}} /> Agregar incidencia</button>
      </Section>

      {/* 6 — COORDINACIONES CLIENTE (opcional) */}
      <Section title="6. Coordinaciones con el cliente (opcional)" icon={Building2}>
        <Field><Toggle label="¿Hubo coordinaciones con el cliente en esta visita?" value={f.huboCoordCliente} onChange={v => up("huboCoordCliente", v)} /></Field>
        {f.huboCoordCliente && (
          <>
            <Field label="Resumen de coordinación"><TArea placeholder="Qué se coordinó (con quién, qué se acordó)" value={f.coordCliente} onChange={e => up("coordCliente", e.target.value)} rows={2} /></Field>
            <Field label="Información al cliente"><TArea placeholder="Qué se informó" value={f.infoCliente} onChange={e => up("infoCliente", e.target.value)} rows={2} /></Field>
            <Field label="Requerimientos / adicionales"><TArea placeholder="Pedidos del cliente" value={f.requerimientos} onChange={e => up("requerimientos", e.target.value)} rows={2} /></Field>
          </>
        )}
        <div style={{ fontSize:12, color:"var(--ink2)", lineHeight:1.45, marginTop:4 }}>💡 Si necesitás registrar una coordinación que NO fue en visita (WhatsApp, llamada, reunión), usá <b>Notas</b> desde Inicio.</div>
      </Section>

      <Section title="Fotos adicionales (sin categoría)" icon={Camera}>
        <FotoStrip fotos={f.fotos} onAdd={addFotos} onRm={id => up("fotos", f.fotos.filter(x => x.id !== id))} onCap={(id, v) => up("fotos", f.fotos.map(x => x.id === id ? { ...x, cap: v } : x))} />
      </Section>
      {cps.length > 0 && (
        <Section title="Control vs. punto de partida" icon={Flag}>
          {cps.map((c, i) => {
            const r = f.controlResults?.[i] || {};
            return (
              <div key={i} style={{ borderBottom:"1px solid var(--line)", padding:"9px 0" }}>
                <div style={{ fontSize:13.5, marginBottom:6 }}>{c.txt}</div>
                <div style={{ display:"flex", gap:6, marginBottom: r.estado === "Observado" ? 6 : 0 }}>
                  {["Conforme","Observado"].map((e) => (
                    <button key={e} className="btn" onClick={() => setControl(i, c.txt, { estado: r.estado === e ? "" : e })} style={{ flex:1, padding:"7px 0", fontSize:13, background: r.estado === e ? (e==="Conforme"?"var(--verde)":"var(--rojo)") : "var(--paper)", color: r.estado === e ? "#fff" : "var(--ink2)", border:`1.5px solid ${e==="Conforme"?"var(--verde)":"var(--rojo)"}` }}>{e}</button>
                  ))}
                </div>
                {r.estado === "Observado" && <input className="inp" placeholder="Observación" value={r.nota || ""} onChange={(e) => setControl(i, c.txt, { nota: e.target.value })} />}
              </div>
            );
          })}
        </Section>
      )}
      <Section title="Resumen y semáforo" icon={FileText}>
        <Field label="Resumen de la supervisión"><TArea placeholder="Conclusión de la visita" value={f.resumen} onChange={(e) => up("resumen", e.target.value)} /></Field>
        <Field label="Nivel de alerta">
          <div style={{ display:"flex", gap:8 }}>
            {["Verde","Ámbar","Rojo"].map((n) => (
              <button key={n} className="btn" onClick={() => up("alerta", n)} style={{ flex:1, padding:"10px 0", background: f.alerta === n ? semColor(n) : "var(--paper)", color: f.alerta === n ? "#fff" : "var(--ink2)", border:`1.5px solid ${semColor(n)}` }}>{n}</button>
            ))}
          </div>
        </Field>
      </Section>
      <Section title="Análisis estratégico (IA)" icon={Sparkles}>
        <div style={{ fontSize:12.5, color:"var(--ink2)", marginBottom:10, lineHeight:1.45 }}>Genera 5 bloques cruzando visita + cronograma + cerebro + visitas anteriores: alerta crítica, predicción a apertura, acciones próximas 24h, patrones detectados y análisis ejecutivo.</div>
        <button className="btn" onClick={generarCritico} disabled={iaLoad} style={{ background:"linear-gradient(135deg, var(--ia), #c4b5fd)", color:"#fff", padding:13, width:"100%", boxShadow:"0 4px 16px -4px var(--ia-glow)" }}><Sparkles size={15} style={{verticalAlign:-3}} /> {iaLoad ? "Analizando…" : "Generar análisis estratégico"}</button>
        {iaLoad && <div style={{ marginTop:12, textAlign:"center" }}><span className="dot" /><span className="dot" /><span className="dot" /></div>}
        {f.aiAlertaNivel && f.aiAlerta && (
          <div style={{ marginTop:12, padding:13, borderRadius:12, background: ALERTA_NIVEL_BG[f.aiAlertaNivel] || ALERTA_NIVEL_BG["Medio"], border:`1.5px solid ${ALERTA_NIVEL_COL[f.aiAlertaNivel] || "var(--ambar)"}` }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
              <AlertTriangle size={16} color={ALERTA_NIVEL_COL[f.aiAlertaNivel]} strokeWidth={2.4} />
              <span className="disp" style={{ fontSize:13, color: ALERTA_NIVEL_COL[f.aiAlertaNivel], textTransform:"uppercase", letterSpacing:".05em" }}>Alerta {f.aiAlertaNivel}</span>
            </div>
            <div style={{ fontSize:14.5, lineHeight:1.45, color:"var(--ink)", fontWeight:500 }}>{f.aiAlerta}</div>
          </div>
        )}
        {f.aiPrediccion && (
          <div style={{ marginTop:10, padding:12, borderRadius:11, background:"rgba(34,211,238,.06)", border:"1px solid var(--cyan)" }}>
            <div className="lbl" style={{ color:"var(--cyan)", marginBottom:5 }}>📡 Predicción</div>
            <div style={{ fontSize:13, lineHeight:1.5, whiteSpace:"pre-wrap" }}>{f.aiPrediccion}</div>
          </div>
        )}
        {f.aiPatrones && (
          <div style={{ marginTop:10, padding:12, borderRadius:11, background:"rgba(167,139,250,.06)", border:"1px solid var(--ia)" }}>
            <div className="lbl" style={{ color:"var(--ia)", marginBottom:5 }}>🧠 Patrón detectado</div>
            <div style={{ fontSize:13, lineHeight:1.5, whiteSpace:"pre-wrap" }}>{f.aiPatrones}</div>
          </div>
        )}
        {Array.isArray(f.aiAcciones) && f.aiAcciones.length > 0 && (
          <div style={{ marginTop:10, padding:12, borderRadius:11, background:"rgba(255,107,53,.06)", border:"1px solid var(--accent)" }}>
            <div className="lbl" style={{ color:"var(--accent)", marginBottom:7 }}>⚡ Acciones próximas 24h</div>
            {f.aiAcciones.map((a, i) => (
              <div key={i} style={{ display:"flex", gap:8, padding:"5px 0", borderBottom: i < f.aiAcciones.length-1 ? "1px solid var(--border-soft)" : "none" }}>
                <span style={{ color:"var(--accent)", fontWeight:700, fontSize:12, marginTop:2 }}>{i+1}.</span>
                <span style={{ fontSize:13, lineHeight:1.45, flex:1 }}>{a}</span>
              </div>
            ))}
          </div>
        )}
        {f.aiCritico && <AIBox text={f.aiCritico} label="Análisis ejecutivo" />}
        {f.aiCritico && <TArea style={{ marginTop:8 }} placeholder="Editá el análisis si querés ajustarlo" value={f.aiCritico} onChange={(e) => up("aiCritico", e.target.value)} rows={4} />}
      </Section>

      {/* REPORTE POST-SUPERVISIÓN (WhatsApp + PDF) */}
      <Section title="Reporte post-supervisión" icon={Send}>
        <div style={{ fontSize:12.5, color:"var(--ink2)", marginBottom:10, lineHeight:1.45 }}>Genera el mensaje completo para el grupo de obra con planificación de mañana, responsables, objetivos, partidas críticas y desviaciones vs cronograma. La IA usa los datos de esta visita + cronograma + cerebro.</div>
        <button onClick={generarPostReporte} disabled={postLoad} className="btn" style={{ background:"linear-gradient(135deg, var(--ia), #c4b5fd)", color:"#fff", padding:13, width:"100%", boxShadow:"0 4px 16px -4px var(--ia-glow)" }}><Sparkles size={15} style={{verticalAlign:-3}} /> {postLoad ? "Generando reporte…" : (f.postReporte ? "Regenerar reporte" : "Generar reporte post-supervisión")}</button>
        {postLoad && <div style={{ textAlign:"center", padding:14 }}><span className="dot" /><span className="dot" /><span className="dot" /></div>}
        {f.postReporte && (
          <>
            <div className="card" style={{ background:"#dcf8c6", padding:13, borderRadius:14, border:"none", marginTop:10 }}>
              <pre className="mono" style={{ whiteSpace:"pre-wrap", fontSize:12.5, margin:0, lineHeight:1.55, color:"#0a0d13" }}>{f.postReporte}</pre>
            </div>
            <TArea style={{ marginTop:8 }} value={f.postReporte} onChange={e => up("postReporte", e.target.value)} rows={3} placeholder="Editá el reporte si querés ajustarlo antes de enviar" />
            <div style={{ display:"flex", gap:8, marginTop:10 }}>
              <a href={whatsappHref(f.postReporte)} target="_blank" rel="noreferrer" className="btn" style={{ flex:1, background:"#25D366", color:"#fff", padding:12, textAlign:"center", textDecoration:"none", fontSize:13.5, fontWeight:600 }}><MessageCircle size={15} style={{verticalAlign:-3}} /> WhatsApp</a>
              <button onClick={async () => { const r = await shareOrCopy(f.postReporte); alert(r === "copy" ? "Copiado." : "Listo."); }} className="btn" style={{ flex:1, background:"var(--surface3)", color:"var(--ink)", padding:12, fontSize:13.5 }}><Copy size={14} style={{verticalAlign:-2}} /> Copiar</button>
              <button onClick={() => setPostPdf(true)} className="btn" style={{ flex:1, background:"linear-gradient(135deg, var(--accent), #ff8855)", color:"#fff", padding:12, fontSize:13.5, fontWeight:600 }}><FileText size={15} style={{verticalAlign:-3}} /> PDF</button>
            </div>
          </>
        )}
      </Section>

      <div style={{ display:"flex", gap:10 }}>
        <button className="btn" onClick={onCancel} style={{ flex:1, background:"var(--surface2)", color:"var(--ink)", padding:14 }}>Volver (queda guardado)</button>
        <button className="btn" onClick={async () => { if (!f.obraId) return alert("Seleccioná una obra."); await store.del(DRAFT_KEY); onSave(f); }} style={{ flex:2, background:"linear-gradient(135deg, var(--accent), #ff8855)", color:"#fff", padding:14 }}><Save size={16} style={{verticalAlign:-3}} /> Guardar visita</button>
      </div>

      {/* MODAL PDF POST-REPORTE */}
      {postPdf && <PostReportePdf obra={obra} f={f} onClose={() => setPostPdf(false)} cfg={{ supervisor: f.supervisor }} />}
    </div>
  );
}

/* ============================ PDF REPORTE POST-SUPERVISIÓN ============================ */
function PostReportePdf({ obra, f, onClose, cfg = {} }) {
  // Recolectar todas las fotos categorizadas
  const allFotos = [
    ...(f.fachadaFotos||[]).map(p=>({...p, sec:"Fachada"})),
    ...(f.eppFotos||[]).map(p=>({...p, sec:"EPP / Personal"})),
    ...(f.procesosFotos||[]).map(p=>({...p, sec:"Procesos"})),
    ...PARTIDAS_AVANCE.flatMap(([k,l]) => (f.avancePartidas?.[k]?.fotos||[]).map(p=>({...p, sec:l}))),
    ...(f.fotos||[]).map(p=>({...p, sec:"General"}))
  ];
  const personal = (f.cuadrillas || []).reduce((a,c) => a + (+c.personas || 0), 0);
  const tardanzas = (f.cuadrillas || []).filter(c => c.llego !== false && (c.horaLlegada || c.hora) > (obra?.horaInicio || "08:00")).length;
  const noLlegaron = (f.cuadrillas || []).filter(c => c.llego === false).length;
  const dias = diasPara(obra?.fechaApertura);
  // Parsear secciones del postReporte para mostrarlas con estilo en el PDF
  const parts = (f.postReporte || "").split(/\n\n+/);
  return (
    <div style={{ position:"fixed", inset:0, background:"var(--bg)", zIndex:200, overflowY:"auto" }}>
      <div className="hide-print" style={{ position:"sticky", top:0, display:"flex", justifyContent:"space-between", padding:"10px 14px", background:"rgba(10,13,19,.95)", backdropFilter:"blur(12px)", borderBottom:"1px solid var(--border)", zIndex:10 }}>
        <button onClick={onClose} className="btn" style={{ background:"var(--surface3)", color:"var(--ink)", padding:8 }}><ChevronLeft size={16} /> Volver</button>
        <button onClick={() => window.print()} className="btn" style={{ background:"linear-gradient(135deg, var(--accent), #ff8855)", color:"#fff", padding:"8px 16px", fontWeight:600 }}><Printer size={14} style={{verticalAlign:-2}} /> Guardar PDF</button>
      </div>
      <div id="printzone" style={{ padding:"0", background:"#fff", color:"#191712", maxWidth:800, margin:"0 auto" }}>
        <div className="p-header">
          <div className="p-logo">
            <div className="p-logo-box">GLD</div>
            <div>
              <div className="p-brand">Supervisión de Producción</div>
              <div className="p-title">Reporte Post-Supervisión</div>
            </div>
          </div>
          <div className="p-meta">
            <div style={{ fontWeight:700, fontSize:13, color:"#fff" }}>{fmtFecha(f.fecha)}</div>
            <div>{obra?.cliente || ""} · {obra?.nombre || ""}</div>
            {obra?.direccion && <div style={{ fontSize:10 }}>{obra.direccion}</div>}
            <div>Supervisor: {f.supervisor || cfg.supervisor || "Renzo Moscol"}</div>
          </div>
        </div>

        <div className="p-kpis">
          <div className="p-kpi"><div className="v" style={{ color: f.alerta==="Rojo"?"#C92A2A":f.alerta==="Ámbar"?"#E8590C":"#2B8A3E" }}>{f.alerta || "—"}</div><div className="l">Alerta</div></div>
          <div className="p-kpi"><div className="v" style={{ color: dias!=null && dias<7 ? "#C92A2A" : "#191712" }}>{dias!=null ? (dias>=0?dias+"d":"venc") : "—"}</div><div className="l">A apertura</div></div>
          <div className="p-kpi"><div className="v">{personal}</div><div className="l">Personal</div></div>
          <div className="p-kpi"><div className="v" style={{ color: tardanzas||noLlegaron?"#E8590C":"#191712" }}>{tardanzas + noLlegaron}</div><div className="l">Tardes/No</div></div>
          <div className="p-kpi"><div className="v">{allFotos.length}</div><div className="l">Fotos</div></div>
        </div>

        {/* Bloque IA críticas si las hay */}
        {f.aiAlertaNivel && f.aiAlerta && (
          <div style={{ margin:"0 20px 14px", padding:14, borderRadius:8, background: f.aiAlertaNivel==="Crítico"?"#fff1f3":f.aiAlertaNivel==="Alto"?"#ffe4e6":f.aiAlertaNivel==="Medio"?"#fef3c7":"#dbeafe", border:`2px solid ${f.aiAlertaNivel==="Crítico"?"#C92A2A":f.aiAlertaNivel==="Alto"?"#f43f5e":f.aiAlertaNivel==="Medio"?"#E8590C":"#22d3ee"}` }}>
            <div style={{ fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:".05em", color: f.aiAlertaNivel==="Crítico"?"#C92A2A":"#E8590C", marginBottom:6 }}>🚨 ALERTA {f.aiAlertaNivel.toUpperCase()} — IA</div>
            <div style={{ fontSize:13.5, fontWeight:600, color:"#191712", lineHeight:1.4 }}>{f.aiAlerta}</div>
            {f.aiPrediccion && <div style={{ fontSize:12, color:"#191712", marginTop:8, lineHeight:1.5, fontStyle:"italic" }}>📡 {f.aiPrediccion}</div>}
          </div>
        )}

        {/* Reporte post-supervisión formateado */}
        <div className="p-section">PLANIFICACIÓN PARA EL EQUIPO</div>
        <div className="p-body">
          <pre style={{ whiteSpace:"pre-wrap", margin:0, fontSize:11.5, lineHeight:1.65, fontFamily:"'Space Grotesk',sans-serif", color:"#1f2937" }}>{f.postReporte}</pre>
        </div>

        {/* Tabla resumen de subcontratistas */}
        {(f.cuadrillas || []).length > 0 && (
          <>
            <div className="p-section">SUBCONTRATISTAS EN OBRA</div>
            <div className="p-body">
              <table>
                <thead><tr><th>Frente</th><th>Estado</th><th>Personal</th><th>Hora</th><th>Observación</th></tr></thead>
                <tbody>
                  {f.cuadrillas.map((c, i) => (
                    <tr key={i}>
                      <td><b>{c.frente}</b></td>
                      <td style={{ color: c.llego===false ? "#C92A2A" : ((c.horaLlegada||c.hora) > (obra?.horaInicio||"08:00") ? "#E8590C" : "#2B8A3E"), fontWeight:600 }}>{c.llego===false ? "NO LLEGÓ" : "Presente"}</td>
                      <td>{c.llego===false ? "—" : (c.personas || 0)}</td>
                      <td>{c.llego===false ? "—" : (c.horaLlegada || c.hora || "—")}</td>
                      <td>{c.llego===false ? (c.motivoNoLlego || "—") : (c.obs || "")}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </>
        )}

        {/* Avance por partidas */}
        {PARTIDAS_AVANCE.some(([k]) => f.avancePartidas?.[k]?.notas) && (
          <>
            <div className="p-section">AVANCE POR PARTIDAS</div>
            <div className="p-body">
              {PARTIDAS_AVANCE.map(([k, l]) => { const ap = f.avancePartidas?.[k]; if (!ap || !ap.notas) return null; return (
                <div key={k} style={{ marginBottom:8, paddingBottom:8, borderBottom:"1px solid #e5e7eb" }}>
                  <div style={{ fontWeight:700, fontSize:12, color:"#FF5A1F", marginBottom:4 }}>{l}</div>
                  <div style={{ fontSize:11.5, lineHeight:1.5, color:"#374151" }}>{ap.notas}</div>
                  {(ap.fotos||[]).length > 0 && <div style={{ fontSize:10, color:"#6b7280", marginTop:3 }}>📷 {ap.fotos.length} foto(s)</div>}
                </div>
              ); })}
            </div>
          </>
        )}

        {/* Acciones IA */}
        {Array.isArray(f.aiAcciones) && f.aiAcciones.length > 0 && (
          <>
            <div className="p-section">⚡ ACCIONES PRÓXIMAS 24H</div>
            <div className="p-body">
              {f.aiAcciones.map((a, i) => <div key={i} style={{ fontSize:11.5, padding:"4px 0", color:"#374151", lineHeight:1.5 }}><b style={{ color:"#FF5A1F" }}>{i+1}.</b> {a}</div>)}
            </div>
          </>
        )}

        {/* Análisis ejecutivo IA */}
        {f.aiCritico && (
          <>
            <div className="p-section">ANÁLISIS EJECUTIVO IA</div>
            <div className="p-body">
              <div style={{ padding:10, background:"#f3f0ff", borderRadius:6, fontSize:11.5, color:"#1f2937", lineHeight:1.55, whiteSpace:"pre-wrap" }}>{f.aiCritico}</div>
            </div>
          </>
        )}

        {/* Panel fotográfico */}
        {allFotos.length > 0 && (
          <>
            <div className="p-section">PANEL FOTOGRÁFICO ({allFotos.length})</div>
            <div className="p-fotos">
              {allFotos.map((p, i) => (
                <div key={i}>
                  <img src={p.data} alt="" />
                  <div style={{ fontSize:9.5, color:"#6b7280", marginTop:3 }}><b style={{ color:"#FF5A1F" }}>{p.sec}</b>{p.cap?" — "+p.cap:""}</div>
                </div>
              ))}
            </div>
          </>
        )}

        <div className="p-footer">
          <div>
            <div><span className="p-brand-small">GLD</span> — Supervisión de Producción</div>
            <div style={{ fontSize:9.5, opacity:.7, marginTop:2 }}>{f.supervisor || cfg.supervisor || "Renzo Moscol"} · Chorrillos, Lima · gld.pe</div>
          </div>
          <div style={{ textAlign:"right", fontSize:9.5, opacity:.7 }}>Generado: {fmtFecha(hoy())}<br />Reporte oficial GLD · Confidencial</div>
        </div>
      </div>
    </div>
  );
}

/* ============================ NOTAS POR OBRA ============================ */
function NotasScreen({ obras, notas, save, preObra="" }) {
  const [fObra, setFObra] = useState(preObra || "todas");
  const [fEstado, setFEstado] = useState("Pendiente");
  const [add, setAdd] = useState(null);
  const lista = notas.filter(n => (fObra==="todas" || n.obraId===fObra) && (fEstado==="todas" || n.estado===fEstado)).sort((a,b) => (b.fecha||"").localeCompare(a.fecha||""));
  const commit = () => { if (!add.texto.trim()) return alert("Escribí la nota."); save(add.id ? notas.map(n=>n.id===add.id?add:n) : [...notas, { ...add, id: uid() }]); setAdd(null); };
  const setEstado = (id, e) => save(notas.map(n => n.id === id ? { ...n, estado: e } : n));
  const del = (id) => save(notas.filter(n => n.id !== id));
  const blank = (oid="") => ({ obraId: oid || preObra || obras[0]?.id || "", fecha: hoy(), texto: "", fuente: "WhatsApp", estado: "Pendiente" });
  if (add) return (

// === Mensaje de avance 10am/3pm (formato fijo solicitado por el supervisor) ===
const mensajeAvanceFormat = (hora) => {
  const labelHora = hora === "10:00" ? "MAÑANA — 10:00 AM" : "TARDE — 3:00 PM";
  return "📊 REPORTE DE AVANCE " + labelHora + "\n\nEstimado equipo, por favor envíen el reporte de avance con lo siguiente:\n\n📸 ADJUNTAR:\n• 3 fotos PANORÁMICAS de avance (área limpia)\n• 1 foto EXTERIOR del perímetro (limpio)\n• Foto de circulación para personal de tienda (aplica si su circulación está dentro del área a intervenir)\n\nGracias.";
};
// Scheduler: chequea cada cierto rato si toca disparar la notificación de las 10:00 o 15:00. Usa localStorage para no repetir el mismo día.
const NOTIF_SCHED_KEY_AVANCE = "arkym:notif:lastfire:avances";
function arkymCheckScheduledAvances(cfg) {
  try {
    cfg = cfg || {};
    if (cfg.notifAvances === false) return;
    if (typeof Notification === "undefined" || Notification.permission !== "granted") return;
    var now = new Date();
    var hhmm = String(now.getHours()).padStart(2,"0") + ":" + String(now.getMinutes()).padStart(2,"0");
    var today = now.toISOString().slice(0,10);
    var last = {};
    try { last = JSON.parse(localStorage.getItem(NOTIF_SCHED_KEY_AVANCE) || "{}"); } catch (e) {}
    var horaAM = cfg.horaAvanceMorning || "10:00";
    var horaPM = cfg.horaAvanceAfternoon || "15:00";
    if (hhmm === horaAM && last["am"] !== today) {
      arkymNotify("📊 Avance mañana (" + horaAM + ")", { body: "Es hora del reporte de avance. Tocá Arkym Sup para ver el mensaje.", tag: "avance-am" });
      last["am"] = today;
      try { localStorage.setItem(NOTIF_SCHED_KEY_AVANCE, JSON.stringify(last)); } catch (e) {}
    }
    if (hhmm === horaPM && last["pm"] !== today) {
      arkymNotify("📊 Avance tarde (" + horaPM + ")", { body: "Es hora del reporte de avance. Tocá Arkym Sup para ver el mensaje.", tag: "avance-pm" });
      last["pm"] = today;
      try { localStorage.setItem(NOTIF_SCHED_KEY_AVANCE, JSON.stringify(last)); } catch (e) {}
    }
  } catch (e) { console.warn("scheduler avance:", e); }
}
const arkymNotify = (titulo, opts={}) => {
  try {
    if (!("Notification" in window)) return false;
    if (Notification.permission !== "granted") return false;
    const n = new Notification(titulo, { icon: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='36' fill='%23ff6b35'/%3E%3Ctext x='96' y='118' text-anchor='middle' font-family='system-ui' font-weight='bold' font-size='64' fill='%230a0d13'%3EAS%3C/text%3E%3C/svg%3E", body: opts.body || "", tag: opts.tag || "arkym", ...opts });
    if (opts.onClick) n.onclick = () => { window.focus(); opts.onClick(); n.close(); };
    return true;
  } catch { return false; }
};
// === Diagnóstico Supabase: listar todas las claves remotas con tamaño + restaurar individual ===
function DiagnosticoSupabase({ reload }) {
  const [items, setItems] = useState(null);
  const [load, setLoad] = useState(false);
  const [filtro, setFiltro] = useState("");
  const [ver, setVer] = useState(null);
  const [err, setErr] = useState("");
  const cargar = async () => {
    setLoad(true); setItems(null); setErr("");
    try {
      if (!store._sb) { setErr("Supabase no está configurado. Cargá URL + Anon key arriba y guardá."); setLoad(false); return; }
      const r = await store._sbReq("/kv?select=key,value,updated_at&order=updated_at.desc");
      if (!r || !r.ok) { setErr("No se pudo listar (HTTP " + (r ? r.status : "?") + "). Probá 'Probar conexión' arriba."); setLoad(false); return; }
      const data = await r.json();
      const enriched = data.map(row => {
        let json = ""; try { json = JSON.stringify(row.value || {}); } catch (e) { json = ""; }
        const esArr = Array.isArray(row.value);
        const esObj = !esArr && typeof row.value === "object" && row.value !== null;
        return {
          key: row.key,
          updated_at: row.updated_at,
          size: json.length,
          esArr, esObj,
          count: esArr ? row.value.length : (esObj ? Object.keys(row.value).length : 0),
          full: row.value,
        };
      });
      setItems(enriched);
    } catch (e) { setErr("Error: " + e.message); }
    setLoad(false);
  };
  const restaurarKey = (it) => {
    if (!confirm("Restaurar la clave \"" + it.key + "\" desde Supabase al local? Esto sobrescribe lo que haya en este dispositivo.")) return;
    try {
      store._localSet(it.key, it.full);
      alert("Clave \"" + it.key + "\" restaurada localmente. Recargando…");
      reload && reload();
    } catch (e) { alert("Error al restaurar: " + e.message); }
  };
  const lista = items ? items.filter(i => !filtro || i.key.toLowerCase().includes(filtro.toLowerCase())) : [];
  return (
    <div>
      <button onClick={cargar} disabled={load} className="btn" style={{ background:"var(--cyan)", color:"#0a0d13", padding:11, width:"100%", fontWeight:600 }}>{load ? "Cargando…" : "🔍 Listar TODAS las claves en Supabase"}</button>
      {err && <div style={{ marginTop:9, padding:9, background:"rgba(244,63,94,.08)", border:"1px solid var(--rojo)", borderRadius:8, fontSize:12, color:"var(--rojo)" }}>{err}</div>}
      {items && (
        <div style={{ marginTop:10 }}>
          <div style={{ fontSize:12, color:"var(--ink2)", marginBottom:6 }}>{items.length} clave(s) en el servidor. Filtrá por nombre (ej. "prescott", "crono", "planos", "entrega"):</div>
          <TInput value={filtro} onChange={e => setFiltro(e.target.value)} placeholder="Filtrar por nombre de clave..." />
          <div style={{ marginTop:8, maxHeight:380, overflowY:"auto" }}>
            {lista.map(it => (
              <div key={it.key} className="card" style={{ padding:9, marginBottom:6, background:"var(--surface)" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:6 }}>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div className="mono" style={{ fontSize:12, fontWeight:600, color:"var(--ink)", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{it.key}</div>
                    <div className="mono" style={{ fontSize:10.5, color:"var(--ink3)" }}>{it.esArr ? "array · " + it.count + " items" : it.esObj ? "obj · " + it.count + " keys" : "valor"} · {(it.size/1024).toFixed(1)} KB · {new Date(it.updated_at).toLocaleString("es-PE",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}</div>
                  </div>
                  <button onClick={() => setVer(it)} className="btn" style={{ background:"var(--surface3)", color:"var(--ink)", padding:"5px 9px", fontSize:11 }}>Ver</button>
                  <button onClick={() => restaurarKey(it)} className="btn" style={{ background:"var(--verde)", color:"#fff", padding:"5px 9px", fontSize:11, fontWeight:600 }}>Restaurar</button>
                </div>
              </div>
            ))}
            {!lista.length && <div style={{ textAlign:"center", fontSize:12, color:"var(--ink3)", padding:14 }}>Sin claves que coincidan con el filtro.</div>}
          </div>
        </div>
      )}
      <Modal open={!!ver} onClose={() => setVer(null)} title={ver?.key || ""} maxWidth={640}>
        {ver && (
          <>
            <div style={{ fontSize:11.5, color:"var(--ink3)", marginBottom:8 }}>Tamaño: {(ver.size/1024).toFixed(2)} KB · Actualizado: {new Date(ver.updated_at).toLocaleString("es-PE")}</div>
            <pre className="mono" style={{ background:"var(--bg)", padding:10, borderRadius:8, fontSize:11, maxHeight:"55vh", overflow:"auto", whiteSpace:"pre-wrap", color:"var(--ink)", border:"1px solid var(--border)" }}>{JSON.stringify(ver.full, null, 2)}</pre>
            <div style={{ display:"flex", gap:8, marginTop:10 }}>
              <button onClick={async () => { try { await navigator.clipboard.writeText(JSON.stringify(ver.full, null, 2)); alert("JSON copiado."); } catch (e) {} }} className="btn" style={{ flex:1, background:"var(--surface3)", color:"var(--ink)", padding:10 }}>📋 Copiar JSON</button>
              <button onClick={() => { restaurarKey(ver); setVer(null); }} className="btn" style={{ flex:1, background:"var(--verde)", color:"#fff", padding:10, fontWeight:600 }}>↩ Restaurar al local</button>
            </div>
          </>
        )}
      </Modal>
    </div>
  );
}

function NotifBlock() {
  const [perm, setPerm] = useState(typeof Notification !== "undefined" ? Notification.permission : "unsupported");
  const pedirPermiso = async () => {
    if (!("Notification" in window)) { alert("Tu navegador no soporta notificaciones."); return; }
    const r = await Notification.requestPermission();
    setPerm(r);
    if (r === "granted") arkymNotify("Notificaciones activas", { body: "Vas a recibir avisos de Arkym Sup acá.", tag: "test" });
    else if (r === "denied") alert("Permisos bloqueados. Activalos manualmente desde el navegador (candado de la barra de direcciones).");
  };
  const probar = () => arkymNotify("🔔 Prueba", { body: "Si ves esto, las notificaciones funcionan.", tag: "test" });
  if (perm === "unsupported") return <div style={{ fontSize:12, color:"var(--ambar)" }}>⚠ Tu navegador no soporta notificaciones del sistema. Probá con Chrome/Edge/Firefox.</div>;

// === Snapshots: lista + restaurar ===
function SnapshotsBlock({ reload }) {
  const [snaps, setSnaps] = useState(store.getSnapshots());
  const refresh = () => setSnaps(store.getSnapshots());
  const restore = async (ts) => {
    if (!confirm("Restaurar este respaldo SOBRESCRIBE los datos locales actuales (después sube a Supabase con 'Subir'). ¿Continuar?")) return;
    const ok = store.restoreSnapshot(ts);
    if (ok) { alert("Snapshot restaurado. Recargando…"); reload && reload(); }
    else alert("No se pudo restaurar.");
  };
  const crear = () => { store._snapshot("manual"); refresh(); alert("Snapshot manual creado."); };
  if (!snaps.length) return (
    <div>
      <div style={{ fontSize:12, color:"var(--ink3)", padding:9, background:"var(--surface)", borderRadius:8, marginBottom:8 }}>Sin snapshots todavía. Se crearán automáticamente con el uso.</div>
      <button onClick={crear} className="btn" style={{ background:"var(--surface3)", color:"var(--ink)", padding:11, width:"100%", fontSize:12.5 }}>📸 Crear snapshot manual ahora</button>
    </div>
  );
  return (
    <div>
      <button onClick={crear} className="btn" style={{ background:"var(--surface3)", color:"var(--ink)", padding:10, width:"100%", fontSize:12.5, marginBottom:8 }}>📸 Crear snapshot manual</button>
      {[...snaps].reverse().map(s => {
        const d = new Date(s.ts);
        const keys = Object.keys(s.dump);
        const obras = (s.dump.obras || []).length;
        const vis = (s.dump.visitas || []).length;
        const inc = (s.dump.incidencias || []).length;
        return (
          <div key={s.ts} className="card" style={{ padding:11, marginBottom:8, background:"var(--surface)" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 }}>
              <div style={{ flex:1, minWidth:0 }}>
                <div className="disp" style={{ fontSize:13 }}>{d.toLocaleString("es-PE", { day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" })}</div>
                <div className="mono" style={{ fontSize:11, color:"var(--ink3)" }}>{s.motivo} · {keys.length} claves · {obras} obras · {vis} visitas · {inc} incid.</div>
              </div>
              <button onClick={() => restore(s.ts)} className="btn" style={{ background:"var(--cyan)", color:"#0a0d13", padding:"6px 11px", fontSize:11.5, fontWeight:600 }}>Restaurar</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ============================ PAYLOADS PARA CLAUDE.AI (RDO / RI / RSO / config_obra) ============================
   Estos helpers arman objetos JSON con la estructura exacta de la especificación v1.0.
   El supervisor pega el JSON en claude.ai con el prompt indicado y Claude genera el reporte.
*/
const COSTOS_HH_DEFAULT = { capataz: 34.07, operario: 28.38, oficial: 22.32, peon: 20.22 };
const CHECKLIST_SSOMA_DEFAULT = [
  "Charla de seguridad de 5 min",
  "EPP completo y en buen estado",
  "Señalización y delimitación de áreas",
  "Orden y limpieza en frentes",
  "Herramientas inspeccionadas",
  "Extintores operativos",
  "Botiquín equipado",
  "ATS/AST llenado",
  "Accesos y vías libres",
  "Trabajos en altura con arnés y línea de vida",
];
function _obraSlug(obra) {
  if (!obra) return "obra";
  const base = (obra.nombre || "obra").toString().toUpperCase().replace(/[^A-Z0-9]+/g, "-").replace(/^-|-$/g, "");
  return base.slice(0, 30) || "obra";
}
function _calcCriticidad(prob, sev) {
  const map = { Baja:1, Media:2, Alta:3 };
  const score = (map[prob]||1) * (map[sev]||1);
  if (score >= 6) return "ALTA";
  if (score >= 3) return "MEDIA";
  return "BAJA";
}
// === CONFIG OBRA ===
function armarConfigObraJSON(obra, cronoObra=[], cfg={}) {
  const partidas = (cronoObra||[]).filter(r => r.partida).map((r, i) => ({
    partida_id: r.id ? "P" + String(i+1).padStart(2,"0") : "P" + String(i+1).padStart(2,"0"),
    nombre: r.partida,
    unidad: r.unidad || "m2",
    metrado_total: +r.metrado || 0,
    precio_unitario: +r.precioUnit || 0,
  }));
  return {
    tipo_reporte: "config_obra",
    obra_id: obra?.id || _obraSlug(obra),
    obra_nombre: obra?.nombre || "",
    direccion: obra?.direccion || "",
    distrito: obra?.distrito || "",
    ciudad: obra?.ciudad || "Lima",
    cliente: obra?.cliente || "",
    contratista: obra?.empresa || "",
    ruc_contratista: obra?.ruc || "",
    jefe_operaciones: cfg.supervisor || "Renzo Moscol",
    residente: obra?.residente || "",
    supervisor_cliente: obra?.arqCliente || "",
    fecha_inicio: obra?.fechaInicio || "",
    fecha_fin_contractual: obra?.fechaApertura || "",
    presupuesto_total: +obra?.presupuesto || 0,
    costos_hh: { ...COSTOS_HH_DEFAULT },
    partidas_catalogo: partidas,
    plan_avance: (cronoObra||[]).filter(r => r.fin).map(r => ({ fecha: r.fin, avance_planificado_pct: +r.avance || 0 })).sort((a,b)=> a.fecha.localeCompare(b.fecha)),
  };
}
// === REPORTE DIARIO (RDO) ===
function armarReporteDiarioJSON(visita, obra, cronoObra=[], cfg={}, visitasObra=[]) {
  // Correlativo: posición de esta visita en el orden cronológico de visitas de la obra
  const ordenadas = (visitasObra||[]).filter(v => v.obraId === visita.obraId).sort((a,b) => a.fecha.localeCompare(b.fecha));
  const rdoNumero = ordenadas.findIndex(v => v.id === visita.id) + 1 || ordenadas.length + 1;
  // Personal: sumar cuadrillas. Si no hay segmentación por categoría, marcar todo en "operario".
  const cuadrilla = { horas_jornada: 8.5, capataz: 0, operario: 0, oficial: 0, peon: 0 };
  (visita.cuadrillas || []).forEach(c => {
    const cat = ((c.categoria || c.frente || "")).toLowerCase();
    const n = +c.personas || 0;
    if (cat.includes("capataz")) cuadrilla.capataz += n;
    else if (cat.includes("oficial")) cuadrilla.oficial += n;
    else if (cat.includes("peon") || cat.includes("peón")) cuadrilla.peon += n;
    else cuadrilla.operario += n;
  });
  // Avance partidas: mapear avancePartidas de la visita o usar el crono
  const partidasCat = (cronoObra||[]).filter(r => r.partida).map((r, i) => ({ id: r.id, pid: "P" + String(i+1).padStart(2,"0"), nombre: r.partida }));
  const avancePart = partidasCat.map(p => ({
    partida_id: p.pid,
    programado_dia: 0,
    ejecutado_dia: 0,
    acumulado: 0,
  }));
  // Si la visita tiene avancePartidas (legacy), agregar notas
  // Si no, dejar en 0 para que el supervisor edite el JSON
  // Materiales y equipos: vacíos por defecto
  const materiales = visita.materialesRDO || [];
  const equipos = visita.equiposRDO || [];
  // Checklist SSOMA: del visita.checkSeguridad si existe, sino lista default vacía
  const checklist = CHECKLIST_SSOMA_DEFAULT.map(item => ({ item, cumple: !!(visita.checkSeguridad||{})[item.toLowerCase().replace(/\s+/g,'_')], observacion: "" }));
  // Fotos: convertir todas a {titulo, imagen}
  const fotos = [];
  (visita.fachadaFotos||[]).forEach(f => fotos.push({ titulo: "Fachada" + (f.cap?" — "+f.cap:""), imagen: f.data }));
  (visita.eppFotos||[]).forEach(f => fotos.push({ titulo: "EPP" + (f.cap?" — "+f.cap:""), imagen: f.data }));
  (visita.procesosFotos||[]).forEach(f => fotos.push({ titulo: "Procesos" + (f.cap?" — "+f.cap:""), imagen: f.data }));
  (visita.fotos||[]).forEach(f => fotos.push({ titulo: f.cap || "General", imagen: f.data }));
  return {
    tipo_reporte: "reporte_diario",
    obra_id: obra?.id || _obraSlug(obra),
    rdo_numero: rdoNumero,
    fecha: visita.fecha,
    clima: visita.clima || "",
    temperatura_c: +visita.temperatura || null,
    jornada_inicio: visita.jornadaInicio || obra?.horaInicio || "08:00",
    jornada_fin: visita.jornadaFin || "17:00",
    estado_dia: visita.alerta === "Rojo" ? "Crítico · atrasado" : visita.alerta === "Ámbar" ? "En avance · leve atraso" : "En avance · al día",
    cuadrilla,
    avance_partidas: avancePart,
    comentario_avance: visita.avanceNota || visita.resumen || "",
    materiales,
    equipos,
    ssoma: { charla_asistentes: cuadrilla.capataz + cuadrilla.operario + cuadrilla.oficial + cuadrilla.peon, checklist },
    incidencias_dia: (visita.incidencias||[]).length,
    observaciones: visita.requerimientos || visita.coordCliente || "",
    fotos,
  };
}
// === REPORTE DE INCIDENCIA (RI) ===
function armarReporteIncidenciaJSON(inc, obra, cfg={}, incidenciasObra=[]) {
  const orden = (incidenciasObra||[]).filter(x => x.obraId === inc.obraId).sort((a,b) => (a.fecha+a.id).localeCompare(b.fecha+b.id));
  const incNumero = orden.findIndex(x => x.id === inc.id) + 1 || orden.length + 1;
  const probabilidad = inc.probabilidad || (inc.sev === "Alta" ? "Media" : "Baja");
  const severidad = inc.sev || "Baja";
  return {
    tipo_reporte: "reporte_incidencia",
    obra_id: obra?.id || _obraSlug(obra),
    inc_numero: incNumero,
    fecha: inc.fecha,
    hora: inc.hora || "",
    tipo: inc.tipo || "Otro",
    subtipo: inc.subtipo || "",
    rdo_vinculado: inc.repId ? "RDO-" + _obraSlug(obra) + "-" + (inc.repId.slice(-3)) : "",
    reportado_por: inc.reportadoPor || cfg.supervisor || "",
    ubicacion: inc.ubicacion || "",
    detuvo_trabajos: !!inc.detuvoTrabajos,
    tiempo_detencion_min: +inc.tiempoDetencion || 0,
    lesionados: +inc.lesionados || 0,
    lesionados_detalle: inc.lesionadosDetalle || "",
    dano_material: inc.danoMaterial || "Ninguno",
    descripcion: inc.desc || "",
    probabilidad,
    severidad,
    criticidad: inc.criticidad || _calcCriticidad(probabilidad, severidad),
    causa_raiz: { porques: inc.porques || [], raiz: inc.causaRaiz || "" },
    acciones: inc.acciones && inc.acciones.length ? inc.acciones : [
      { tipo: "Inmediata",  accion: inc.accion || "", responsable: cfg.supervisor || "", plazo: inc.fecha, estado: inc.estado || "En proceso" },
    ],
    impacto: {
      tiempo_perdido: inc.tiempoPerdido || ((+inc.tiempoDetencion||0) ? (inc.tiempoDetencion + " min") : ""),
      costo_estimado: +inc.costoEstimado || 0,
      afecta_cronograma: !!inc.afectaCronograma,
      afecta_calidad: !!inc.afectaCalidad,
    },
    fotos: (inc.fotos||[]).map(f => ({ titulo: f.cap || "Evidencia", imagen: f.data })),
  };
}
// === REPORTE SEMANAL (RSO) ===
function armarReporteSemanalJSON(obra, cronoObra, visitasSemana, incidenciasSemana, cfg, planLookahead, conclusiones, periodo) {
  const semana_numero = periodo?.semanaNumero || 1;
  return {
    tipo_reporte: "reporte_semanal",
    obra_id: obra?.id || _obraSlug(obra),
    semana_numero,
    periodo_inicio: periodo?.desde || "",
    periodo_fin: periodo?.hasta || "",
    rdo_incluidos: (visitasSemana||[]).map((v,i) => "RDO-" + _obraSlug(obra) + "-" + String((i+1)).padStart(3,"0")),
    reportes_diarios: (visitasSemana||[]).map(v => armarReporteDiarioJSON(v, obra, cronoObra, cfg, visitasSemana)),
    incidencias_semana: (incidenciasSemana||[]).map(i => armarReporteIncidenciaJSON(i, obra, cfg, incidenciasSemana)),
    planificacion_proxima: planLookahead || [],
    conclusiones: conclusiones || [],
    estado_semana: "",
  };
}

// === MODAL UNIVERSAL para mostrar el JSON y copiarlo ===
function ClaudePayloadModal({ open, onClose, titulo, payload, instruccion, filename }) {
  const [copiado, setCopiado] = useState(false);
  if (!open) return null;
  const jsonStr = JSON.stringify(payload, null, 2);
  const copiar = async () => {
    try { await navigator.clipboard.writeText(jsonStr); setCopiado(true); setTimeout(()=>setCopiado(false), 2200); }
    catch { alert("No se pudo copiar. Tocá el área del JSON, mantené pulsado y seleccioná Copiar."); }
  };
  const descargar = () => {
    try {
      const blob = new Blob([jsonStr], { type:"application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = (filename || "payload") + ".json";
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(a.href), 800);
    } catch (e) { alert("Error al descargar: " + e.message); }
  };
  return (
    <Modal open={open} onClose={onClose} title={titulo} maxWidth={700}>
      <div style={{ fontSize:12.5, color:"var(--ink2)", marginBottom:10, lineHeight:1.5, padding:10, background:"var(--surface)", borderRadius:8, border:"1px solid var(--border-soft)", whiteSpace:"pre-wrap" }}>{instruccion}</div>
      <div style={{ display:"flex", gap:7, marginBottom:9 }}>
        <button onClick={copiar} className="btn" style={{ flex:2, background: copiado ? "var(--verde)" : "linear-gradient(135deg, var(--accent), #ff8855)", color:"#fff", padding:12, fontSize:13, fontWeight:600 }}>{copiado ? "✓ JSON copiado" : "📋 Copiar JSON al portapapeles"}</button>
        <button onClick={descargar} className="btn" style={{ flex:1, background:"var(--surface3)", color:"var(--ink)", padding:12, fontSize:13 }}>💾 .json</button>
        <a href="https://claude.ai/new" target="_blank" rel="noreferrer" className="btn" style={{ flex:1, background:"var(--ia)", color:"#fff", padding:12, fontSize:13, textAlign:"center", textDecoration:"none" }}>🤖 Claude.ai</a>
      </div>
      <pre className="mono" style={{ background:"var(--bg)", padding:11, borderRadius:8, fontSize:11, maxHeight:"45vh", overflow:"auto", whiteSpace:"pre-wrap", wordBreak:"break-all", color:"var(--ink)", border:"1px solid var(--border)", lineHeight:1.4 }}>{jsonStr}</pre>
      <div style={{ fontSize:11, color:"var(--ink3)", marginTop:9, lineHeight:1.45 }}>💡 Pesa {(jsonStr.length/1024).toFixed(1)} KB. Si tiene muchas fotos podés descargar el .json y adjuntarlo en Claude.</div>
    </Modal>
  );
}

        <QA icon={MessageSquare} label="Nota" onClick={onQuickNota} color="var(--ia)" badge={notasPend.length} />

        <QA icon={CalendarClock} label="Mi semana" onClick={goAgenda} color="var(--cyan)" />
      </div>

      {/* Cumplimiento del día */}
      {(() => {
        const conPlan = obras.filter(o => planesDiarios[o.id]?.[today]);
        if (!conPlan.length) return null;
        return (
          <div className="card" style={{ padding:14, marginBottom:12 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
              <div className="lbl" style={{ marginBottom:0 }}><CheckCircle2 size={11} style={{verticalAlign:-1, marginRight:4}} color="var(--verde)" /> Cumplimiento del día</div>
              <span className="chip" style={{ background:"var(--surface3)", color:"var(--ink2)" }}>{conPlan.length}</span>
            </div>
            {conPlan.map(o => {
              const dia = planesDiarios[o.id][today];
              const total = dia.items.length;
              const hechos = dia.items.filter(i => i.hecho).length;
              const pct = total ? Math.round(hechos/total*100) : 0;
              const col = pct >= 80 ? "var(--verde)" : pct >= 50 ? "var(--ambar)" : "var(--rojo)";
              return (
                <div key={o.id} onClick={goCumplimiento} style={{ padding:"9px 0", borderBottom:"1px solid var(--border-soft)", cursor:"pointer" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                    <span style={{ fontWeight:500, fontSize:13.5 }}>{o.nombre}</span>
                    <span className="mono" style={{ fontSize:12, fontWeight:600, color:col }}>{hechos}/{total} · {pct}%</span>
                  </div>
                  <div style={{ height:4, background:"var(--surface3)", borderRadius:99 }}><div style={{ width: pct+"%", height:"100%", background: col, borderRadius:99, boxShadow:`0 0 8px ${col}66` }} /></div>
                </div>
              );
            })}
            <button onClick={goCumplimiento} className="btn" style={{ background:"transparent", color:"var(--accent)", padding:"8px 0 0", width:"100%", fontSize:12.5, fontWeight:500 }}>Marcar actividades →</button>
          </div>
        );
      })()}

      {/* Notas pendientes */}
      {notasPend.length > 0 && (
        <div className="card" style={{ padding:14, marginBottom:12 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
            <div className="lbl" style={{ marginBottom:0 }}><Flag size={11} style={{verticalAlign:-1, marginRight:4}} color="var(--ia)" /> Pendientes en próxima visita</div>
            <span className="chip" style={{ background:"var(--ia-glow)", color:"var(--ia)" }}>{notasPend.length}</span>
          </div>
          {notasPend.slice(0,6).map(n => { const o = obras.find(x=>x.id===n.obraId); return (

              </div>
              {onMarcarNota && <button onClick={() => onMarcarNota(n.id, "Resuelta")} className="btn" style={{ background:"var(--verde)", color:"#fff", padding:"4px 9px", fontSize:11, alignSelf:"flex-start", flex:"0 0 auto", borderRadius:6 }}>✓</button>}
            </div>
          ); })}
          {notasPend.length > 6 && <button onClick={goNotas} className="btn" style={{ background:"transparent", color:"var(--ia)", padding:"8px 0 0", width:"100%", fontSize:12.5, fontWeight:500 }}>Ver {notasPend.length - 6} más →</button>}
        </div>
      )}

      {/* Obras */}
      <div className="card" style={{ padding:14, marginBottom:12 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
          <div className="lbl" style={{ marginBottom:0 }}><Building2 size={11} style={{verticalAlign:-1, marginRight:4}} color="var(--accent)" /> Tus obras</div>
          <button onClick={goObras} className="btn" style={{ background:"var(--surface3)", color:"var(--ink2)", padding:"4px 10px", fontSize:11, borderRadius:6 }}>Gestionar</button>
        </div>
        {obras.map(o => {
          const d = diasPara(o.fechaApertura);
          const np = notas.filter(n => n.obraId === o.id && n.estado === "Pendiente").length;
          const ia = incidencias.filter(i => i.obraId === o.id && i.estado === "Abierta").length;
          const urgent = d != null && d < 7;
          return (
            <div key={o.id} onClick={()=>onAbrirObra && onAbrirObra(o.id)} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"11px 0", borderBottom:"1px solid var(--border-soft)", cursor:"pointer", gap:8 }}>
              <div style={{ minWidth:0, flex:1, display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ width:34, height:34, borderRadius:9, background: urgent ? "rgba(244,63,94,.12)" : "var(--surface2)", border:"1px solid var(--border)", display:"flex", alignItems:"center", justifyContent:"center", flex:"0 0 auto" }}>
                  <span className="mono" style={{ fontSize:11, fontWeight:700, color: urgent ? "var(--rojo)" : "var(--ink2)" }}>{d!=null ? (d>=0?d+"d":"!") : "—"}</span>
                </div>
                <div style={{ minWidth:0 }}>
                  <div style={{ fontWeight:600, fontSize:13.5, color:"var(--ink)" }}>{o.nombre}</div>
                  <div style={{ fontSize:11.5, color:"var(--ink3)", marginTop:1 }}>{o.cliente} · {o.etapa || "—"}</div>
                </div>
              </div>
              <div style={{ display:"flex", gap:4 }}>
                {np>0 && <span className="chip" style={{ background:"var(--ia-glow)", color:"var(--ia)", fontSize:10 }}>{np} 📝</span>}
                {ia>0 && <span className="chip" style={{ background:"rgba(245,158,11,.12)", color:"var(--ambar)", fontSize:10 }}>{ia} ⚠</span>}
              </div>
            </div>
          );
        })}
        {!obras.length && <div style={{ color:"var(--ink3)", fontSize:13, padding:"12px 0" }}>Sin obras registradas.</div>}
      </div>

      {proximas.length > 0 && (
        <div className="card" style={{ padding:14, marginBottom:12 }}>
          <div className="lbl" style={{ marginBottom:10 }}><CalendarRange size={11} style={{verticalAlign:-1, marginRight:4}} color="var(--cyan)" /> Próximas aperturas</div>
          {proximas.map(o => { const d = diasPara(o.fechaApertura); return (
            <div key={o.id} style={{ display:"flex", justifyContent:"space-between", padding:"7px 0", borderBottom:"1px solid var(--border-soft)" }}>
              <div style={{ fontSize:13 }}><span style={{ fontWeight:600 }}>{o.nombre}</span> <span style={{ color:"var(--ink3)", fontSize:11.5 }}>· {o.cliente}</span></div>
              <span className="mono" style={{ fontSize:11.5, fontWeight:700, color: d<7 ? "var(--rojo)" : "var(--ink2)" }}>{d>=0?d+"d":"venc."}</span>
            </div>
          ); })}
        </div>
      )}
    </div>
  );
}

/* ============================ APP ROOT ============================ */
function App() {
  const [loading, setLoading] = useState(true);
  const [tab, _setTab] = useState("inicio");
  const [lastTab, setLastTab] = useState("inicio");
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [updateAvail, setUpdateAvail] = useState(false);
  const backExitRef = useRef(0);
  const setTab = (newTab) => {
    setLastTab(prev => tab === "ia" ? prev : tab);
    _setTab(newTab);
    // History API: cada cambio de tab agrega entrada para que botón atrás funcione
    try { window.history.pushState({ tab: newTab }, "", "#" + newTab); } catch {}
  };

  // BACK BUTTON: cuando el usuario va atrás (Android, gesto, browser back) → ir a inicio. Doble back en inicio = salir.
  useEffect(() => {
    const onPop = (e) => {
      if (tab !== "inicio") {
        _setTab("inicio");
        try { window.history.pushState({ tab: "inicio" }, "", "#inicio"); } catch {}
      } else {
        // En inicio: si apretó atrás otra vez dentro de 2s, dejar que salga (no pushear)
        const now = Date.now();
        if (now - backExitRef.current < 2000) {
          // dejar pasar (el navegador / sistema cerrará la app)
          return;
        }
        backExitRef.current = now;
        try { window.history.pushState({ tab: "inicio" }, "", "#inicio"); } catch {}
        // Toast: avisar al usuario
        const t = document.createElement("div");
        t.style.cssText = "position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:rgba(10,13,19,.95);color:#fff;padding:11px 18px;border-radius:24px;font-size:13px;z-index:9999;border:1px solid var(--accent);font-family:'Space Grotesk',sans-serif;box-shadow:0 4px 20px rgba(0,0,0,.5)";
        t.textContent = "Presioná atrás otra vez para salir";
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 1900);
      }
    };
    window.addEventListener("popstate", onPop);
    // Asegurar que haya al menos 1 entrada en history al cargar para que back funcione
    try { window.history.pushState({ tab: "inicio" }, "", "#inicio"); } catch {}
    return () => window.removeEventListener("popstate", onPop);
  }, [tab]);

  // UPDATE NOTIFICATION: chequear si hay nueva versión en el servidor cada 5 min

    const ownVersion = document.querySelector('meta[name="version"]')?.getAttribute("content") || "";
    const check = async () => {
      try {
        const r = await fetch(location.pathname + "?_=" + Date.now(), { cache: "no-store" });
        if (!r.ok) return;
        const txt = await r.text();
        const m = txt.match(/<meta\s+name=["']version["']\s+content=["']([^"']+)["']/);
        if (m && m[1] && m[1] !== ownVersion) setUpdateAvail(true);
      } catch {}
    };
    const t = setInterval(check, 5 * 60 * 1000);

function JornadaScreen({ obras, log, save, cfg }) {
  const [modo, setModo] = useState("solicitud"); // "solicitud" (yo pido al residente) o "envio" (yo redacto y envío)

  const [preview, setPreview] = useState(false);
  const obra = obras.find(o => o.id === obraId);
  const today = hoy();

  useEffect(() => {
    setData(prev => ({ ...blankJornadaForm(obraId), residente: obra?.residente || "", pdr: obra?.pdr || "" }));
  }, [obraId]);

  const tlog = log[today] || {};
  const sent = tlog[obraId]?.[tipo];

  const up = (k, v) => setData(s => ({ ...s, [k]: v }));
  const setAct = (i, v) => up("actividades", data.actividades.map((a, idx) => idx === i ? v : a));
  const addAct = () => up("actividades", [...data.actividades, ""]);
  const delAct = (i) => up("actividades", data.actividades.filter((_, idx) => idx !== i));
  const setCant = (i, k, v) => up("cantidad", data.cantidad.map((c, idx) => idx === i ? { ...c, [k]: v } : c));
  const addCant = () => up("cantidad", [...data.cantidad, { esp: "Otro", n: 0 }]);
  const delCant = (i) => up("cantidad", data.cantidad.filter((_, idx) => idx !== i));

  const texto = reporteJornadaTexto(tipo, obra, data);
  const marcarEnviado = () => { const next = { ...log, [today]: { ...tlog, [obraId]: { ...(tlog[obraId]||{}), [tipo]: true } } }; save(next); };

  if (!obras.length) return <div style={{ padding:30, textAlign:"center", color:"var(--ink2)" }}>Registrá una tienda primero.</div>;
  if (preview) return (
    <div style={{ padding:14, paddingBottom:110 }}>
      <button className="btn" onClick={() => setPreview(false)} style={{ background:"transparent", padding:"4px 0", marginBottom:8 }}><ChevronLeft size={18} style={{verticalAlign:-4}} /> Editar</button>
      <Section title={`Reporte de ${tipo}`} icon={MessageCircle}>
        <div className="card" style={{ background:"#dcf8c6", padding:12, borderRadius:14, border:"none" }}>
          <pre className="mono" style={{ whiteSpace:"pre-wrap", fontSize:13, margin:0, lineHeight:1.5 }}>{texto}</pre>

function decisionEmail(d, obra, cfg) {
  const to = [cfg.emailLogistica, cfg.emailGerencia].filter(Boolean).join(",");
  const subj = `[GLD] Decisión de obra — ${d.tipo} — ${obra?.nombre || ""}`;
  const L = ["Estimados (Logística / Gerencia):", "",
    "En mi rol de Supervisor de Producción comunico la siguiente decisión tomada en obra:", "",
    `Obra: ${obra?.cliente || ""} · ${obra?.nombre || ""}`];
  if (obra?.direccion) L.push(`Local: ${obra.direccion}`);
  L.push(`Fecha: ${d.fecha}`, `Tipo: ${d.tipo}`, `Detalle: ${d.descripcion}`);
  if (d.proveedor) L.push(`Proveedor: ${d.proveedor}`);
  if (d.monto) L.push(`Monto: ${d.moneda} ${d.monto}`);
  L.push(`Urgencia: ${d.urgencia}`);
  if (d.pagoInmediato) L.push("", "SOLICITO PROCEDER CON EL PAGO INMEDIATO AL PROVEEDOR INDICADO, para no afectar el avance ni la fecha de apertura.");
  L.push("", "Atentamente,", `${cfg.supervisor || "Renzo Moscol"} — Supervisor de Producción, GLD`);
  return { to, subj, body: L.join("\n") };
}
const estadoDecColor = (e) => e === "Pagado" ? "var(--verde)" : e === "Enviado" ? "var(--ambar)" : "var(--ink2)";
