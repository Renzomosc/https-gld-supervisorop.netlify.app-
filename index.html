  const obra = obras.find(o => o.id === obraId);
  const SUBS = [["dash","Dashboard",BarChart3],["zonas","Zonas",Layers],["partida","Partida",Flag],["crono","Cronograma",CalendarRange],["planos","Planos",Upload],["entrega","Entrega + Calidad",PackageCheck]];
  if (!obras.length) return <div style={{ padding:30, textAlign:"center", color:"var(--ink2)" }}>Registrá una tienda primero.</div>;
  return (
    <div style={{ paddingBottom:110 }}>
      <div style={{ padding:14, paddingBottom:0 }}>
        <Sel value={obraId} onChange={e => setObraId(e.target.value)} options={obras.map(o => ({ value:o.id, label:`${o.cliente} · ${o.nombre}` }))} />
      </div>
      <div style={{ display:"flex", gap:6, overflowX:"auto", padding:"12px 14px" }}>
        {SUBS.map(([k,l,Ico]) => (
          <button key={k} className="btn" onClick={() => setSub(k)} style={{ flex:"0 0 auto", padding:"7px 12px", fontSize:13, background: sub === k ? "var(--accent)" : "var(--paper)", color: sub === k ? "#fff" : "var(--ink2)", border:"1px solid var(--line)", display:"flex", alignItems:"center", gap:5 }}><Ico size={14} /> {l}</button>
        ))}
      </div>
      {sub === "dash" && <ObraDash obra={obra} visitas={visitas} calidad={calidad[obraId]} crono={crono[obraId]} plan={plan[obraId]} incidencias={incidencias} notas={notas} cerebro={cerebro} apiKey={apiKey} onUpdateVisita={onUpdateVisita} zonasObra={zonas[obraId] || []} />}
      {sub === "partida" && <PartidaScreen obra={obra} data={partidas[obraId]} save={savePartida} saveCrono={saveCrono} />}
      {sub === "crono" && <Cronograma obra={obra} obraId={obraId} rows={crono[obraId] || []} save={saveCrono} cronoDoc={cronoDocs[obraId]} saveCronoDoc={saveCronoDoc} visitas={visitas} notas={notas} incidencias={incidencias} cerebro={cerebro} apiKey={apiKey} savePlanDiario={savePlanDiario} />}
      {sub === "entrega" && <EntregaScreen obra={obra} data={entregas[obraId]} save={saveEntrega} cerebro={cerebro} apiKey={apiKey} zonasObra={zonas[obraId] || []} />}
      {sub === "cal" && <CalidadList obraId={obraId} items={calidad[obraId]} save={saveCal} />}
      {sub === "plan" && <PlanList obraId={obraId} rows={plan[obraId] || []} save={savePlan} />}
      {sub === "planos" && <PlanosManager obraId={obraId} idx={planosIdx[obraId] || []} loadPlano={loadPlano} save={savePlano} del={delPlano} />}
      {sub === "zonas" && <ZonasManager obra={obra} obraId={obraId} zonas={zonas[obraId] || []} save={saveZonas} visitas={visitas} />}
    </div>
  );
}
function ObraDash({ obra, visitas, calidad, crono, plan, incidencias, notas, cerebro=[], apiKey, onUpdateVisita, zonasObra=[] }) {
  const [iaLoad, setIaLoad] = useState(false);
  if (!obra) return null;
  const reps = visitas.filter(v => v.obraId === obra.id);
  const ult = [...reps].sort((a, b) => b.fecha.localeCompare(a.fecha))[0];
  const aiCritEsError = ult?.aiCritico && (ult.aiCritico.startsWith("⚠") || ult.aiCritico.includes("No tenés API key"));
  const regenerarIA = async () => {
    if (!ult) return;
    if (!apiKey) return alert("Activá la IA primero (Ajustes → API key).");
    setIaLoad(true);
    const otras = visitas.filter(v => v.obraId === obra.id && v.id !== ult.id).sort((a,b) => b.fecha.localeCompare(a.fecha)).slice(0,5).map(({fotos,fachadaFotos,eppFotos,procesosFotos,avancePartidas,...r}) => r);
    const ctx = { obra, visita: { ...ult, fotos: (ult.fotos||[]).map(x=>x.cap).filter(Boolean), fachadaFotos:undefined, eppFotos:undefined, procesosFotos:undefined }, cronograma: crono || [], visitasAnteriores: otras, dias_a_apertura: diasPara(obra?.fechaApertura) };
    const cb = cerebroContexto(cerebro, [ult.avanceNota, ult.resumen, ult.requerimientos].filter(Boolean).join(" "));
    const prompt = `Eres el copiloto de Renzo Moscol (Supervisor de Producción GLD). Analizá esta visita y devolveme un JSON con DOS bloques. Respondé SOLO con JSON (sin code fences).

Esquema:
{
  "criticoTexto": "<análisis ejecutivo, máx 8 líneas>",
  "alertaNivel": "<Crítico | Alto | Medio | Bajo | Normal>",
  "alertaTexto": "<línea directa con el riesgo MÁS importante hoy. Vacío si Normal>",
  "prediccion": "<predicción de impacto a apertura/cronograma si nada cambia. Vacío si no hay riesgo>",
  "acciones": ["<2-5 acciones concretas para próximas 24h>"],
  "patrones": "<patrón cruzando con visitas anteriores. Vacío si primera visita o no hay patrón>"
}${cb ? "\n\nCEREBRO:\n"+cb : ""}\n\nDATOS:\n${JSON.stringify(ctx)}`;
    const t = await askClaude([{ role:"user", content: prompt }], apiKey, 1800);
    setIaLoad(false);
    if (!t || t.startsWith("⚠")) { alert(t || "No recibí respuesta."); return; }
    try {
      const m = t.match(/\{[\s\S]*\}/); if (!m) throw new Error("sin JSON");
      const r = JSON.parse(m[0]);
      onUpdateVisita({ ...ult, aiCritico: r.criticoTexto || "", aiAlertaNivel: r.alertaNivel || "Normal", aiAlerta: r.alertaTexto || "", aiPrediccion: r.prediccion || "", aiAcciones: Array.isArray(r.acciones) ? r.acciones : [], aiPatrones: r.patrones || "" });
    } catch { onUpdateVisita({ ...ult, aiCritico: t, aiAlertaNivel:"" }); }
  };
  const dias = diasPara(obra.fechaApertura);
  const calItems = calidad || []; const calBase = calItems.filter(i => i.estado !== "No aplica" && i.estado !== "Pendiente");
  const calPct = calBase.length ? Math.round(calBase.filter(i => i.estado === "Conforme").length / calBase.length * 100) : 0;
  const avance = (crono && crono.length) ? Math.round(crono.reduce((a, t) => a + (+t.avance || 0), 0) / crono.length) : (plan && plan.length) ? Math.round(plan.reduce((a, t) => a + (+t.real || 0), 0) / plan.length) : 0;
  const incAb = incidencias.filter(i => i.obraId === obra.id && i.estado === "Abierta").length;
  const notPend = notas.filter(n => n.obraId === obra.id && n.estado === "Pendiente").length;
  const KPI = ({ v, l, c }) => (<div className="card" style={{ flex:1, padding:12, textAlign:"center", minWidth:0 }}><div className="disp" style={{ fontSize:22, color: c || "var(--ink)" }}>{v}</div><div className="lbl" style={{ marginBottom:0, fontSize:10 }}>{l}</div></div>);
  const Bar = ({ label, pct, c }) => (<div style={{ marginBottom:10 }}><div style={{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:4 }}><span style={{ fontWeight:600 }}>{label}</span><span className="mono" style={{ fontWeight:700 }}>{pct}%</span></div><div style={{ height:9, background:"var(--surface2)", color:"var(--ink)", borderRadius:9 }}><div style={{ width: pct + "%", height:"100%", background: c, borderRadius:9 }} /></div></div>);
  return (
    <div style={{ padding:14 }}>
      <div style={{ display:"flex", gap:8, marginBottom:10 }}>
        <KPI v={dias != null ? (dias >= 0 ? dias + "d" : "venc") : "—"} l="A apertura" c={dias != null && dias < 7 ? "var(--rojo)" : "var(--accent)"} />
        <KPI v={avance + "%"} l="Avance" c="var(--verde)" />
        <KPI v={reps.length} l="Visitas" />
      </div>
      <div style={{ display:"flex", gap:8, marginBottom:12 }}>
        <KPI v={incAb} l="Incid. abiertas" c={incAb ? "var(--rojo)" : "var(--ink)"} />
        <KPI v={notPend} l="Notas pend." c={notPend ? "var(--ia)" : "var(--ink)"} />
        <KPI v={ult ? ult.alerta : "—"} l="Estado" c={ult ? semColor(ult.alerta) : "var(--ink2)"} />
      </div>
      <Section title="Indicadores">
        <Bar label="Avance de obra" pct={avance} c="var(--verde)" />
        <Bar label="Calidad conforme" pct={calPct} c={calPct >= 80 ? "var(--verde)" : "var(--ambar)"} />
      </Section>

      {/* Zonas vigentes con fecha de liberación */}
      {(() => {
        const zonasActivas = zonasObra.filter(z => z.estado !== "Liberada" && z.estado !== "Pendiente");
        if (!zonasActivas.length) return null;
        return (
          <Section title="Zonas en obra" icon={Layers}>
            {zonasActivas.map(z => {
              const diasLib = z.fechaLiberacion ? diasPara(z.fechaLiberacion) : null;
              const colEst = ZONA_ESTADO_COL[z.estado] || "var(--ink2)";
              const colDias = diasLib != null && diasLib < 3 ? "var(--rojo)" : diasLib != null && diasLib < 7 ? "var(--ambar)" : "var(--verde)";
              return (
                <div key={z.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 0", borderBottom:"1px solid var(--border-soft)" }}>
                  <div style={{ minWidth:0, flex:1 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:3 }}>
                      <span style={{ fontWeight:600, fontSize:14 }}>{z.nombre}</span>
                      <span className="chip" style={{ background:`${colEst}22`, color:colEst, border:`1px solid ${colEst}55`, fontSize:10 }}>{z.estado}</span>
                    </div>
                    <div className="mono" style={{ fontSize:11, color:"var(--ink3)" }}>{z.avance || 0}% avance · {z.responsable || "sin resp."}</div>
                  </div>
                  <div style={{ textAlign:"right", minWidth:80 }}>
                    {z.fechaLiberacion ? (
                      <>
                        <div className="mono" style={{ fontSize:11, color:"var(--ink3)" }}>Libera</div>
                        <div className="disp" style={{ fontSize:14, color: colDias }}>{diasLib >= 0 ? diasLib+"d" : "venc."}</div>
                        <div className="mono" style={{ fontSize:10, color:"var(--ink3)" }}>{fmtFecha(z.fechaLiberacion)}</div>
                      </>
                    ) : (
                      <div className="mono" style={{ fontSize:10.5, color:"var(--ink3)" }}>Sin fecha<br />liberación</div>
                    )}
                  </div>
                </div>
              );
            })}
          </Section>
        );
      })()}
      {ult && ult.aiAlertaNivel && ult.aiAlerta && (
        <div style={{ padding:14, borderRadius:14, background: ALERTA_NIVEL_BG[ult.aiAlertaNivel] || ALERTA_NIVEL_BG["Medio"], border:`1.5px solid ${ALERTA_NIVEL_COL[ult.aiAlertaNivel] || "var(--ambar)"}`, marginBottom:12, boxShadow:`0 4px 24px -6px ${ALERTA_NIVEL_COL[ult.aiAlertaNivel]}33` }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:7 }}>
            <AlertTriangle size={18} color={ALERTA_NIVEL_COL[ult.aiAlertaNivel]} strokeWidth={2.4} />
            <span className="disp" style={{ fontSize:13.5, color: ALERTA_NIVEL_COL[ult.aiAlertaNivel], textTransform:"uppercase", letterSpacing:".05em" }}>Alerta {ult.aiAlertaNivel}</span>
          </div>
          <div style={{ fontSize:14.5, lineHeight:1.45, color:"var(--ink)", fontWeight:500 }}>{ult.aiAlerta}</div>
          {ult.aiPrediccion && <div style={{ marginTop:8, padding:9, background:"rgba(255,255,255,.04)", borderRadius:8, fontSize:12.5, color:"var(--ink2)", lineHeight:1.5, fontStyle:"italic" }}>📡 {ult.aiPrediccion}</div>}
          {Array.isArray(ult.aiAcciones) && ult.aiAcciones.length > 0 && (
            <div style={{ marginTop:10 }}>
              <div className="lbl" style={{ color:"var(--accent)", marginBottom:5 }}>⚡ Acciones próximas 24h</div>
              {ult.aiAcciones.map((a, i) => <div key={i} style={{ display:"flex", gap:7, fontSize:12.5, padding:"3px 0", color:"var(--ink)" }}><span style={{ fontWeight:700, color:"var(--accent)" }}>{i+1}.</span><span style={{ flex:1 }}>{a}</span></div>)}
            </div>
          )}
        </div>
      )}
      {ult && ult.aiPatrones && (
        <div style={{ padding:12, borderRadius:12, background:"rgba(167,139,250,.06)", border:"1px solid var(--ia)", marginBottom:12 }}>
          <div className="lbl" style={{ color:"var(--ia)", marginBottom:5 }}>🧠 Patrón detectado por cerebro</div>
          <div style={{ fontSize:13, lineHeight:1.5, color:"var(--ink)" }}>{ult.aiPatrones}</div>
        </div>
      )}
      {ult && (
        <Section title={`Última visita · ${fmtFecha(ult.fecha)}`}>
          <div style={{ fontSize:13.5, whiteSpace:"pre-wrap", color:"var(--ink2)" }}>{ult.resumen || ult.avanceNota || "Sin resumen"}</div>
          {ult.aiCritico && !aiCritEsError && <AIBox text={ult.aiCritico} label="Análisis ejecutivo" />}
          {aiCritEsError && <div style={{ marginTop:10, padding:10, background:"rgba(245,158,11,.08)", border:"1px solid var(--ambar)", borderRadius:10, fontSize:12.5, color:"var(--ink2)" }}>El análisis guardado es un mensaje de error de API. Regeneralo ahora que tenés la IA activa.</div>}
          {(!ult.aiCritico || aiCritEsError) && (
            <button className="btn" onClick={regenerarIA} disabled={iaLoad} style={{ background:"linear-gradient(135deg, var(--ia), #c4b5fd)", color:"#fff", padding:12, width:"100%", marginTop:10, boxShadow:"0 4px 16px -4px var(--ia-glow)" }}><Sparkles size={15} style={{verticalAlign:-3}} /> {iaLoad ? "Generando…" : (aiCritEsError ? "Regenerar análisis IA" : "Generar análisis estratégico")}</button>
          )}
          {ult.aiCritico && !aiCritEsError && (
            <button className="btn" onClick={regenerarIA} disabled={iaLoad} style={{ background:"transparent", color:"var(--ia)", padding:9, width:"100%", marginTop:6, fontSize:12.5, border:"1px solid var(--ia)" }}>{iaLoad ? "Regenerando…" : "Regenerar análisis"}</button>
          )}
        </Section>
      )}
    </div>
  );
}

/* ============================ INCIDENCIAS (vista transversal) ============================ */
function IncidenciasScreen({ obras, incidencias, save, cfg, cerebro=[], apiKey }) {
  const [verReporte, setVerReporte] = useState(null);
  const [reporteLoad, setReporteLoad] = useState(false);
  const [reporteIA, setReporteIA] = useState("");
  const [payloadRI, setPayloadRI] = useState(null);
  const generarReporte = async (inc) => {
    if (!apiKey) return alert("Activá la IA primero (Ajustes → API key).");
    setReporteLoad(true); setReporteIA(""); setVerReporte(inc);
    const obra = obras.find(o => o.id === inc.obraId);
    const cb = cerebroContexto(cerebro, inc.desc);
    const otras = incidencias.filter(x => x.obraId === inc.obraId && x.id !== inc.id).slice(0,8);
    const prompt = `Eres el copiloto de Renzo Moscol (Supervisor de Producción GLD). Generá un INFORME DE INCIDENCIA COMPACTO en español, técnico, justo y necesario. SIN floreo, SIN antecedentes largos, SIN sección de "prevención futura". Solo lo esencial.

Formato EXACTO (máx 8 líneas total):

INCIDENCIA · ${obra?.cliente} · ${obra?.nombre}
Fecha: ${fmtFecha(inc.fecha)} · Severidad: ${inc.sev}

Hecho: [1 frase técnica describiendo qué pasó, mejorando la redacción de la nota original]
Causa: [1 frase con la causa raíz más probable]
Impacto: [1 frase sobre cronograma/apertura/partidas afectadas]
Acción: [1-2 frases con acción inmediata, expandida pero concisa]
Responsable: [quién lo resuelve / a quién informar]

NOTA ORIGINAL: ${JSON.stringify({ desc: inc.desc, accion: inc.accion })}
OBRA: ${obra?.nombre} (${obra?.etapa || "—"}), apertura ${obra?.fechaApertura} (${diasPara(obra?.fechaApertura)}d)${cb ? "\nCEREBRO: "+cb.slice(0,500) : ""}

Reglas: sé compacto. Cada línea importa. No repitas info entre secciones. No agregues texto fuera del formato.`;
    const t = await askClaude([{ role:"user", content: prompt }], apiKey, 2000);

  const texto = () => { const L = ["REPORTE DE INCIDENCIAS — GLD", `Filtro: ${fObra === "todas" ? "Todas las obras" : obras.find(o => o.id === fObra)?.nombre} · ${fEstado}`, ""]; lista.forEach(x => L.push(`• [${x.sev}] ${x.obraNombre} (${fmtFecha(x.fecha)}) — ${x.desc}${x.accion ? ` → ${x.accion}` : ""} [${x.estado}]`)); if (!lista.length) L.push("Sin incidencias."); return L.join("\n"); };

      </Section>
      <div style={{ display:"flex", gap:10 }}>
        <button className="btn" onClick={() => setAdd(null)} style={{ flex:1, background:"var(--surface2)", color:"var(--ink)", padding:14 }}>Cancelar</button>

function reporteSemanalTexto(visitas, obras, desde, hasta) {
  const L = [`REPORTE SEMANAL DE SUPERVISIÓN — GLD`, `Periodo: ${fmtFecha(desde)} a ${fmtFecha(hasta)}   |   Para: Jefatura de Proyectos`, ""];
  const porObra = {}; visitas.forEach(r => { (porObra[r.obraId] = porObra[r.obraId] || []).push(r); });
  Object.entries(porObra).forEach(([oid, rs]) => { const obra = obras.find(o => o.id === oid); rs.sort((a, b) => a.fecha.localeCompare(b.fecha)); const ult = rs[rs.length - 1]; const dias = diasPara(obra?.fechaApertura); L.push(`■ ${obra?.cliente || ""} · ${obra?.nombre || "Obra"}`); if (dias != null) L.push(`   Apertura: ${obra.fechaApertura} (${dias >= 0 ? dias + " días" : "VENCIDA"})`); L.push(`   Visitas: ${rs.length}   |   Estado: ${ult.alerta.toUpperCase()}`); const desv = rs.filter(r => r.desviacion); const ries = rs.filter(r => r.riesgoCuello); const incA = rs.flatMap(r => r.incidencias.filter(i => i.sev === "Alta")); if (desv.length) L.push(`   Desviaciones: ${desv.map(r => r.desviacionNota).filter(Boolean).join(" / ")}`); if (ries.length) L.push(`   ⚠ Riesgos: ${ries.map(r => r.riesgoNota).filter(Boolean).join(" / ")}`); if (incA.length) L.push(`   Incidencias ALTAS: ${incA.map(i => i.desc).join(" / ")}`); if (ult.requerimientos) L.push(`   Adicionales: ${ult.requerimientos}`); if (ult.aiCritico) L.push(`   Análisis crítico: ${ult.aiCritico}`); else if (ult.resumen) L.push(`   Resumen: ${ult.resumen}`); L.push(""); });
  if (!visitas.length) L.push("Sin visitas en el periodo.");
  return L.join("\n");
}

function SemanalView({ obras, visitas, crono, incidencias, decisiones, cfg, apiKey }) {

// Detector de intent: "envíame el reporte de X obra del Y fecha en Word/Excel/PDF"
function detectarReporteIntent(texto, obras, visitas) {
  const t = (texto || "").toLowerCase();
  const wantsReport = /(reporte|informe)/.test(t);
  const wantsAction = /(descarg|env[íi]|m[áa]ndam|d[aá]me|necesit|quier|p[áa]same|gener|export)/.test(t);
  if (!wantsReport || !wantsAction) return null;
  let formato = "word";
  if (/excel|xls|hoja/.test(t)) formato = "excel";
  else if (/pdf|imprim/.test(t)) formato = "pdf";
  else if (/word|\.doc|documento\s*editab/.test(t)) formato = "word";
  let obraId = null;
  for (const o of (obras||[])) {
    const n = (o.nombre || "").toLowerCase();
    if (n && n.length > 3 && t.includes(n)) { obraId = o.id; break; }
    // Por palabra suelta del nombre (ej. "prescott")
    const palabras = n.split(/\s+/).filter(w => w.length > 4);
    if (palabras.some(w => t.includes(w))) { obraId = o.id; break; }
  }
  if (!obraId) {
    for (const o of (obras||[])) {
      const c = (o.cliente || "").toLowerCase();
      if (c && t.includes(c)) { obraId = o.id; break; }
    }
  }
  let fecha = null;
  const dmy = t.match(/(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/);
  if (dmy) {
    const d = dmy[1].padStart(2,"0"); const m = dmy[2].padStart(2,"0");
    let y = dmy[3] || String(new Date().getFullYear());
    if (y.length === 2) y = "20" + y;
    fecha = `${y}-${m}-${d}`;
  }
  const iso = t.match(/(20\d{2})-(\d{2})-(\d{2})/); if (iso) fecha = `${iso[1]}-${iso[2]}-${iso[3]}`;
  if (/\bhoy\b/.test(t)) fecha = hoy();
  if (/\bayer\b/.test(t)) { const d = new Date(); d.setDate(d.getDate()-1); fecha = d.toISOString().slice(0,10); }
  let visita = null;
  const cands = (visitas||[]).filter(v => (!obraId || v.obraId === obraId) && (!fecha || v.fecha === fecha));
  if (cands.length) visita = cands.sort((a,b) => b.fecha.localeCompare(a.fecha))[0];
  else if (obraId) { const all = (visitas||[]).filter(v => v.obraId === obraId).sort((a,b)=>b.fecha.localeCompare(a.fecha)); visita = all[0]; }
  if (!visita) return { kind:"no-encontrado", obraId, fecha, formato };
  return { kind:"ok", visita, formato, obra: (obras||[]).find(o => o.id === visita.obraId) };
}

function IAChat({ obras, visitas, notas, incidencias, decisiones, crono, cerebro=[], apiKey, contextKey="general", contextData=null, onContextAction, zonas={} }) {
  const promptsContextuales = getContextualPrompts(contextKey);
  const [msgs, setMsgs] = useState([{
    role:"assistant",
    content: contextKey === "general"
      ? "Hola Renzo. Soy tu copiloto. Puedo: descargar reportes (decime 'descargá el reporte de Prescott del 29/05 en Word'), buscar info, generar planes, analizar visitas. Decime qué necesitás."
      : `Estás en ${contextKey === "visita" ? "una visita" : contextKey === "obra" ? "una obra" : contextKey}. Acá abajo tenés acciones rápidas, o preguntame lo que necesités.`
  }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);
  useEffect(() => { endRef.current?.scrollIntoView({ behavior:"smooth" }); }, [msgs, loading]);

  // Ejecutor de acciones de reporte
  const ejecutarDescargaReporte = (visita, obra, formato) => {
    const texto = reporteDiarioTexto(visita, obra, zonas[visita.obraId] || []);
    const nombreBase = `reporte-${obra?.nombre?.replace(/\s/g,"_")||"obra"}-${visita.fecha}`;
    if (formato === "word") {
      const allFotos = [
        ...(visita.fachadaFotos||[]).map(p=>({...p, sec:"Fachada"})),
        ...(visita.eppFotos||[]).map(p=>({...p, sec:"EPP"})),
        ...(visita.procesosFotos||[]).map(p=>({...p, sec:"Procesos"})),
        ...PARTIDAS_AVANCE.flatMap(([k,l]) => (visita.avancePartidas?.[k]?.fotos||[]).map(p=>({...p, sec:l}))),
        ...(visita.fotos||[]).map(p=>({...p, sec:"General"}))
      ];
      descargarWord(nombreBase, `Reporte Diario · ${obra?.nombre} · ${fmtFecha(visita.fecha)}`, texto, allFotos);
    } else if (formato === "excel") {
      const personalTotal = (visita.cuadrillas||[]).reduce((a,c) => a + (+c.personas || 0), 0);
      const rows = [
        { Sección:"Datos", Item:"Obra", Valor: obra?.nombre || "" },
        { Sección:"Datos", Item:"Cliente", Valor: obra?.cliente || "" },
        { Sección:"Datos", Item:"Fecha", Valor: visita.fecha },
        { Sección:"Datos", Item:"Supervisor", Valor: visita.supervisor || "" },
        { Sección:"Datos", Item:"Alerta", Valor: visita.alerta || "" },
        { Sección:"KPIs", Item:"Personal", Valor: personalTotal },
      ];
      (visita.cuadrillas||[]).forEach((c, i) => rows.push({ Sección:"Subcontratistas", Item: c.frente || `Frente ${i+1}`, Valor: c.llego === false ? `NO LLEGÓ${c.motivoNoLlego ? " — "+c.motivoNoLlego : ""}` : `${c.personas||0} pers · ${c.horaLlegada||c.hora||"—"}` }));
      PARTIDAS_AVANCE.forEach(([k, l]) => { const ap = visita.avancePartidas?.[k]; if (ap && ap.notas) rows.push({ Sección:"Avance", Item: l, Valor: ap.notas }); });
      (visita.incidencias||[]).forEach((c) => rows.push({ Sección:"Incidencias", Item: `[${c.sev}]`, Valor: c.desc + (c.accion ? " → "+c.accion : "") }));
      descargarExcelXML(nombreBase, [{ nombre:"Reporte", headers:["Sección","Item","Valor"], rows }]);
    } else if (formato === "pdf") {
      // Para PDF, mostramos mensaje (window.print solo funciona desde la pantalla del reporte)
      alert("Para PDF: andá a Reportes → tocá el reporte → tocá 'PDF' (botón naranja).");
    }
  };

  const send = async (q) => {
    const p = (q ?? input).trim(); if (!p || loading) return;
    setInput(""); const disp = [...msgs, { role:"user", content:p }]; setMsgs(disp); setLoading(true);
    // 1) Detectar intent de descarga de reporte
    const intent = detectarReporteIntent(p, obras, visitas);
    if (intent) {
      if (intent.kind === "ok") {
        const { visita, obra, formato } = intent;
        const fechaTxt = fmtFecha(visita.fecha);
        const txtFormato = formato === "excel" ? "Excel editable" : formato === "pdf" ? "PDF" : "Word editable";
        setMsgs([...disp, {
          role:"assistant",
          content: `✓ Encontré el reporte de ${obra?.nombre} (${obra?.cliente}) del ${fechaTxt}.\nFormato detectado: ${txtFormato}.\n\nTocá el botón abajo para descargarlo:`,
          actions: [
            { label: `📄 Descargar Word`, fn: () => ejecutarDescargaReporte(visita, obra, "word"), color:"#2b579a" },
            { label: `📊 Descargar Excel`, fn: () => ejecutarDescargaReporte(visita, obra, "excel"), color:"#107c41" },
          ]
        }]);
        setLoading(false);
        return;
      } else if (intent.kind === "no-encontrado") {
        const obra = (obras||[]).find(o => o.id === intent.obraId);
        const detalles = [obra ? `obra "${obra.nombre}"` : "obra (no identificada)", intent.fecha ? `fecha ${fmtFecha(intent.fecha)}` : "fecha (no especificada)"].join(" · ");
        setMsgs([...disp, { role:"assistant", content: `No encontré un reporte para: ${detalles}. ¿Querés que liste las visitas disponibles? Decime "lista visitas de Prescott" o pasame la fecha exacta (formato 29/05).` }]);
        setLoading(false);
        return;
      }
    }
    // 2) Intent: listar visitas de obra X
    const listMatch = /list(?:a|ame|á)\s+(?:las?\s+)?visitas?(?:\s+de)?\s+(.+)/i.exec(p);
    if (listMatch) {
      const target = listMatch[1].toLowerCase().trim();
      const obra = (obras||[]).find(o => (o.nombre||"").toLowerCase().includes(target) || (o.cliente||"").toLowerCase().includes(target));
      if (obra) {
        const vs = (visitas||[]).filter(v => v.obraId === obra.id).sort((a,b)=>b.fecha.localeCompare(a.fecha));
        if (vs.length === 0) {
          setMsgs([...disp, { role:"assistant", content: `No hay visitas registradas para ${obra.nombre}.` }]);
        } else {
          const lista = vs.slice(0, 12).map(v => `• ${fmtFecha(v.fecha)} — alerta ${v.alerta || "—"}`).join("\n");
          setMsgs([...disp, {
            role:"assistant",
            content: `Visitas de ${obra.nombre} (${vs.length} total):\n${lista}\n\nDecime "descargá el reporte del [fecha] en Word" para bajarlo.`,
            actions: vs.slice(0, 5).map(v => ({ label: `📄 Word ${v.fecha}`, fn: () => ejecutarDescargaReporte(v, obra, "word"), color:"#2b579a" }))
          }]);
        }
        setLoading(false);
        return;
      }
    }
    // 3) Llamada normal a Claude
    const baseCtx = { obras: obras?.length ? obras : [], visitas: (visitas||[]).map(({fotos,fachadaFotos,eppFotos,procesosFotos,avancePartidas,...r}) => r).slice(0,15), notas: notas||[], incidencias: incidencias||[], decisiones: decisiones||[], crono: crono||{} };
    const ctx = JSON.stringify(baseCtx);
    const ctxSpecific = contextData ? `\n\nDATOS ESPECÍFICOS DE LA PANTALLA ACTUAL (${contextKey}):\n${JSON.stringify(contextData).slice(0, 8000)}` : "";
    const cb = cerebroContexto(cerebro, p);
    const sys = `Eres el copiloto de Renzo Moscol (Supervisor de Producción, fit-out retail Aruma/Platanitos en Perú). Renzo trabaja con la empresa GLD (que ejecuta obras de Platanitos) y supervisa RAD 415 (que ejecuta obras de Aruma). Respondé en español, técnico, directo y conciso (sin floreo, sin 'antecedentes' largos). Usá los datos provistos. Si la pregunta es de generar un reporte/plan/análisis, devolvé el texto listo para enviar. Si el usuario pide "descargar/enviar reporte de tal obra del tal día en Word/Excel/PDF", recordale que esa acción la podés ejecutar directamente — tiene que decirlo claro con obra + fecha (ej: "descargá el reporte de Prescott del 29/05 en Word").${cb ? "\n\nCONOCIMIENTO DEL CEREBRO:\n"+cb : ""}\n\nCONTEXTO GLOBAL:\n${ctx}${ctxSpecific}`;
    const call = [{ role:"user", content: sys }, { role:"assistant", content:"Listo, tengo el contexto. ¿Qué necesitás?" }, ...disp.map(m => ({ role: m.role, content: m.content }))];
    const t = await askClaude(call, apiKey, 2000);
    setMsgs([...disp, { role:"assistant", content: t }]); setLoading(false);
  };
  return (
    <div style={{ display:"flex", flexDirection:"column", height:"calc(100vh - 108px)" }}>
      <div style={{ flex:1, overflowY:"auto", padding:14 }}>
        {msgs.map((m, i) => (
          <div key={i} style={{ display:"flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start", marginBottom:10 }}>
            <div style={{ maxWidth:"88%" }}>
              <div style={{ padding:"10px 13px", borderRadius:14, fontSize:14, lineHeight:1.5, whiteSpace:"pre-wrap", background: m.role === "user" ? "var(--accent)" : "var(--surface2)", color: m.role === "user" ? "#fff" : "var(--ink)", border: m.role === "user" ? "none" : "1px solid var(--border)" }}>{m.content}</div>
              {m.actions && m.actions.length > 0 && (
                <div style={{ display:"flex", gap:6, marginTop:7, flexWrap:"wrap" }}>
                  {m.actions.map((a, ai) => (
                    <button key={ai} className="btn" onClick={a.fn} style={{ background: a.color || "var(--accent)", color:"#fff", padding:"8px 12px", fontSize:12.5, fontWeight:600 }}>{a.label}</button>
                  ))}
                </div>
              )}
            </div>
          </div>
        ))}
        {loading && <div style={{ display:"flex", gap:4, padding:"6px 4px" }}><span className="dot" /><span className="dot" /><span className="dot" /></div>}
        {msgs.length <= 1 && (
          <>
            <div className="lbl" style={{ marginTop:10, marginBottom:8, color:"var(--ia)" }}>⚡ Acciones rápidas{contextKey !== "general" ? ` (${contextKey})` : ""}</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {promptsContextuales.map(s => <button key={s} className="btn" onClick={() => send(s)} style={{ fontSize:12, padding:"7px 11px", background:"rgba(167,139,250,.08)", color:"var(--ia)", border:"1px solid var(--ia)", fontWeight:500 }}>{s}</button>)}
            </div>
          </>
        )}
        <div ref={endRef} />
      </div>
      <div style={{ display:"flex", gap:8, padding:12, borderTop:"1px solid var(--border)", background:"var(--surface)" }}>
        <input className="inp" placeholder="Pregunta o pedí un reporte…" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter") send(); }} />
        <button className="btn" onClick={() => send()} disabled={loading} style={{ background:"linear-gradient(135deg, var(--ia), #c4b5fd)", color:"#fff", padding:"0 16px" }}><Send size={18} /></button>
      </div>
    </div>
  );
}

/* ============================ PLAN IA — Plan del día/semanal por obra desde cronograma ============================ */
function PlanesIAScreen({ obras, cronoDocs, crono, visitas, notas, incidencias, cerebro, apiKey, savePlanDiario }) {
  const [obraId, setObraId] = useState(obras[0]?.id || "");
  const [tipo, setTipo] = useState("dia");
  const [turnos, setTurnos] = useState("diurno");
  const [trabajosHechos, setTrabajosHechos] = useState("");
  const [output, setOutput] = useState("");
  const [loading, setLoading] = useState(false);
  const [chat, setChat] = useState([]);
  const [chatInput, setChatInput] = useState("");
  const [chatLoad, setChatLoad] = useState(false);
  const obra = obras.find(o => o.id === obraId);
  const cronoDoc = cronoDocs?.[obraId];
  const hasVisita = (visitas||[]).filter(v => v.obraId === obraId).length > 0;

  const generar = async () => {
    if (!apiKey) return alert("Activá la IA primero (Ajustes → API key).");
    if (!cronoDoc?.data && !(crono?.[obraId]||[]).length && !trabajosHechos.trim() && !hasVisita) {
      return alert("Necesito al menos: cronograma adjunto, partidas en cronograma, o trabajos ejecutados. Cargá uno de los tres.");
    }
    setLoading(true); setOutput("");
    const visObra = (visitas||[]).filter(v => v.obraId === obraId).sort((a,b) => b.fecha.localeCompare(a.fecha)).slice(0,5).map(({fotos,fachadaFotos,eppFotos,procesosFotos,avancePartidas,...r}) => r);
    const notObra = (notas||[]).filter(n => n.obraId === obraId && n.estado === "Pendiente");
    const incObra = (incidencias||[]).filter(i => i.obraId === obraId && i.estado === "Abierta");
    const cb = cerebroContexto(cerebro, (obra?.nombre || "") + " " + (obra?.cliente || ""));
    const turnoTxt = turnos === "ambos" ? "TURNOS DIURNO Y NOCTURNO. Distribuí actividades: ruido/cortes/polvo nocturno, instalación fina diurno." : turnos === "nocturno" ? "TURNO NOCTURNO (mall cerrado)." : "TURNO DIURNO estándar.";
    let prompt = "";
    if (tipo === "dia") {
      const dobleTurno = turnos === "ambos";
      const formato = dobleTurno
        ? `Buenos días equipo.\n\nPlanificación de obra – Doble turno\n\n📅 Fecha: ${fmtFecha(hoy())}\n🏬 Obra: ${obra?.cliente} · ${obra?.nombre}\n\n🔹 TURNO DÍA\n🕖 Horario: 7:00 a.m. – 5:00 p.m.\n\nActividades:\n- [actividad 1]\n- [...]\n\nResponsables:\n- [nombre]\n\nObjetivo:\n- [meta día]\n\n---\n\n🔹 TURNO NOCHE\n🕖 Horario: 7:00 p.m. – 7:00 a.m.\n\nActividades:\n- [...]\n\nResponsables:\n- [nombre]\n\nObjetivo:\n- [meta noche]\n\n⚠️ Consideraciones:\n- Uso obligatorio de EPP\n- Orden y limpieza\n- Reportar incidencias\n- Verificar iluminación / equipos en noche\n- Coordinación permanente\n`
        : `Buenos días equipo.\n\nPlanificación de obra – ${turnos === "nocturno" ? "Turno noche" : "Turno día"}\n\n📅 Fecha: ${fmtFecha(hoy())}\n🏬 Obra: ${obra?.cliente} · ${obra?.nombre}\n🕖 Horario: ${turnos === "nocturno" ? "7:00 p.m. – 7:00 a.m." : "7:00 a.m. – 5:00 p.m."}\n\nActividades:\n- [...]\n\nResponsables:\n- [...]\n\nObjetivo:\n- [meta]\n\n⚠️ Consideraciones:\n- Uso obligatorio de EPP\n- Orden y limpieza\n- Reportar incidencias\n- Coordinación permanente\n`;
      prompt = `Eres el copiloto de Renzo Moscol (Supervisor de Producción GLD, fit-out retail Aruma/Platanitos). Generá la PLANIFICACIÓN META DEL DÍA para hoy (${fmtFecha(hoy())}) en "${obra?.cliente} · ${obra?.nombre}". ${turnoTxt}\n\nFUENTE PRIORIDAD #1: el cronograma ADJUNTO (PDF/imagen). Leelo y derivá QUÉ TOCA EJECUTAR HOY según ese cronograma.\nFUENTE PRIORIDAD #2: trabajos ejecutados ayer (texto del usuario abajo).\nFUENTE #3: visitas anteriores.\nFUENTE #4: notas pendientes, incidencias abiertas, cerebro.\n\nDevolveme EL TEXTO COMPLETO para enviar al grupo WhatsApp, con EXACTAMENTE este formato (reemplazá [placeholders] con info real, accionable, específica):\n\n${formato}\n\nReglas:\n- Actividades verificables (no genéricas).\n- Si está atrasado, priorizalo y marcalo.\n- Si el cronograma adjunto dice que hoy toca X partida pero los trabajos ejecutados no la mencionan, alertalo.\n- Después del formato, agregá una sección:\n\n📊 ANÁLISIS CRÍTICO vs CRONOGRAMA:\n[análisis breve: estamos en línea / atrasados / adelantados según cronograma adjunto, qué partidas críticas hay, riesgo a la apertura].\n\nTRABAJOS EJECUTADOS AYER (lo que dijo Renzo / residente):\n${trabajosHechos || "(no especificado — derivá del cronograma y visitas)"}\n\nDATOS:\nPartidas cronograma: ${JSON.stringify(crono?.[obraId]||[])}\nÚltimas visitas: ${JSON.stringify(visObra)}\nNotas pendientes: ${JSON.stringify(notObra)}\nIncidencias abiertas: ${JSON.stringify(incObra)}\nApertura: ${obra?.fechaApertura || "—"}, días: ${diasPara(obra?.fechaApertura)}${cb ? "\nCEREBRO:\n"+cb : ""}`;
    } else {
      prompt = `Eres el copiloto de Renzo Moscol (GLD). Generá la PROGRAMACIÓN SEMANAL para "${obra?.cliente} · ${obra?.nombre}" (próximos 7 días). ${turnoTxt}\n\nFUENTE PRIORIDAD: el cronograma ADJUNTO (PDF/imagen). Leelo, identificá qué partidas tocan esta semana y armá día a día.\n\nFormato:\n📅 PROGRAMACIÓN SEMANAL — ${obra?.nombre}\nSemana del [fecha lun al sáb]\n\nLUN [fecha]:\n  Diurno: …\n  Nocturno: … (si aplica)\nMAR [fecha]: …\nMIÉ [fecha]: …\nJUE [fecha]: …\nVIE [fecha]: …\nSÁB [fecha]: …\n\n🎯 Hitos clave:\n[…]\n\n⚠️ Restricciones a liberar:\n[…]\n\n📦 Recursos críticos:\n[…]\n\n📊 ANÁLISIS CRÍTICO vs CRONOGRAMA:\n[análisis breve: estamos atrasados/adelantados, partidas críticas, riesgo a la apertura]\n\nTRABAJOS EJECUTADOS HASTA HOY:\n${trabajosHechos || "(no especificado)"}\n\nDATOS:\nPartidas: ${JSON.stringify(crono?.[obraId]||[])}\nVisitas: ${JSON.stringify(visObra)}\nNotas: ${JSON.stringify(notObra)}\nIncidencias: ${JSON.stringify(incObra)}\nApertura: ${obra?.fechaApertura || "—"}, días: ${diasPara(obra?.fechaApertura)}${cb ? "\nCEREBRO:\n"+cb : ""}`;
    }
    const content = [];
    if (cronoDoc?.data) {
      if (cronoDoc.tipo === "pdf") content.push({ type:"document", source:{ type:"base64", media_type:"application/pdf", data: dataURLtoBase64(cronoDoc.data) } });
      else content.push({ type:"image", source:{ type:"base64", media_type: dataURLmime(cronoDoc.data), data: dataURLtoBase64(cronoDoc.data) } });
    }
    content.push({ type:"text", text: prompt });
    const t = await askClaude([{ role:"user", content }], apiKey, 2400);
    setOutput(t); setLoading(false);
    setChat([{ role:"assistant", content: t }]);
  };

  const enviarChat = async () => {
    if (!chatInput.trim() || chatLoad) return;
    const userMsg = chatInput.trim();
    setChatInput("");
    const nextChat = [...chat, { role:"user", content: userMsg }];
    setChat(nextChat); setChatLoad(true);
    const cb = cerebroContexto(cerebro, (obra?.nombre || "") + " " + userMsg);
    const ctxData = `Obra: ${obra?.cliente} · ${obra?.nombre}\nApertura: ${obra?.fechaApertura} (${diasPara(obra?.fechaApertura)}d)\nPartidas: ${JSON.stringify(crono?.[obraId]||[])}\nÚltimas visitas: ${JSON.stringify((visitas||[]).filter(v => v.obraId === obraId).slice(0,3).map(({fotos,fachadaFotos,eppFotos,procesosFotos,avancePartidas,...r}) => r))}${cb ? "\nCEREBRO:\n"+cb : ""}`;
    const content = [];
    if (cronoDoc?.data) {
      if (cronoDoc.tipo === "pdf") content.push({ type:"document", source:{ type:"base64", media_type:"application/pdf", data: dataURLtoBase64(cronoDoc.data) } });
      else content.push({ type:"image", source:{ type:"base64", media_type: dataURLmime(cronoDoc.data), data: dataURLtoBase64(cronoDoc.data) } });
    }
    content.push({ type:"text", text: `Eres el copiloto de Renzo (GLD). Tenés el cronograma adjunto y los datos de la obra. Respondé en español, breve y específico. Si te pide planificar, derivá del cronograma. Si te dice trabajos ejecutados, andá actualizando el plan.\n\nCONTEXTO:\n${ctxData}\n\nMENSAJE: ${userMsg}` });
    const r = await askClaude([{ role:"user", content }, ...nextChat.slice(1).map(m => ({ role: m.role, content: m.content }))], apiKey, 1800);
    setChat([...nextChat, { role:"assistant", content: r }]);
    setChatLoad(false);
  };

  if (!obras.length) return <div style={{ padding:30, textAlign:"center", color:"var(--ink2)" }}>Registrá una tienda primero.</div>;

  return (
    <div style={{ padding:16, paddingBottom:120 }}>
      <div style={{ fontSize:13, color:"var(--ink2)", marginBottom:12, lineHeight:1.5 }}>Generá <b>plan del día (7am)</b> o <b>programación semanal (viernes)</b> usando el <b>cronograma adjunto</b> + lo que vos cuentes que se ejecutó. Después chateá con la IA para ajustar.</div>

      <div className="card" style={{ padding:14, marginBottom:12 }}>
        <Field label="Obra"><Sel value={obraId} onChange={e => { setObraId(e.target.value); setOutput(""); setChat([]); }} options={obras.map(o => ({ value:o.id, label:`${o.cliente} · ${o.nombre}` }))} /></Field>
        <Field label="Plan a generar">
          <div style={{ display:"flex", gap:6 }}>
            <button onClick={() => setTipo("dia")} className="btn" style={{ flex:1, padding:11, background: tipo === "dia" ? "var(--accent)" : "var(--surface)", color: tipo === "dia" ? "#fff" : "var(--ink2)", border:`1px solid ${tipo === "dia" ? "var(--accent)" : "var(--border)"}` }}>📅 Plan del día (7am)</button>
            <button onClick={() => setTipo("semana")} className="btn" style={{ flex:1, padding:11, background: tipo === "semana" ? "var(--accent)" : "var(--surface)", color: tipo === "semana" ? "#fff" : "var(--ink2)", border:`1px solid ${tipo === "semana" ? "var(--accent)" : "var(--border)"}` }}>📊 Semanal (viernes)</button>
          </div>
        </Field>
        <Field label="Turno">
          <div style={{ display:"flex", gap:5 }}>
            {[["diurno","Diurno"],["nocturno","Nocturno"],["ambos","Ambos"]].map(([k,l]) => (
              <button key={k} onClick={() => setTurnos(k)} className="btn" style={{ flex:1, padding:8, fontSize:12, background: turnos === k ? "var(--surface3)" : "var(--surface)", color: turnos === k ? "var(--ink)" : "var(--ink2)", border:`1px solid ${turnos === k ? "var(--accent)" : "var(--border)"}` }}>{l}</button>
            ))}
          </div>
        </Field>
        <Field label="¿Qué se ejecutó ayer/hoy? (opcional pero útil)"><TArea value={trabajosHechos} onChange={e => setTrabajosHechos(e.target.value)} rows={3} placeholder="Ej: ayer terminamos enchape zona A, drywall al 70%, hoy iniciamos pintura..." /></Field>
        <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:10, padding:9, background: cronoDoc?.data ? "rgba(16,185,129,.08)" : "rgba(245,158,11,.08)", border:`1px solid ${cronoDoc?.data ? "var(--verde)" : "var(--ambar)"}`, borderRadius:8, fontSize:12 }}>
          {cronoDoc?.data ? <><CheckCircle2 size={14} color="var(--verde)" /> <span style={{ color:"var(--ink)" }}>Cronograma adjunto disponible ({cronoDoc.nombre})</span></> : <><AlertTriangle size={14} color="var(--ambar)" /> <span style={{ color:"var(--ink2)" }}>Sin cronograma adjunto. Subilo en <b>Obra → Cronograma</b> para mejores resultados.</span></>}
        </div>
        <button onClick={generar} disabled={loading} className="btn" style={{ background:"linear-gradient(135deg, var(--accent), #ff8855)", color:"#fff", padding:14, width:"100%", boxShadow:"0 4px 16px -4px var(--accent-glow)" }}><Sparkles size={16} style={{verticalAlign:-3}} /> {loading ? "Generando…" : `Generar ${tipo === "dia" ? "plan del día" : "plan semanal"} con IA`}</button>
      </div>

      {output && (
        <div className="card glow-ia" style={{ padding:14, marginBottom:12 }}>
          <pre className="mono" style={{ whiteSpace:"pre-wrap", fontSize:12.5, margin:0, lineHeight:1.55, color:"var(--ink)" }}>{output}</pre>
          <div style={{ display:"flex", gap:8, marginTop:12 }}>
            <a href={whatsappHref(output)} target="_blank" rel="noreferrer" className="btn" style={{ flex:1, background:"#25D366", color:"#fff", padding:11, textAlign:"center", textDecoration:"none", fontSize:13 }}><MessageCircle size={14} style={{verticalAlign:-2}} /> WhatsApp</a>
            <button onClick={async() => { const r = await shareOrCopy(output); alert(r === "copy" ? "Copiado." : "Listo."); }} className="btn" style={{ background:"var(--surface3)", color:"var(--ink)", padding:11, fontSize:13 }}><Copy size={14} /></button>
            {tipo === "dia" && savePlanDiario && <button onClick={() => { savePlanDiario(obraId, hoy(), output); alert("Plan guardado como vigente del día."); }} className="btn" style={{ background:"var(--accent)", color:"#fff", padding:11, fontSize:13 }}>✓ Guardar</button>}
          </div>
        </div>
      )}

      {chat.length > 0 && (
        <div className="card" style={{ padding:14, marginBottom:12 }}>
          <div className="lbl" style={{ marginBottom:10 }}><MessageSquare size={11} style={{verticalAlign:-1, marginRight:4}} color="var(--ia)" /> Chat con la IA — ajustá / preguntá</div>
          <div style={{ maxHeight:300, overflowY:"auto", marginBottom:10 }}>
            {chat.slice(1).map((m, i) => (
              <div key={i} style={{ display:"flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start", marginBottom:8 }}>
                <div style={{ maxWidth:"88%", padding:"9px 12px", borderRadius:12, fontSize:13, lineHeight:1.5, whiteSpace:"pre-wrap", background: m.role === "user" ? "var(--accent)" : "var(--surface2)", color: m.role === "user" ? "#fff" : "var(--ink)" }}>{m.content}</div>
              </div>
            ))}
            {chatLoad && <div style={{ padding:"4px 0" }}><span className="dot" /><span className="dot" /><span className="dot" /></div>}
          </div>
          <div style={{ display:"flex", gap:6 }}>
            <input className="inp" placeholder="Ajustá el plan o pedí algo más…" value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter") enviarChat(); }} />
            <button onClick={enviarChat} disabled={chatLoad} className="btn" style={{ background:"var(--ia)", color:"#fff", padding:"0 16px" }}><Send size={18} /></button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================ RECORDATORIOS JORNADA ============================ */
const TIMESLOTS = [
  { tipo:"Inicio", hora:"07:00", windowStart:"06:30", windowEnd:"09:00", label:"Inicio (7am)" },
  { tipo:"Medio",  hora:"11:45", windowStart:"11:30", windowEnd:"14:00", label:"Mediodía" },
  { tipo:"Fin",    hora:"16:45", windowStart:"16:30", windowEnd:"19:30", label:"Fin de jornada" },
];
function getCurrentTimeslot() {
  const now = new Date();
  const hhmm = String(now.getHours()).padStart(2,"0") + ":" + String(now.getMinutes()).padStart(2,"0");
  return TIMESLOTS.find(s => hhmm >= s.windowStart && hhmm <= s.windowEnd) || null;
}
function RecordatorioJornada({ obras, log, goJornada }) {
  const slot = getCurrentTimeslot();
  const today = hoy();
  const tlog = log[today] || {};
  if (!slot) return null;
  const pendientes = obras.filter(o => !tlog[o.id]?.[slot.tipo]);
  if (!pendientes.length || !obras.length) return null;
  return (
    <div onClick={goJornada} className="card" style={{ padding:11, marginBottom:10, background:"rgba(37,211,102,.08)", borderColor:"#25D366", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center", gap:8 }}>
      <div style={{ minWidth:0, flex:1 }}>
        <div className="disp" style={{ fontSize:13, color:"#1da053", marginBottom:2 }}><MessageCircle size={13} style={{verticalAlign:-2}} /> Reporte {slot.label} pendiente</div>
        <div style={{ fontSize:12, color:"var(--ink2)", lineHeight:1.4 }}>{pendientes.length} obra{pendientes.length>1?"s":""}: {pendientes.slice(0,3).map(o => o.nombre.replace(/^(Aruma|Platanitos)\s/,"")).join(", ")}{pendientes.length>3 ? ` +${pendientes.length-3}` : ""}</div>
      </div>
      <ChevronRight size={18} color="#1da053" />
    </div>
  );
}

/* ============================ CUMPLIMIENTO DEL DÍA ============================ */
function CumplimientoScreen({ obras, planesDiarios, togglePlanItem }) {
  const today = hoy();
  const obrasConPlan = obras.filter(o => planesDiarios[o.id]?.[today]);
  return (
    <div style={{ padding:14, paddingBottom:110 }}>
      <div style={{ fontSize:13, color:"var(--ink2)", marginBottom:10, lineHeight:1.5 }}>Marcá las actividades que se cumplieron en cada obra hoy. El % se calcula automático.</div>
      {!obrasConPlan.length && <div style={{ textAlign:"center", color:"var(--ink2)", marginTop:25, fontSize:13.5, lineHeight:1.5 }}>Sin plan vigente para hoy.<br /><br />Andá a <b>Obra → Cronograma → Plan del día</b>, generá el plan con IA y tocá <b>"Guardar como plan vigente"</b>.</div>}
      {obrasConPlan.map(o => {
        const dia = planesDiarios[o.id][today];
        const total = dia.items.length;
        const hechos = dia.items.filter(i => i.hecho).length;
        const pct = total ? Math.round(hechos/total*100) : 0;
        return (
          <div key={o.id} className="card" style={{ padding:13, marginBottom:10 }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
              <div className="disp" style={{ fontSize:15 }}>{o.cliente} · {o.nombre}</div>
              <span className="mono" style={{ fontWeight:700, color: pct >= 80 ? "var(--verde)" : pct >= 50 ? "var(--ambar)" : "var(--rojo)" }}>{hechos}/{total} · {pct}%</span>
            </div>
            <div style={{ height:6, background:"var(--surface2)", color:"var(--ink)", borderRadius:9, marginBottom:10 }}>
              <div style={{ width: pct+"%", height:"100%", background: pct >= 80 ? "var(--verde)" : pct >= 50 ? "var(--ambar)" : "var(--rojo)", borderRadius:9 }} />
            </div>
            {dia.items.map(it => (
              <div key={it.id} onClick={() => togglePlanItem(o.id, today, it.id)} style={{ display:"flex", alignItems:"flex-start", gap:8, padding:"6px 0", cursor:"pointer", borderBottom:"1px dashed var(--line)" }}>
                <div style={{ width:18, height:18, border:`2px solid ${it.hecho ? "var(--verde)" : "var(--line)"}`, borderRadius:4, background: it.hecho ? "var(--verde)" : "transparent", display:"flex", alignItems:"center", justifyContent:"center", flex:"0 0 auto", marginTop:2 }}>{it.hecho && <CheckCircle2 size={12} color="#fff" />}</div>
                <div style={{ fontSize:13.5, lineHeight:1.4, textDecoration: it.hecho ? "line-through" : "none", color: it.hecho ? "var(--ink2)" : "var(--ink)" }}>{it.txt}</div>
              </div>
            ))}
            {!dia.items.length && <div style={{ fontSize:12, color:"var(--ink2)" }}>El plan no tiene actividades extraíbles. Volvé a generarlo asegurándote que liste actividades con guión.</div>}
          </div>
        );
      })}
    </div>
  );
}

/* ============================ APRENDER VISITA → CEREBRO ============================ */
function AprenderCerebroModal({ open, visita, obras, cerebro, apiKey, onClose, onGuardar }) {
  const [load, setLoad] = useState(false);
  const [propuestas, setPropuestas] = useState([]);
  const [sel, setSel] = useState({});
  const obra = obras.find(o => o.id === visita?.obraId);
  useEffect(() => { if (!open) { setPropuestas([]); setSel({}); } }, [open]);

  const extraer = async () => {
    if (!visita) return;
    setLoad(true);
    const ctxVisita = { ...visita, fotos:undefined, fachadaFotos:undefined, eppFotos:undefined, procesosFotos:undefined };
    const cbExist = cerebro.slice(0,20).map(e => `${e.categoria}: ${e.titulo}`).join("\n");
    const prompt = `Eres el copiloto técnico de Renzo Moscol (GLD). Analizá esta visita y EXTRAÉ entradas de CONOCIMIENTO TÉCNICO PERMANENTE que valga la pena guardar al cerebro del supervisor (criterios técnicos, tolerancias, decisiones del cliente, especificaciones de proveedores, lecciones aprendidas, patrones de calidad).

IGNORÁ lo que es operativo del día (avance, % completado, personal presente hoy) — ESO NO va al cerebro.
INCLUÍ solo lo que sirve para futuras obras / próximas visitas (ej. "el cliente Aruma exige X mm de junta en cerámicos", "HMY tiene 5 días de retraso típico", "el residente Luis Oblitas pide notificación 1 día antes para tema X").

Devolveme SOLO un JSON array (sin texto adicional, sin code fences) con objetos:
{ "categoria": "...", "titulo": "...", "contenido": "...", "tags": "..." }

Categorías válidas: ${CEREBRO_CATS.join(", ")}.

Si no hay nada digno de guardar, devolvé: []

Ejemplos de entradas BUENAS:
- {"categoria":"Cliente Aruma","titulo":"Validación nicho FCR","contenido":"Cliente exige bajar 5 cm el FCR para nicho de luz indirecta; coordinar con Karen Cerna antes de fabricar","tags":"FCR, nicho, luz indirecta"}
- {"categoria":"Proveedores","titulo":"HMY luminarias","contenido":"HMY entrega típicamente con 1-2 días de atraso; pedir 3 días antes del cronograma","tags":"HMY, luminarias, atraso"}

Cerebro ya existente (no dupliques títulos similares):
${cbExist || "(vacío)"}

VISITA:
Obra: ${obra?.cliente} · ${obra?.nombre}
Fecha: ${visita.fecha}
Datos:
${JSON.stringify(ctxVisita)}`;
    const t = await askClaude([{ role:"user", content: prompt }], apiKey, 1500);
    setLoad(false);
    try {
      const m = t.match(/\[[\s\S]*\]/); if (!m) { setPropuestas([]); return; }
      const arr = JSON.parse(m[0]);
      if (!Array.isArray(arr)) { setPropuestas([]); return; }
      setPropuestas(arr);
      const initSel = {}; arr.forEach((_, i) => { initSel[i] = true; });
      setSel(initSel);
    } catch { setPropuestas([]); alert("No pude extraer entradas. Respuesta IA:\n\n" + t); }
  };

  return (
    <Modal open={open} onClose={onClose} title="🧠 ¿Aprender de esta visita?" maxWidth={520}>
      <div style={{ fontSize:13.5, lineHeight:1.5, color:"var(--ink2)", marginBottom:12 }}>La IA puede extraer criterios técnicos, decisiones de cliente y lecciones aprendidas de esta visita para sumarlos al cerebro. Quedan disponibles para futuras visitas, checklists y análisis.</div>
      {propuestas.length === 0 && !load && (
        <>
          <button className="btn" onClick={extraer} style={{ background:"var(--ia)", color:"#fff", padding:13, width:"100%", marginBottom:8 }}><Sparkles size={15} style={{verticalAlign:-3}} /> Extraer aprendizajes con IA</button>
          <button className="btn" onClick={onClose} style={{ background:"transparent", color:"var(--ink2)", padding:11, width:"100%" }}>Saltar (esta vez no)</button>
        </>
      )}
      {load && <div style={{ textAlign:"center", padding:20 }}><span className="dot" /><span className="dot" /><span className="dot" /><div style={{ marginTop:8, fontSize:12, color:"var(--ink2)" }}>Analizando…</div></div>}
      {propuestas.length > 0 && (
        <>
          <div style={{ fontSize:12.5, color:"var(--ink2)", marginBottom:8 }}>Tildá las que querés guardar:</div>
          {propuestas.map((p, i) => (
            <div key={i} onClick={() => setSel(s => ({ ...s, [i]: !s[i] }))} className="card" style={{ padding:10, marginBottom:7, cursor:"pointer", border: sel[i] ? "1.5px solid var(--ia)" : "1px solid var(--line)" }}>
              <div style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
                <div style={{ width:18, height:18, border:`2px solid ${sel[i] ? "var(--ia)" : "var(--line)"}`, borderRadius:4, background: sel[i] ? "var(--ia)" : "transparent", display:"flex", alignItems:"center", justifyContent:"center", flex:"0 0 auto", marginTop:2 }}>{sel[i] && <CheckCircle2 size={12} color="#fff" />}</div>
                <div style={{ flex:1 }}>
                  <span className="chip" style={{ background:"rgba(95,61,196,.12)", color:"var(--ia)", marginBottom:4, display:"inline-block" }}>{p.categoria}</span>
                  <div style={{ fontSize:13, fontWeight:700, marginTop:3 }}>{p.titulo}</div>
                  <div style={{ fontSize:12.5, color:"var(--ink2)", marginTop:2, lineHeight:1.4 }}>{p.contenido}</div>
                  {p.tags && <div className="mono" style={{ fontSize:10.5, color:"var(--ia)", marginTop:3 }}>#{p.tags.split(/,\s*/).join(" #")}</div>}
                </div>
              </div>
            </div>
          ))}
          <div style={{ display:"flex", gap:8, marginTop:10 }}>
            <button className="btn" onClick={onClose} style={{ flex:1, background:"var(--surface2)", color:"var(--ink)", padding:12 }}>Cancelar</button>
            <button className="btn" onClick={() => onGuardar(propuestas.filter((_, i) => sel[i]))} style={{ flex:2, background:"var(--accent)", color:"#fff", padding:12 }}><Save size={14} style={{verticalAlign:-2}} /> Guardar al cerebro</button>
          </div>
        </>
      )}
    </Modal>
  );
}

function cerebroContexto(entries, partidaOTema) {
  if (!entries.length) return "";
  if (!partidaOTema) {
    return entries.map(e => `[${e.categoria}] ${e.titulo}: ${e.contenido}`).join("\n");
  }
  const t = partidaOTema.toLowerCase();
  const score = (e) => {
    const blob = (e.categoria + " " + e.titulo + " " + e.contenido + " " + (e.tags||"")).toLowerCase();
    let s = 0;
    t.split(/\s+/).forEach(w => { if (w.length > 2 && blob.includes(w)) s++; });
    return s;
  };
  const ranked = entries.map(e => ({ e, s: score(e) })).filter(x => x.s > 0).sort((a,b) => b.s - a.s).slice(0, 20).map(x => x.e);
  const rest = entries.filter(e => !ranked.includes(e)).slice(0, 5);
  return [...ranked, ...rest].map(e => `[${e.categoria}] ${e.titulo}: ${e.contenido}`).join("\n");
}

function CerebroScreen({ cerebro, save, apiKey }) {
  const [ed, setEd] = useState(null);
  const [filtro, setFiltro] = useState("");
  const [cat, setCat] = useState("todas");
  const [showChecklist, setShowChecklist] = useState(false);
  const [importT, setImportT] = useState("");
  const [importLoad, setImportLoad] = useState(false);
  const lista = cerebro.filter(e => (cat === "todas" || e.categoria === cat) && (!filtro || (e.titulo + " " + e.contenido + " " + (e.tags||"")).toLowerCase().includes(filtro.toLowerCase()))).sort((a, b) => (b.fecha||"").localeCompare(a.fecha||""));
  const commit = () => { if (!ed.titulo.trim() || !ed.contenido.trim()) return alert("Falta título o contenido."); const ex = cerebro.find(e => e.id === ed.id); save(ex ? cerebro.map(e => e.id === ed.id ? ed : e) : [...cerebro, ed]); setEd(null); };
  const blank = () => ({ id: uid(), fecha: hoy(), categoria:"General", titulo:"", contenido:"", tags:"" });

  const importarBloque = async () => {
    if (!importT.trim()) return alert("Pegá texto para extraer.");
    setImportLoad(true);
    const t = await askClaude([{ role:"user", content:`Extraé del siguiente texto entradas de conocimiento técnico de obra (especificaciones, tolerancias, criterios, decisiones, requisitos del cliente, etc.) y devolveme SOLO un JSON array, sin texto adicional, con objetos { "categoria": "...", "titulo": "...", "contenido": "...", "tags": "..." }. Categorías válidas: ${CEREBRO_CATS.join(", ")}. Texto:\n\n${importT}` }], apiKey);
    setImportLoad(false);
    try {
      const m = t.match(/\[[\s\S]*\]/); if (!m) throw new Error("sin JSON");
      const arr = JSON.parse(m[0]);
      if (!Array.isArray(arr) || !arr.length) throw new Error("vacío");
      const nuevos = arr.map(x => ({ id: uid(), fecha: hoy(), categoria: x.categoria || "General", titulo: x.titulo || "(sin título)", contenido: x.contenido || "", tags: x.tags || "" }));
      save([...cerebro, ...nuevos]);
      setImportT(""); alert(`Se agregaron ${nuevos.length} entradas al cerebro.`);
    } catch (e) { alert("No pude extraer entradas. Respuesta IA:\n\n" + t); }
  };

  if (showChecklist) return <ChecklistLiberacion cerebro={cerebro} apiKey={apiKey} onClose={() => setShowChecklist(false)} />;

  if (ed) return (
    <div style={{ padding:14, paddingBottom:110 }}>
      <Section title="Entrada de conocimiento" icon={Sparkles}>
        <div style={{ display:"flex", gap:10 }}>
          <div style={{ flex:1 }}><Field label="Fecha"><TInput type="date" value={ed.fecha} onChange={e => setEd({ ...ed, fecha: e.target.value })} /></Field></div>
          <div style={{ flex:2 }}><Field label="Categoría"><Sel value={ed.categoria} onChange={e => setEd({ ...ed, categoria: e.target.value })} options={CEREBRO_CATS} /></Field></div>
        </div>
        <Field label="Título corto"><TInput value={ed.titulo} onChange={e => setEd({ ...ed, titulo: e.target.value })} placeholder="Ej. Junta de cerámicos" /></Field>
        <Field label="Contenido"><TArea value={ed.contenido} onChange={e => setEd({ ...ed, contenido: e.target.value })} rows={5} placeholder="Ej. La junta de cerámicos es de 1 mm. Se usa crucetas plásticas. Antes de fraguar verificar alineación con regla de 2m." /></Field>
        <Field label="Tags (separados por coma, para que la IA lo encuentre fácil)"><TInput value={ed.tags} onChange={e => setEd({ ...ed, tags: e.target.value })} placeholder="cerámico, junta, piso, porcelanato" /></Field>
      </Section>
      <div style={{ display:"flex", gap:10 }}>
        <button className="btn" onClick={() => setEd(null)} style={{ flex:1, background:"var(--surface2)", color:"var(--ink)", padding:14 }}>Cancelar</button>
        <button className="btn" onClick={commit} style={{ flex:2, background:"var(--accent)", color:"#fff", padding:14 }}><Save size={16} style={{verticalAlign:-3}} /> Guardar al cerebro</button>
      </div>
    </div>
  );
  return (
    <div style={{ padding:14, paddingBottom:110 }}>
      <div style={{ fontSize:13, color:"var(--ink2)", marginBottom:10, lineHeight:1.5 }}>El <b>cerebro</b> es tu base de conocimiento. Anotás criterios técnicos, especificaciones, tolerancias, decisiones del cliente, etc. La IA usa estas entradas al generar checklists y análisis críticos. <b>Cuanto más lo alimentes, más útil se vuelve.</b></div>
      <div style={{ display:"flex", gap:8, marginBottom:8 }}>
        <button className="btn" onClick={() => setEd(blank())} style={{ flex:1, background:"var(--accent)", color:"#fff", padding:13 }}><Plus size={15} style={{verticalAlign:-2}} /> Nueva entrada</button>
        <button className="btn" onClick={() => setShowChecklist(true)} style={{ flex:1, background:"var(--ia)", color:"#fff", padding:13 }}><ListChecks size={15} style={{verticalAlign:-2}} /> Checklist IA</button>
      </div>
      <Section title="Importar conocimiento (IA)" icon={Sparkles}>
        <div style={{ fontSize:12, color:"var(--ink2)", marginBottom:8, lineHeight:1.45 }}>Pegá texto largo (manual de obra Aruma, especificación técnica, mensajes de cliente, criterios, YAML de contexto) y la IA extrae entradas automáticamente.</div>
        <TArea value={importT} onChange={e => setImportT(e.target.value)} rows={3} placeholder="Pegá texto técnico, mensaje, YAML…" />
        <button className="btn" onClick={importarBloque} disabled={importLoad || !apiKey} style={{ background:"linear-gradient(135deg, var(--ia), #c4b5fd)", color:"#fff", padding:11, width:"100%", marginTop:8 }}>{importLoad ? "Extrayendo…" : (apiKey ? "Extraer entradas con IA" : "Requiere API key — activá la IA primero")}</button>
      </Section>
      <div style={{ marginBottom:10 }}>
        <input className="inp" placeholder="Buscar…" value={filtro} onChange={e => setFiltro(e.target.value)} />
        <div style={{ display:"flex", gap:5, overflowX:"auto", marginTop:8, paddingBottom:4 }}>
          <button onClick={() => setCat("todas")} className="btn" style={{ padding:"5px 10px", fontSize:11, background: cat === "todas" ? "var(--accent)" : "var(--paper)", color: cat === "todas" ? "#fff" : "var(--ink2)", border:"1px solid var(--line)", whiteSpace:"nowrap", flex:"0 0 auto" }}>Todas</button>
          {CEREBRO_CATS.map(c => <button key={c} onClick={() => setCat(c)} className="btn" style={{ padding:"5px 10px", fontSize:11, background: cat === c ? "var(--accent)" : "var(--paper)", color: cat === c ? "#fff" : "var(--ink2)", border:"1px solid var(--line)", whiteSpace:"nowrap", flex:"0 0 auto" }}>{c}</button>)}
        </div>
      </div>
      {lista.map(e => (
        <div key={e.id} className="card" style={{ padding:11, marginBottom:7 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 }}>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ display:"flex", gap:5, marginBottom:4 }}><span className="chip" style={{ background:"rgba(95,61,196,.12)", color:"var(--ia)" }}>{e.categoria}</span><span className="mono" style={{ fontSize:10.5, color:"var(--ink2)" }}>{fmtFecha(e.fecha)}</span></div>
              <div style={{ fontWeight:700, fontSize:14 }}>{e.titulo}</div>
              <div style={{ fontSize:13, color:"var(--ink2)", marginTop:3, whiteSpace:"pre-wrap" }}>{e.contenido}</div>
              {e.tags && <div className="mono" style={{ fontSize:11, color:"var(--ia)", marginTop:4 }}>#{e.tags.split(/,\s*/).join(" #")}</div>}
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
              <button className="btn" onClick={() => setEd(e)} style={{ background:"var(--surface2)", color:"var(--ink)", padding:6 }}><Settings size={13} /></button>
              <button className="btn" onClick={() => { if (confirm("¿Eliminar entrada?")) save(cerebro.filter(x => x.id !== e.id)); }} style={{ background:"transparent", padding:6 }}><Trash2 size={13} color="var(--rojo)" /></button>
            </div>
          </div>
        </div>
      ))}
      {!lista.length && <div style={{ textAlign:"center", color:"var(--ink2)", marginTop:25, fontSize:13 }}>El cerebro está vacío. Empezá a cargar criterios para que la IA los use.</div>}
    </div>
  );
}

function ChecklistLiberacion({ cerebro, apiKey, onClose }) {
  const [partida, setPartida] = useState("");
  const [out, setOut] = useState("");
  const [loading, setLoading] = useState(false);
  const generar = async () => {
    if (!partida.trim()) return alert("Indicá la partida.");
    setLoading(true);
    const ctx = cerebroContexto(cerebro, partida);
    const prompt = `Eres el copiloto técnico de Renzo Moscol (Supervisor de Producción, GLD, fit-out retail Aruma/Platanitos en Perú). Generá un CHECKLIST DE LIBERACIÓN para la partida: "${partida}".\n\nFormato: lista con casillas [ ] de chequeo (texto plano, no markdown), agrupada por subtema. Incluí TODAS las consideraciones técnicas relevantes: materiales, mediciones, tolerancias, herramientas, condiciones previas, prueba/verificación. Sé práctico y específico (no genérico).\n\nUSÁ obligatoriamente los criterios del cerebro de Renzo (si hay para esta partida):\n${ctx || "(sin entradas en cerebro para esta partida — usá criterios estándar)"}\n\nFinalizá con una sección "Aceptación" con los criterios concretos de liberación.`;
    const t = await askClaude([{ role:"user", content: prompt }], apiKey);
    setOut(t); setLoading(false);
  };
  return (
    <div style={{ padding:14, paddingBottom:110 }}>
      <button className="btn" onClick={onClose} style={{ background:"transparent", padding:"4px 0", marginBottom:8 }}><ChevronLeft size={18} style={{verticalAlign:-4}} /> Volver al cerebro</button>
      <Section title="Checklist de liberación (IA + cerebro)" icon={ListChecks}>
        <div style={{ fontSize:12.5, color:"var(--ink2)", marginBottom:8, lineHeight:1.45 }}>Indicá la partida y la IA arma el checklist usando tu cerebro + conocimiento general.</div>
        <Field label="Partida a liberar"><TInput value={partida} onChange={e => setPartida(e.target.value)} placeholder="Ej. Cerámicos / Drywall / Pintura / Pozo a tierra / Letrero" list="cerlibp" /></Field>
        <datalist id="cerlibp">{PARTIDAS.map(p => <option key={p} value={p} />)}{["Cerámicos","Porcelanato","Drywall","Pintura","Empaste","Pozo a tierra","Tablero eléctrico","Luminarias","Letrero","CCTV","UPS","Tomacorrientes","Acabados de baño","Inodoro","Mampara","Vitrina","Puerta enrollable"].map(p => <option key={p} value={p} />)}</datalist>
        <button className="btn" onClick={generar} disabled={loading} style={{ background:"var(--ia)", color:"#fff", padding:13, width:"100%" }}><Sparkles size={15} style={{verticalAlign:-3}} /> {loading ? "Generando…" : "Generar checklist"}</button>
      </Section>
      {out && (
        <div className="card" style={{ padding:14, marginTop:10 }}>
          <pre className="mono" style={{ whiteSpace:"pre-wrap", fontSize:12.5, margin:0, lineHeight:1.55 }}>{out}</pre>
          <div style={{ display:"flex", gap:8, marginTop:10 }}>
            <button className="btn" onClick={async () => { const r = await shareOrCopy(out); alert(r === "copy" ? "Copiado." : "Listo."); }} style={{ flex:1, background:"var(--surface3)", color:"var(--ink)", padding:11 }}><Copy size={14} style={{verticalAlign:-2}} /> Copiar</button>
            <button className="btn" onClick={() => window.print()} style={{ background:"var(--surface3)", color:"var(--ink)", padding:11 }}><Printer size={14} /></button>
          </div>
        </div>
      )}
    </div>
  );
}

function Modal({ open, onClose, title, children, maxWidth=480 }) {
  if (!open) return null;
  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.65)", backdropFilter:"blur(6px)", WebkitBackdropFilter:"blur(6px)", zIndex:100, display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:"linear-gradient(180deg, var(--surface2), var(--surface))", borderTopLeftRadius:20, borderTopRightRadius:20, width:"100%", maxWidth, maxHeight:"86vh", overflowY:"auto", padding:18, border:"1px solid var(--border)", borderBottom:"none", boxShadow:"0 -20px 60px -10px rgba(0,0,0,.5)" }}>
        <div style={{ width:36, height:4, background:"var(--border)", borderRadius:99, margin:"0 auto 14px" }} />
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
          <div className="disp" style={{ fontSize:16, color:"var(--ink)" }}>{title}</div>
          <button onClick={onClose} className="btn" style={{ background:"var(--surface3)", color:"var(--ink2)", padding:6, borderRadius:8 }}><X size={18} /></button>
        </div>
        {children}
      </div>
    </div>
  );
}

createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
