/* ============================ AGENDA DE VISITAS ============================ */
const DOW = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
function buildICS(visits, obras) {
  const pad = (n) => String(n).padStart(2, "0");
  const dt = (date, time) => { const [h, m] = (time || "09:00").split(":"); return date.replace(/-/g, "") + "T" + pad(h) + pad(m) + "00"; };
  const endT = (time) => { let [h, m] = (time || "09:00").split(":").map(Number); h = (h + 1) % 24; return pad(h) + ":" + pad(m); };
  let s = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//GLD Campo//ES\n";
  visits.forEach(v => { const o = obras.find(x => x.id === v.obraId); s += `BEGIN:VEVENT\nUID:${v.id}@gldcampo\nDTSTART:${dt(v.fecha, v.hora)}\nDTEND:${dt(v.fecha, endT(v.hora))}\nSUMMARY:Visita ${o?.nombre || "obra"}\nDESCRIPTION:${(v.nota || "Visita de supervisión").replace(/\n/g, " ")}\nBEGIN:VALARM\nTRIGGER:-PT30M\nACTION:DISPLAY\nDESCRIPTION:Visita de obra\nEND:VALARM\nEND:VEVENT\n`; });
  return s + "END:VCALENDAR";
}
function AgendaScreen({ obras, agenda, save }) {
  const [add, setAdd] = useState(null);
  const lista = [...agenda].sort((a, b) => (a.fecha + a.hora).localeCompare(b.fecha + b.hora));
  const grupos = {}; lista.forEach(v => { (grupos[v.fecha] = grupos[v.fecha] || []).push(v); });
  const commit = () => { if (!add.obraId) return alert("Elegí una obra."); save([...agenda.filter(x => x.id !== add.id), add]); setAdd(null); };
  const setEstado = (id, e) => save(agenda.map(x => x.id === id ? { ...x, estado: e } : x));
  const del = (id) => save(agenda.filter(x => x.id !== id));
  const proximos = lista.filter(v => v.fecha >= hoy() && v.estado !== "Hecha");
  const exportICS = () => { const ics = buildICS(proximos, obras); try { const a = document.createElement("a"); a.href = "data:text/calendar;charset=utf-8," + encodeURIComponent(ics); a.download = "visitas-gld.ics"; document.body.appendChild(a); a.click(); a.remove(); } catch { shareOrCopy(ics); } };
  if (add) return (
    <div style={{ padding:14 }}>
      <Section title="Programar visita" icon={CalendarClock}>
        <Field label="Obra"><Sel value={add.obraId} onChange={e => setAdd({ ...add, obraId: e.target.value })} options={[{ value:"", label:"— Elegir —" }, ...obras.map(o => ({ value:o.id, label:`${o.cliente} · ${o.nombre}` }))]} /></Field>
        <div style={{ display:"flex", gap:10 }}>
          <div style={{ flex:1 }}><Field label="Fecha"><TInput type="date" value={add.fecha} onChange={e => setAdd({ ...add, fecha: e.target.value })} /></Field></div>
          <div style={{ flex:1 }}><Field label="Hora"><TimeInput value={add.hora} onChange={e => setAdd({ ...add, hora: e.target.value })} /></Field></div>
        </div>
        <Field label="Nota (objetivo de la visita)"><TInput value={add.nota} onChange={e => setAdd({ ...add, nota: e.target.value })} placeholder="Ej. revisar avance drywall y eléctricas" /></Field>
      </Section>
      <div style={{ display:"flex", gap:10 }}>
        <button className="btn" onClick={() => setAdd(null)} style={{ flex:1, background:"var(--surface2)", color:"var(--ink)", padding:14 }}>Cancelar</button>
        <button className="btn" onClick={commit} style={{ flex:2, background:"var(--accent)", color:"#fff", padding:14 }}>Guardar visita</button>
      </div>
    </div>
  );
  return (
    <div style={{ padding:14, paddingBottom:110 }}>
      <div style={{ fontSize:13, color:"var(--ink2)", marginBottom:10, lineHeight:1.5 }}>Tu cronograma de visitas. Actualizalo el domingo o lunes. Exportá a tu calendario para recibir avisos 30 min antes.</div>
      <button className="btn" onClick={() => setAdd({ id: uid(), obraId: obras[0]?.id || "", fecha: hoy(), hora:"09:00", nota:"", estado:"Planificada" })} disabled={!obras.length} style={{ background:"var(--accent)", color:"#fff", padding:13, width:"100%", marginBottom:8 }}><Plus size={16} style={{verticalAlign:-3}} /> Programar visita</button>
      {proximos.length > 0 && <button className="btn" onClick={exportICS} style={{ background:"var(--surface3)", color:"var(--ink)", padding:12, width:"100%", marginBottom:12 }}><CalendarClock size={15} style={{verticalAlign:-3}} /> Agregar próximas al calendario (.ics)</button>}
      {Object.keys(grupos).sort().map(f => (
        <div key={f} style={{ marginBottom:12 }}>
          <div className="disp" style={{ fontSize:13, color:"var(--accent)", marginBottom:6 }}>{DOW[new Date(f + "T00:00:00").getDay()]} · {fmtFecha(f)}</div>
          {grupos[f].map(v => { const o = obras.find(x => x.id === v.obraId); return (
            <div key={v.id} className="card" style={{ padding:11, marginBottom:6, display:"flex", justifyContent:"space-between", alignItems:"center", opacity: v.estado === "Hecha" ? .55 : 1 }}>
              <div style={{ minWidth:0 }}>
                <div style={{ fontWeight:700, fontSize:14 }}><span className="mono">{v.hora}</span> · {o?.nombre || "—"}</div>
                {v.nota && <div style={{ fontSize:12.5, color:"var(--ink2)" }}>{v.nota}</div>}
              </div>
              <div style={{ display:"flex", gap:5 }}>
                <button className="btn" onClick={() => setEstado(v.id, v.estado === "Hecha" ? "Planificada" : "Hecha")} style={{ background: v.estado === "Hecha" ? "var(--line)" : "var(--verde)", color: v.estado === "Hecha" ? "var(--ink2)" : "#fff", padding:7 }}><CheckCircle2 size={15} /></button>
                <button className="btn" onClick={() => del(v.id)} style={{ background:"transparent", padding:7 }}><Trash2 size={15} color="var(--rojo)" /></button>
              </div>
            </div>
          ); })}
        </div>
      ))}
      {!lista.length && <div style={{ textAlign:"center", color:"var(--ink2)", marginTop:20 }}>Sin visitas programadas.</div>}
    </div>
  );
}

  const empresas = [...new Set(personas.map(p => p.empresa).filter(Boolean))].sort();
  const lista = personas.filter(p => (empresa === "todas" || p.empresa === empresa) && (!filtro || (p.nombre + " " + p.rol).toLowerCase().includes(filtro.toLowerCase()))).sort((a, b) => a.nombre.localeCompare(b.nombre));
  const commit = () => { if (!ed.nombre.trim()) return alert("Falta nombre."); const ex = personas.find(p => p.id === ed.id); save(ex ? personas.map(p => p.id === ed.id ? ed : p) : [...personas, ed]); setEd(null); };
  const blank = () => ({ id: uid(), nombre:"", empresa:"GLD", rol:"", tel:"", email:"" });
  if (ed) return (
    <div style={{ padding:14, paddingBottom:110 }}>
      <Section title="Persona" icon={Users}>
        <Field label="Nombre"><TInput value={ed.nombre} onChange={e => setEd({ ...ed, nombre: e.target.value })} /></Field>
        <Field label="Empresa"><TInput value={ed.empresa} onChange={e => setEd({ ...ed, empresa: e.target.value })} placeholder="GLD / RAD 415 / Aruma / Externo" /></Field>
        <Field label="Rol"><TInput value={ed.rol} onChange={e => setEd({ ...ed, rol: e.target.value })} /></Field>
        <Field label="Teléfono"><TInput type="tel" value={ed.tel} onChange={e => setEd({ ...ed, tel: e.target.value })} placeholder="+51 9..." /></Field>
        <Field label="Email"><TInput type="email" value={ed.email} onChange={e => setEd({ ...ed, email: e.target.value })} /></Field>
      </Section>
      <div style={{ display:"flex", gap:10 }}>
        <button className="btn" onClick={() => setEd(null)} style={{ flex:1, background:"var(--surface2)", color:"var(--ink)", padding:14 }}>Cancelar</button>
        <button className="btn" onClick={commit} style={{ flex:2, background:"var(--accent)", color:"#fff", padding:14 }}><Save size={16} style={{verticalAlign:-3}} /> Guardar</button>
      </div>
    </div>
  );
  return (
    <div style={{ padding:14, paddingBottom:110 }}>
      <div style={{ display:"flex", gap:8, marginBottom:8 }}>
        <input className="inp" placeholder="Buscar nombre o rol…" value={filtro} onChange={e => setFiltro(e.target.value)} />
      </div>
      <div style={{ display:"flex", gap:6, overflowX:"auto", marginBottom:10, paddingBottom:4 }}>
        <button onClick={() => setEmpresa("todas")} className="btn" style={{ padding:"6px 11px", fontSize:12, background: empresa === "todas" ? "var(--accent)" : "var(--paper)", color: empresa === "todas" ? "#fff" : "var(--ink2)", border:"1px solid var(--line)", whiteSpace:"nowrap", flex:"0 0 auto" }}>Todas</button>
        {empresas.map(emp => <button key={emp} onClick={() => setEmpresa(emp)} className="btn" style={{ padding:"6px 11px", fontSize:12, background: empresa === emp ? "var(--accent)" : "var(--paper)", color: empresa === emp ? "#fff" : "var(--ink2)", border:"1px solid var(--line)", whiteSpace:"nowrap", flex:"0 0 auto" }}>{emp}</button>)}
      </div>
      <button className="btn" onClick={() => setEd(blank())} style={{ background:"var(--surface3)", color:"var(--ink)", padding:11, width:"100%", marginBottom:10 }}><Plus size={15} style={{verticalAlign:-2}} /> Nueva persona</button>
      {lista.map(p => (
        <div key={p.id} className="card" style={{ padding:11, marginBottom:7 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 }}>
            <div style={{ minWidth:0, flex:1 }}>
              <div style={{ fontWeight:700, fontSize:14 }}>{p.nombre}</div>
              <div style={{ fontSize:12.5, color:"var(--ink2)" }}>{p.empresa} · {p.rol}</div>
              {p.tel && <div className="mono" style={{ fontSize:12, color:"var(--ink2)", marginTop:2 }}>{p.tel}</div>}
              {p.email && <div className="mono" style={{ fontSize:12, color:"var(--ink2)" }}>{p.email}</div>}
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
              {p.tel && <a href={`tel:${p.tel.replace(/\s/g,"")}`} className="btn" style={{ background:"var(--surface3)", color:"var(--ink)", padding:7, textDecoration:"none" }}><Phone size={13} /></a>}
              {p.tel && <a href={whatsappHref("Hola "+p.nombre.split(" ")[0]+", ", p.tel)} target="_blank" rel="noreferrer" className="btn" style={{ background:"#25D366", color:"#fff", padding:7, textDecoration:"none" }}><MessageCircle size={13} /></a>}
              {p.email && <a href={mailtoHref(p.email,"","")} className="btn" style={{ background:"var(--ia)", color:"#fff", padding:7, textDecoration:"none" }}><Mail size={13} /></a>}
              <button className="btn" onClick={() => setEd(p)} style={{ background:"var(--surface2)", color:"var(--ink)", padding:7 }}><Settings size={13} /></button>
              <button className="btn" onClick={() => { if (confirm("¿Eliminar persona?")) save(personas.filter(x => x.id !== p.id)); }} style={{ background:"transparent", padding:7 }}><Trash2 size={13} color="var(--rojo)" /></button>
            </div>
          </div>
        </div>
      ))}
      {!lista.length && <div style={{ textAlign:"center", color:"var(--ink2)", marginTop:20 }}>Sin personas con este filtro.</div>}
    </div>
  );
}

/* ============================ ZONAS (intervención por sectores A/B/C…) ============================ */
function ZonasManager({ obra, obraId, zonas=[], save, visitas=[] }) {
  const [ed, setEd] = useState(null);
  const commit = () => { if (!ed.nombre.trim()) return alert("Falta nombre de zona (Ej: Zona A, Zona B, Almacén, Venta…)"); const ex = zonas.find(z => z.id === ed.id); save(obraId, ex ? zonas.map(z => z.id === ed.id ? ed : z) : [...zonas, ed]); setEd(null); };
  const del = (id) => { if (confirm("¿Eliminar zona?")) save(obraId, zonas.filter(z => z.id !== id)); };
  // Historial de obs por zona: extrae de visitas
  const obsPorZona = useMemo(() => {
    const acc = {};
    visitas.filter(v => v.obraId === obraId && v.zonasObs).forEach(v => {
      Object.entries(v.zonasObs || {}).forEach(([zid, obs]) => {
        if (!obs) return;
        (acc[zid] = acc[zid] || []).push({ fecha: v.fecha, obs, visitaId: v.id });
      });
    });
    Object.keys(acc).forEach(zid => acc[zid].sort((a,b) => b.fecha.localeCompare(a.fecha)));
    return acc;
  }, [visitas, obraId]);

  if (ed) return (
    <div style={{ padding:16, paddingBottom:110 }}>
      <Section title="Zona" icon={Layers}>
        <Field label="Nombre"><TInput value={ed.nombre} onChange={e => setEd({ ...ed, nombre: e.target.value })} placeholder="Ej: Zona A, Venta, Almacén, Fachada" /></Field>
        <Field label="Estado">
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:6 }}>
            {Object.keys(ZONA_ESTADO_COL).map(est => (
              <button key={est} className="btn" onClick={() => setEd({ ...ed, estado: est })} style={{ padding:"9px 4px", fontSize:11.5, background: ed.estado === est ? ZONA_ESTADO_COL[est] : "var(--surface)", color: ed.estado === est ? "#0a0d13" : "var(--ink2)", border:`1px solid ${ZONA_ESTADO_COL[est]}`, fontWeight: ed.estado === est ? 700 : 500 }}>{est}</button>
            ))}
          </div>
        </Field>
        <Field label="% Avance"><TInput type="number" min="0" max="100" value={ed.avance} onChange={e => setEd({ ...ed, avance: e.target.value })} /></Field>
        <div style={{ display:"flex", gap:10 }}>
          <div style={{ flex:1 }}><Field label="Inicio"><TInput type="date" value={ed.fechaInicio} onChange={e => setEd({ ...ed, fechaInicio: e.target.value })} /></Field></div>
          <div style={{ flex:1 }}><Field label="Liberación"><TInput type="date" value={ed.fechaLiberacion} onChange={e => setEd({ ...ed, fechaLiberacion: e.target.value })} /></Field></div>
        </div>
        <Field label="Responsable / cuadrilla"><TInput value={ed.responsable} onChange={e => setEd({ ...ed, responsable: e.target.value })} /></Field>
        <Field label="Observaciones actuales"><TArea value={ed.observaciones} onChange={e => setEd({ ...ed, observaciones: e.target.value })} rows={3} placeholder="Observaciones técnicas, decisiones, pendientes de esta zona" /></Field>
      </Section>
      <Section title="Cronograma de la zona" icon={CalendarRange}>
        <div style={{ fontSize:12, color:"var(--ink2)", marginBottom:10, lineHeight:1.45 }}>Partidas específicas de esta zona con fechas y % de avance. Cada zona puede tener su propio cronograma — independiente del cronograma general de la obra.</div>
        {(ed.partidas || []).map((p, i) => (
          <div key={p.id} className="card" style={{ padding:11, marginBottom:8, background:"var(--surface)" }}>
            <div style={{ display:"flex", gap:6, marginBottom:7 }}>
              <Sel value={p.partida} onChange={e => { const next = [...ed.partidas]; next[i] = { ...p, partida: e.target.value }; setEd({ ...ed, partidas: next }); }} options={[{ value:"", label:"— Elegí partida —" }, ...PARTIDAS]} />
              <button className="btn" onClick={() => setEd({ ...ed, partidas: ed.partidas.filter(x => x.id !== p.id) })} style={{ background:"transparent", padding:6 }}><Trash2 size={15} color="var(--rojo)" /></button>
            </div>
            <div style={{ display:"flex", gap:6, marginBottom:6 }}>
              <div style={{ flex:1 }}><label className="lbl">Inicio</label><TInput type="date" value={p.inicio} onChange={e => { const next = [...ed.partidas]; next[i] = { ...p, inicio: e.target.value }; setEd({ ...ed, partidas: next }); }} /></div>
              <div style={{ flex:1 }}><label className="lbl">Fin</label><TInput type="date" value={p.fin} onChange={e => { const next = [...ed.partidas]; next[i] = { ...p, fin: e.target.value }; setEd({ ...ed, partidas: next }); }} /></div>
              <div style={{ width:78 }}><label className="lbl">% Av</label><TInput type="number" min="0" max="100" value={p.avance} onChange={e => { const next = [...ed.partidas]; next[i] = { ...p, avance: +e.target.value || 0 }; setEd({ ...ed, partidas: next }); }} /></div>
            </div>
            <TInput value={p.nota} onChange={e => { const next = [...ed.partidas]; next[i] = { ...p, nota: e.target.value }; setEd({ ...ed, partidas: next }); }} placeholder="Nota / responsable (opcional)" />
          </div>
        ))}
        <button className="btn" onClick={() => setEd({ ...ed, partidas: [ ...(ed.partidas||[]), blankZonaPartida() ] })} style={{ background:"var(--surface3)", color:"var(--ink)", padding:10, width:"100%" }}><Plus size={15} style={{verticalAlign:-2}} /> Agregar partida</button>
      </Section>
      <div style={{ display:"flex", gap:10 }}>
        <button className="btn" onClick={() => setEd(null)} style={{ flex:1, background:"var(--surface2)", color:"var(--ink)", padding:14 }}>Cancelar</button>
        <button className="btn" onClick={commit} style={{ flex:2, background:"linear-gradient(135deg, var(--accent), #ff8855)", color:"#fff", padding:14 }}><Save size={16} style={{verticalAlign:-3}} /> Guardar zona</button>
      </div>
    </div>
  );
  return (
    <div style={{ padding:16, paddingBottom:110 }}>
      <div style={{ fontSize:12.5, color:"var(--ink2)", marginBottom:12, lineHeight:1.5 }}>Dividí la obra por <b>zonas o sectores</b> (Zona A, Zona B, Venta, Almacén, Fachada…). Cada zona tiene su estado, avance y observaciones. Útil cuando se libera por etapas.</div>
      <button onClick={() => setEd(blankZona())} className="btn" style={{ background:"linear-gradient(135deg, var(--accent), #ff8855)", color:"#fff", padding:13, width:"100%", marginBottom:12 }}><Plus size={16} style={{verticalAlign:-3}} /> Nueva zona</button>
      {!zonas.length && <div style={{ textAlign:"center", color:"var(--ink3)", marginTop:30, fontSize:13.5, lineHeight:1.6 }}>Sin zonas configuradas.<br />Ejemplos típicos:<br /><span className="mono" style={{ color:"var(--ink2)" }}>Zona A · Zona B · Venta · Almacén · Fachada · Baño</span></div>}
      {zonas.map(z => {
        const col = ZONA_ESTADO_COL[z.estado] || "var(--ink2)";
        const historial = obsPorZona[z.id] || [];
        return (
          <div key={z.id} className="card" style={{ padding:14, marginBottom:10, borderLeft:`4px solid ${col}` }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 }}>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:5 }}>
                  <span className="disp" style={{ fontSize:16 }}>{z.nombre}</span>
                  <span className="chip" style={{ background:`${col}22`, color: col, border:`1px solid ${col}55` }}>{z.estado}</span>
                </div>
                {z.responsable && <div style={{ fontSize:12, color:"var(--ink3)", marginBottom:3 }}>Resp: {z.responsable}</div>}
                <div className="mono" style={{ fontSize:11, color:"var(--ink3)" }}>Inicio: {z.fechaInicio || "—"} · Liberación: {z.fechaLiberacion || "—"}</div>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                <button onClick={() => setEd(z)} className="btn" style={{ background:"var(--surface3)", color:"var(--ink2)", padding:7, borderRadius:7 }}><Settings size={13} /></button>
                <button onClick={() => del(z.id)} className="btn" style={{ background:"transparent", padding:7 }}><Trash2 size={13} color="var(--rojo)" /></button>
              </div>
            </div>
            <div style={{ marginTop:9 }}>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:11.5, color:"var(--ink2)", marginBottom:4 }}>
                <span>Avance</span><span className="mono" style={{ fontWeight:700, color: col }}>{z.avance}%</span>
              </div>
              <div style={{ height:5, background:"var(--surface3)", borderRadius:99 }}>
                <div style={{ width: z.avance+"%", height:"100%", background: col, borderRadius:99, boxShadow:`0 0 8px ${col}66` }} />
              </div>
            </div>
            {z.observaciones && <div style={{ marginTop:10, padding:9, background:"var(--surface)", border:"1px solid var(--border-soft)", borderRadius:8, fontSize:12.5, lineHeight:1.5, color:"var(--ink2)" }}>{z.observaciones}</div>}
            {(z.partidas || []).length > 0 && (
              <div style={{ marginTop:10, padding:10, background:"var(--surface)", border:"1px solid var(--border-soft)", borderRadius:8 }}>
                <div className="lbl" style={{ marginBottom:7, color:"var(--accent)" }}>📅 Cronograma de la zona ({z.partidas.length})</div>
                {z.partidas.map((p, i) => {
                  const today = hoy();
                  const atrasada = p.fin && p.fin < today && (p.avance || 0) < 100;
                  const activa = p.inicio && p.fin && p.inicio <= today && p.fin >= today;
                  const colP = atrasada ? "var(--rojo)" : activa ? "var(--cyan)" : (p.avance >= 100 ? "var(--verde)" : "var(--ink3)");
                  return (
                    <div key={p.id} style={{ padding:"6px 0", borderBottom: i < z.partidas.length - 1 ? "1px solid var(--border-soft)" : "none" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:8 }}>
                        <div style={{ fontSize:12.5, color:"var(--ink)", flex:1, minWidth:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{p.partida || "(sin partida)"}</div>
                        <span className="mono" style={{ fontSize:11, color: colP, fontWeight:700 }}>{p.avance || 0}%</span>
                      </div>
                      <div className="mono" style={{ fontSize:10.5, color: colP }}>{p.inicio} → {p.fin}{atrasada ? " · ATRASADA" : activa ? " · ACTIVA" : ""}</div>
                      {p.nota && <div style={{ fontSize:11.5, color:"var(--ink3)", marginTop:2 }}>{p.nota}</div>}
                    </div>
                  );
                })}
              </div>
            )}
            {historial.length > 0 && (
              <div style={{ marginTop:10, padding:10, background:"var(--surface)", border:"1px solid var(--border-soft)", borderRadius:8 }}>
                <div className="lbl" style={{ marginBottom:6, color:"var(--cyan)" }}>📅 Historial de observaciones ({historial.length})</div>
                {historial.slice(0, 5).map((h, i) => (
                  <div key={i} style={{ padding:"5px 0", borderBottom: i < Math.min(historial.length, 5) - 1 ? "1px solid var(--border-soft)" : "none" }}>
                    <div className="mono" style={{ fontSize:10, color:"var(--ink3)" }}>{fmtFecha(h.fecha)}</div>
                    <div style={{ fontSize:12, color:"var(--ink2)", lineHeight:1.4 }}>{h.obs}</div>
                  </div>
                ))}
                {historial.length > 5 && <div style={{ fontSize:11, color:"var(--ink3)", marginTop:4 }}>+{historial.length - 5} entradas más en visitas pasadas</div>}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ============================ VISOR INLINE (PDF/imagen fullscreen) ============================ */
function DocViewer({ open, onClose, data, tipo, nombre }) {
  if (!open || !data) return null;
  const esImg = tipo === "img" || (data.startsWith("data:image"));
  return (
    <div style={{ position:"fixed", inset:0, background:"#000", zIndex:200, display:"flex", flexDirection:"column" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 14px", background:"rgba(10,13,19,.95)", borderBottom:"1px solid var(--border)" }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, color:"var(--ink)", minWidth:0 }}>
          {esImg ? "🖼" : "📄"} <span style={{ fontSize:13, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{nombre || "Documento"}</span>
        </div>
        <div style={{ display:"flex", gap:6 }}>
          <a href={data} download={nombre || "documento"} className="btn" style={{ background:"var(--surface3)", color:"var(--ink)", padding:8, textDecoration:"none" }}><Upload size={15} style={{ transform:"rotate(180deg)" }} /></a>
          <button onClick={onClose} className="btn" style={{ background:"var(--accent)", color:"#fff", padding:8 }}><X size={16} /></button>
        </div>
      </div>
      <div style={{ flex:1, background:"#1a1a1a", display:"flex", alignItems:"center", justifyContent:"center", overflow:"auto" }}>
        {esImg ? (
          <img src={data} alt={nombre} style={{ maxWidth:"100%", maxHeight:"100%", objectFit:"contain" }} />
        ) : (
          <iframe title={nombre || "pdf"} src={data} style={{ width:"100%", height:"100%", border:"none", background:"#fff" }} />
        )}
      </div>
    </div>
  );
}

/* ============================ PLANOS (PDF múltiples por obra) ============================ */
const ESPECIALIDADES_PLANOS = ["Arquitectura","Eléctricas","Sanitarias","Mecánico / A.A.","Mobiliario / Góndolas","LIDERMAN / Seguridad","DCI","Estructuras","Otro"];
function PlanosManager({ obraId, idx=[], loadPlano, save, del }) {
  const [viewing, setViewing] = useState(null);
  const [viewingMeta, setViewingMeta] = useState(null);
  const [filtroEsp, setFiltroEsp] = useState("todas");
  const [meta, setMeta] = useState({ especialidad:"Arquitectura", version:"" });
  const upload = async (e) => {
    const file = e.target.files?.[0]; e.target.value=""; if (!file) return;
    if (file.type !== "application/pdf") return alert("Solo PDF.");
    const data = await fileToDataURL(file);
    if (!data) return alert("No se pudo leer el PDF.");
    if (data.length > 4_500_000) return alert("PDF supera ~3.3 MB. Comprimilo o subilo por hoja.");
    save(obraId, { id: uid(), nombre: file.name.replace(/\.pdf$/i,""), fecha: hoy(), especialidad: meta.especialidad, version: meta.version || "REV0", size: Math.round(file.size/1024) }, data);
  };
  const open = async (p) => { const d = await loadPlano(p.id); if (d) { setViewing(d); setViewingMeta(p); } else alert("No se pudo cargar el PDF."); };
  const lista = filtroEsp === "todas" ? idx : idx.filter(p => p.especialidad === filtroEsp);
  const porEsp = {}; lista.forEach(p => { (porEsp[p.especialidad] = porEsp[p.especialidad] || []).push(p); });
  return (
    <div style={{ padding:14 }}>
      <div style={{ fontSize:13, color:"var(--ink2)", marginBottom:10, lineHeight:1.5 }}>Subí los planos de la obra (PDF). Quedan agrupados por especialidad. Tip: si tenés varias revisiones del mismo plano, marcá la versión (REV 26.05, REV 27.05, etc.).</div>
      <Section title="Subir plano" icon={Upload}>
        <div style={{ display:"flex", gap:10 }}>
          <div style={{ flex:2 }}><Field label="Especialidad"><Sel value={meta.especialidad} onChange={e => setMeta({ ...meta, especialidad: e.target.value })} options={ESPECIALIDADES_PLANOS} /></Field></div>
          <div style={{ flex:1 }}><Field label="Versión"><TInput value={meta.version} onChange={e => setMeta({ ...meta, version: e.target.value })} placeholder="REV 28.05" /></Field></div>
        </div>
        <label className="btn" style={{ background:"var(--accent)", color:"#fff", padding:12, width:"100%", display:"block", textAlign:"center" }}><Upload size={15} style={{verticalAlign:-3}} /> Subir PDF<input type="file" accept="application/pdf" onChange={upload} style={{ display:"none" }} /></label>
      </Section>
      <div style={{ display:"flex", gap:5, overflowX:"auto", marginBottom:10, paddingBottom:4 }}>
        <button onClick={() => setFiltroEsp("todas")} className="btn" style={{ padding:"6px 11px", fontSize:12, background: filtroEsp === "todas" ? "var(--accent)" : "var(--paper)", color: filtroEsp === "todas" ? "#fff" : "var(--ink2)", border:"1px solid var(--line)", whiteSpace:"nowrap", flex:"0 0 auto" }}>Todas ({idx.length})</button>
        {ESPECIALIDADES_PLANOS.map(esp => { const n = idx.filter(p => p.especialidad === esp).length; if (!n) return null; return <button key={esp} onClick={() => setFiltroEsp(esp)} className="btn" style={{ padding:"6px 11px", fontSize:12, background: filtroEsp === esp ? "var(--accent)" : "var(--paper)", color: filtroEsp === esp ? "#fff" : "var(--ink2)", border:"1px solid var(--line)", whiteSpace:"nowrap", flex:"0 0 auto" }}>{esp} ({n})</button>; })}
      </div>
      {Object.keys(porEsp).sort().map(esp => (
        <div key={esp} style={{ marginBottom:14 }}>
          <div className="disp" style={{ fontSize:13, color:"var(--accent)", marginBottom:6 }}>{esp}</div>
          {porEsp[esp].sort((a,b) => (b.fecha||"").localeCompare(a.fecha||"")).map(p => (
            <div key={p.id} className="card" style={{ padding:12, marginBottom:6, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ minWidth:0, flex:1 }}>
                <div className="disp" style={{ fontSize:14, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{p.nombre}</div>
                <div className="mono" style={{ fontSize:11, color:"var(--ink2)" }}>{p.version} · {fmtFecha(p.fecha)} · {p.size} KB</div>
              </div>
              <div style={{ display:"flex", gap:5 }}>
                <button className="btn" onClick={() => open(p)} style={{ background:"var(--surface3)", color:"var(--ink)", padding:8 }}><Eye size={15} /></button>
                <button className="btn" onClick={() => { if (confirm("¿Eliminar plano?")) del(obraId, p.id); }} style={{ background:"transparent", padding:8 }}><Trash2 size={15} color="var(--rojo)" /></button>
              </div>
            </div>
          ))}
        </div>
      ))}
      {!idx.length && <div style={{ textAlign:"center", color:"var(--ink2)", marginTop:20 }}>Sin planos cargados.</div>}
      <DocViewer open={!!viewing} onClose={() => { setViewing(null); setViewingMeta(null); }} data={viewing} tipo="pdf" nombre={viewingMeta?.nombre} />
    </div>
  );
}

/* ============================ CRONOGRAMA (Gantt simple) ============================ */
function Cronograma({ obra, obraId, rows, save, cronoDoc, saveCronoDoc, visitas, notas, incidencias, cerebro, apiKey, savePlanDiario }) {
  const [planOut, setPlanOut] = useState("");
  const [planLoad, setPlanLoad] = useState(false);
  const [planTipo, setPlanTipo] = useState("");
  const [turnos, setTurnos] = useState("diurno");
  const [verDoc, setVerDoc] = useState(false);
  const subirCrono = async (e) => {
    const file = e.target.files?.[0]; e.target.value=""; if (!file) return;
    if (file.type === "application/pdf") {
      const data = await fileToDataURL(file);
      if (!data) return alert("No se pudo leer el PDF.");
      if (data.length > 4_500_000) return alert("PDF supera ~3.3 MB. Comprimilo o subí solo la hoja del cronograma.");
      saveCronoDoc(obraId, { id: uid(), nombre: file.name, fecha: hoy(), tipo:"pdf", data });
    } else if (file.type.startsWith("image/")) {
      const data = await compressImage(file, 1800, 0.75);
      if (!data) return alert("No se pudo leer la imagen.");
      saveCronoDoc(obraId, { id: uid(), nombre: file.name, fecha: hoy(), tipo:"img", data });
    } else alert("Subí un PDF o una imagen.");
  };
  const generarPlan = async (tipo) => {
    if (!apiKey) return alert("Activá la IA primero (Ajustes → API key).");
    setPlanLoad(true); setPlanTipo(tipo); setPlanOut("");
    const visObra = visitas.filter(v => v.obraId === obraId).sort((a,b) => b.fecha.localeCompare(a.fecha)).slice(0,5).map(({fotos,...r}) => r);
    const notObra = notas.filter(n => n.obraId === obraId && n.estado === "Pendiente");
    const incObra = incidencias.filter(i => i.obraId === obraId && i.estado === "Abierta");
    const cb = cerebroContexto(cerebro, obra?.nombre + " " + obra?.cliente);
    const turnoTxt = turnos === "ambos" ? "ESTE PROYECTO OPERA EN TURNOS DIURNO Y NOCTURNO. Distribuí actividades según convenga: ruido/polvo/cortes en turno nocturno (centro comercial cerrado), instalación de mobiliario/acabados finos en diurno." : turnos === "nocturno" ? "ESTE PROYECTO OPERA EN TURNO NOCTURNO (mall cerrado)." : "TURNO DIURNO estándar.";
    let prompt = "";
    if (tipo === "dia") {
      const dobleTurno = turnos === "ambos";
      const formato = dobleTurno
        ? `Buenos días equipo.\n\nPlanificación de obra – Doble turno\n\n📅 Fecha: ${fmtFecha(hoy())}\n🏬 Obra: ${obra?.cliente} · ${obra?.nombre}\n\n🔹 TURNO DÍA\n🕖 Horario: 7:00 a.m. – 5:00 p.m.\n\nActividades:\n- [actividad concreta 1]\n- [actividad 2]\n- [...]\n\nResponsables:\n- [nombre]\n\nObjetivo:\n- [meta concreta del turno día]\n\n---\n\n🔹 TURNO NOCHE\n🕖 Horario: 7:00 p.m. – 7:00 a.m.\n\nActividades:\n- [actividad concreta 1]\n- [...]\n\nResponsables:\n- [nombre]\n\nObjetivo:\n- [meta concreta del turno noche]\n\n⚠️ Consideraciones generales:\n- Uso obligatorio de EPP\n- Mantener orden y limpieza\n- Reportar incidencias inmediatamente\n- Verificar iluminación y equipos operativos en turno noche\n- Coordinación permanente\n`
        : `Buenos días equipo.\n\nPlanificación de obra – ${turnos === "nocturno" ? "Turno noche" : "Turno día"}\n\n📅 Fecha: ${fmtFecha(hoy())}\n🏬 Obra: ${obra?.cliente} · ${obra?.nombre}\n🕖 Horario: ${turnos === "nocturno" ? "7:00 p.m. – 7:00 a.m." : "7:00 a.m. – 5:00 p.m."}\n\nActividades:\n- [actividad concreta 1]\n- [actividad 2]\n- [...]\n\nResponsables:\n- [nombre]\n\nObjetivo:\n- [meta concreta del turno]\n\n⚠️ Consideraciones generales:\n- Uso obligatorio de EPP\n- Mantener orden y limpieza\n- Reportar incidencias inmediatamente\n${turnos === "nocturno" ? "- Verificar iluminación y equipos operativos\n" : ""}- Coordinación permanente\n`;
      prompt = `Eres el copiloto de Renzo Moscol (Supervisor de Producción GLD). Generá la PLANIFICACIÓN DEL DÍA para hoy (${fmtFecha(hoy())}) en la obra "${obra?.cliente} · ${obra?.nombre}". ${turnoTxt}\n\nUsá: el cronograma adjunto (si hay), las partidas registradas, lo realizado en visitas anteriores, las notas pendientes, las incidencias abiertas y el conocimiento del cerebro.\n\nDevolveme EL TEXTO COMPLETO listo para enviar al grupo WhatsApp, usando EXACTAMENTE este formato (reemplazá los [placeholders] con actividades, responsables y objetivos REALES, específicos y accionables):\n\n${formato}\n\nReglas:\n- Sé concreto: actividades verificables (no genéricas).\n- Responsables: usá nombres reales del residente/PDR/subcontrata de la obra si los conocés del contexto. Si no, dejá "[Residente]" o "[PDR]".\n- Si una partida está atrasada o tiene restricciones, priorizala.\n- No agregues texto fuera del formato.\n`;
    }
    else prompt = `Eres el copiloto de Renzo Moscol (Supervisor de Producción GLD). Generá la PROGRAMACIÓN SEMANAL para la obra "${obra?.cliente} · ${obra?.nombre}" del lunes próximo en adelante (7 días). ${turnoTxt}\n\nUsá: el cronograma adjunto (si hay), las partidas registradas, avances de las visitas, notas pendientes, incidencias abiertas, y el conocimiento del cerebro.\n\nFormato:\n\n📅 PROGRAMACIÓN SEMANAL — ${obra?.nombre}\nSemana del [fecha inicio al fecha fin]\n\nLUN [fecha]:\n  Diurno: …\n  Nocturno: … (si aplica)\nMAR [fecha]: …\nMIÉ [fecha]: …\nJUE [fecha]: …\nVIE [fecha]: …\nSÁB [fecha]: …\n\n🎯 Hitos clave de la semana:\n[…]\n\n⚠ Riesgos / restricciones a liberar:\n[…]\n\n📦 Recursos críticos:\n[…]\n`;
    const ctxData = `\n\nDATOS:\nCronograma partidas: ${JSON.stringify(rows)}\nÚltimas visitas: ${JSON.stringify(visObra)}\nNotas pendientes: ${JSON.stringify(notObra)}\nIncidencias abiertas: ${JSON.stringify(incObra)}\nObra info: ${JSON.stringify({ etapa: obra?.etapa, apertura: obra?.fechaApertura, dias_a_apertura: diasPara(obra?.fechaApertura) })}${cb ? "\nCEREBRO:\n"+cb : ""}`;
    const content = [];
    if (cronoDoc?.data) {
      if (cronoDoc.tipo === "pdf") content.push({ type:"document", source:{ type:"base64", media_type:"application/pdf", data: dataURLtoBase64(cronoDoc.data) } });
      else content.push({ type:"image", source:{ type:"base64", media_type: dataURLmime(cronoDoc.data), data: dataURLtoBase64(cronoDoc.data) } });
    }
    content.push({ type:"text", text: prompt + ctxData });
    const t = await askClaude([{ role:"user", content }], apiKey, 2000);
    setPlanOut(t); setPlanLoad(false);
  };
  const add = () => save(obraId, [...rows, { id: uid(), partida:"", inicio: hoy(), fin: hoy(), avance:0, resp:"" }]);
  const loadTpl = () => { const base = obra?.fechaInicio || hoy(); if (rows.length && !confirm("¿Reemplazar el cronograma actual con la plantilla de 15 días?")) return; save(obraId, CRONO_TEMPLATE.map(t => ({ id: uid(), partida: t.p, inicio: addDays(base, t.di - 1), fin: addDays(base, t.df - 1), avance: 0, resp: "" }))); };
  const setRow = (id, k, v) => save(obraId, rows.map(r => r.id === id ? { ...r, [k]: v } : r));
  const valid = rows.filter(r => r.inicio && r.fin);
  const min = valid.length ? valid.reduce((a, r) => r.inicio < a ? r.inicio : a, valid[0].inicio) : hoy();
  const max = valid.length ? valid.reduce((a, r) => r.fin > a ? r.fin : a, valid[0].fin) : hoy();
  const span = Math.max(1, (new Date(max) - new Date(min)) / 86400000);
  const pos = (d) => Math.max(0, Math.min(100, (new Date(d) - new Date(min)) / 86400000 / span * 100));
  const hoyPos = pos(hoy());
  const estado = (r) => { const tot = (new Date(r.fin) - new Date(r.inicio)) / 86400000 || 1; const trans = (new Date(hoy()) - new Date(r.inicio)) / 86400000; const esp = Math.max(0, Math.min(100, trans / tot * 100)); return (+r.avance || 0) < esp - 15 ? "var(--rojo)" : "var(--verde)"; };
  return (
    <div style={{ padding:14 }}>
      <DocViewer open={verDoc} onClose={() => setVerDoc(false)} data={cronoDoc?.data} tipo={cronoDoc?.tipo} nombre={cronoDoc?.nombre} />
      <Section title="Cronograma adjunto (PDF / imagen)" icon={Upload}>
        <div style={{ fontSize:12.5, color:"var(--ink2)", marginBottom:8, lineHeight:1.45 }}>Subí el cronograma oficial de la obra (PDF o foto). La IA lo lee al generar el plan del día o la programación semanal.</div>
        {cronoDoc?.data ? (
          <div className="card" style={{ padding:10, marginBottom:8, background:"var(--concrete)", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div style={{ minWidth:0, flex:1 }}>
              <div className="disp" style={{ fontSize:13 }}>{cronoDoc.tipo === "pdf" ? "📄" : "🖼"} {cronoDoc.nombre}</div>
              <div className="mono" style={{ fontSize:11, color:"var(--ink2)" }}>Subido: {fmtFecha(cronoDoc.fecha)}</div>
            </div>
            <div style={{ display:"flex", gap:5 }}>
              <button className="btn" onClick={() => setVerDoc(true)} style={{ background:"var(--surface3)", color:"var(--ink)", padding:7 }}><Eye size={14} /></button>
              <button className="btn" onClick={() => { if (confirm("¿Quitar cronograma?")) saveCronoDoc(obraId, null); }} style={{ background:"transparent", padding:7 }}><Trash2 size={14} color="var(--rojo)" /></button>
            </div>
          </div>
        ) : null}
        <label className="btn" style={{ background:"var(--accent)", color:"#fff", padding:11, width:"100%", display:"block", textAlign:"center" }}>
          <Upload size={15} style={{verticalAlign:-3}} /> {cronoDoc?.data ? "Reemplazar cronograma" : "Subir cronograma"}
          <input type="file" accept="application/pdf,image/*" onChange={subirCrono} style={{ display:"none" }} />
        </label>
      </Section>
      <Section title="Generar planificación con IA" icon={Sparkles}>
        <Field label="Turno de trabajo">
          <div style={{ display:"flex", gap:5 }}>
            {[["diurno","Diurno"],["nocturno","Nocturno"],["ambos","Ambos (mall)"]].map(([k,l]) => (
              <button key={k} className="btn" onClick={() => setTurnos(k)} style={{ flex:1, padding:8, fontSize:12, background: turnos === k ? "var(--ink)" : "var(--paper)", color: turnos === k ? "#fff" : "var(--ink2)", border:"1px solid var(--line)" }}>{l}</button>
            ))}
          </div>
        </Field>
        <div style={{ display:"flex", gap:8 }}>
          <button className="btn" onClick={() => generarPlan("dia")} disabled={planLoad} style={{ flex:1, background:"var(--ia)", color:"#fff", padding:12, fontSize:13 }}><Sparkles size={14} style={{verticalAlign:-2}} /> {planLoad && planTipo==="dia" ? "Generando…" : "Plan del día"}</button>
          <button className="btn" onClick={() => generarPlan("semana")} disabled={planLoad} style={{ flex:1, background:"var(--ia)", color:"#fff", padding:12, fontSize:13 }}><Sparkles size={14} style={{verticalAlign:-2}} /> {planLoad && planTipo==="semana" ? "Generando…" : "Plan semanal (viernes)"}</button>
        </div>
        {planOut && (
          <div className="card" style={{ padding:12, marginTop:10, background:"rgba(95,61,196,.05)", borderColor:"var(--ia)" }}>
            <pre className="mono" style={{ whiteSpace:"pre-wrap", fontSize:12.5, margin:0, lineHeight:1.55 }}>{planOut}</pre>
            <div style={{ display:"flex", gap:8, marginTop:10 }}>
              <a href={whatsappHref(planOut)} target="_blank" rel="noreferrer" className="btn" style={{ flex:1, background:"#25D366", color:"#fff", padding:10, textAlign:"center", textDecoration:"none", fontSize:13 }}><MessageCircle size={14} style={{verticalAlign:-2}} /> WhatsApp</a>
              <button className="btn" onClick={async () => { const r = await shareOrCopy(planOut); alert(r === "copy" ? "Copiado." : "Listo."); }} style={{ background:"var(--surface3)", color:"var(--ink)", padding:10, fontSize:13 }}><Copy size={14} /></button>
            </div>
            {planTipo === "dia" && savePlanDiario && <button className="btn" onClick={() => { savePlanDiario(obraId, hoy(), planOut); alert("Plan guardado como vigente del día. Ahora podés trackear cumplimiento desde Inicio."); }} style={{ background:"var(--accent)", color:"#fff", padding:11, width:"100%", marginTop:8 }}><CheckCircle2 size={14} style={{verticalAlign:-2}} /> Guardar como plan vigente del día (cumplimiento)</button>}
          </div>
        )}
      </Section>
      {valid.length > 0 && (
        <Section title="Línea de tiempo">
          <div style={{ position:"relative" }}>
            {hoyPos >= 0 && hoyPos <= 100 && <div style={{ position:"absolute", left: hoyPos + "%", top:0, bottom:0, width:2, background:"var(--accent)", zIndex:2 }} />}
            {rows.map(r => (
              <div key={r.id} style={{ marginBottom:9 }}>
                <div style={{ fontSize:12, fontWeight:600, marginBottom:3 }}>{r.partida || "—"}</div>
                <div style={{ position:"relative", height:16, background:"var(--surface2)", color:"var(--ink)", borderRadius:8 }}>
                  <div style={{ position:"absolute", left: pos(r.inicio) + "%", width: Math.max(3, pos(r.fin) - pos(r.inicio)) + "%", height:"100%", background: estado(r), borderRadius:8, opacity:.35 }} />
                  <div style={{ position:"absolute", left: pos(r.inicio) + "%", width: Math.max(2, (pos(r.fin) - pos(r.inicio)) * (+r.avance || 0) / 100) + "%", height:"100%", background: estado(r), borderRadius:8 }} />
                </div>
              </div>
            ))}
          </div>
          <div className="mono" style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"var(--ink2)", marginTop:4 }}>
            <span>{min}</span><span style={{ color:"var(--accent)" }}>hoy</span><span>{max}</span>
          </div>
        </Section>
      )}
      {rows.map(r => (
        <div key={r.id} className="card" style={{ padding:12, marginBottom:8 }}>
          <div style={{ display:"flex", gap:8, marginBottom:8 }}>
            <input className="inp" placeholder="Partida" value={r.partida} list="plc" onChange={e => setRow(r.id, "partida", e.target.value)} />
            <button className="btn" onClick={() => save(obraId, rows.filter(x => x.id !== r.id))} style={{ background:"transparent", padding:6 }}><Trash2 size={18} color="var(--rojo)" /></button>
          </div>
          <div style={{ display:"flex", gap:8, marginBottom:8 }}>
            <div style={{ flex:1 }}><label className="lbl">Inicio</label><TInput type="date" value={r.inicio} onChange={e => setRow(r.id, "inicio", e.target.value)} /></div>
            <div style={{ flex:1 }}><label className="lbl">Fin</label><TInput type="date" value={r.fin} onChange={e => setRow(r.id, "fin", e.target.value)} /></div>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <div style={{ flex:1 }}><label className="lbl">% Avance</label><TInput type="number" value={r.avance} onChange={e => setRow(r.id, "avance", e.target.value)} /></div>
            <div style={{ flex:2 }}><label className="lbl">Responsable</label><TInput value={r.resp} onChange={e => setRow(r.id, "resp", e.target.value)} /></div>
          </div>
        </div>
      ))}
      <datalist id="plc">{PARTIDAS.map(p => <option key={p} value={p} />)}</datalist>
      <button className="btn" onClick={loadTpl} style={{ background:"var(--ia)", color:"#fff", padding:12, width:"100%", marginBottom:8 }}><CalendarClock size={15} style={{verticalAlign:-2}} /> Cargar plantilla 15 días</button>
      <button className="btn" onClick={add} style={{ background:"var(--surface3)", color:"var(--ink)", padding:12, width:"100%" }}><Plus size={15} style={{verticalAlign:-2}} /> Agregar partida</button>
    </div>
  );
}

/* ============================ CALIDAD POR PARTIDA ============================ */
function CalidadList({ obraId, items, save }) {
  const data = items || PARTIDAS.map(p => ({ partida: p, estado:"Pendiente", nota:"", responsable:"" }));
  const setItem = (i, k, v) => save(obraId, data.map((x, idx) => idx === i ? { ...x, [k]: v } : x));
  const estados = ["Pendiente","Conforme","Observado","No aplica"];
  const col = (e) => e === "Conforme" ? "var(--verde)" : e === "Observado" ? "var(--rojo)" : e === "No aplica" ? "var(--ink2)" : "var(--line)";
  return (
    <div style={{ padding:14 }}>
      {data.map((it, i) => (
        <div key={it.partida + i} className="card" style={{ padding:12, marginBottom:8, borderLeft:`4px solid ${col(it.estado)}` }}>
          <div className="disp" style={{ fontSize:14, marginBottom:8 }}>{it.partida}</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:8 }}>
            {estados.map(e => (
              <button key={e} className="btn" onClick={() => setItem(i, "estado", e)} style={{ flex:"1 0 45%", padding:"8px 0", fontSize:13, background: it.estado === e ? col(e) : "var(--paper)", color: it.estado === e ? "#fff" : "var(--ink2)", border:`1.5px solid ${col(e)}` }}>{e}</button>
            ))}
          </div>
          <input className="inp" style={{ marginBottom:6 }} placeholder="Responsable" value={it.responsable} onChange={e => setItem(i, "responsable", e.target.value)} />
          {it.estado === "Observado" && <TArea placeholder="Observación" value={it.nota} onChange={e => setItem(i, "nota", e.target.value)} rows={2} />}
        </div>
      ))}
    </div>
  );
}

/* ============================ LOOK-AHEAD (Last Planner) ============================ */
function PlanList({ obraId, rows, save }) {
  const add = () => save(obraId, [...rows, { id: uid(), partida:"", resp:"", restriccion:"", restEstado:"Pendiente", restFecha:"", plan:0, real:0 }]);
  const set = (id, k, v) => save(obraId, rows.map(r => r.id === id ? { ...r, [k]: v } : r));
  const rc = (e) => e === "Liberada" ? "var(--verde)" : e === "En riesgo" ? "var(--rojo)" : "var(--ambar)";
  return (
    <div style={{ padding:14 }}>
      <div className="mono" style={{ fontSize:12, color:"var(--ink2)", marginBottom:10 }}>Real atrasado &gt;15% del plan → rojo.</div>
      {rows.map(r => { const gap = (+r.plan || 0) - (+r.real || 0); const atr = gap > 15; return (
        <div key={r.id} className="card" style={{ padding:12, marginBottom:8, borderLeft:`4px solid ${atr ? "var(--rojo)" : "var(--verde)"}` }}>
          <div style={{ display:"flex", gap:8, marginBottom:8 }}>
            <input className="inp" placeholder="Partida" value={r.partida} list="plp" onChange={e => set(r.id, "partida", e.target.value)} />
            <button className="btn" onClick={() => save(obraId, rows.filter(x => x.id !== r.id))} style={{ background:"transparent", padding:6 }}><Trash2 size={18} color="var(--rojo)" /></button>
          </div>
          <input className="inp" style={{ marginBottom:8 }} placeholder="Responsable / cuadrilla" value={r.resp} onChange={e => set(r.id, "resp", e.target.value)} />
          <div style={{ display:"flex", gap:8, marginBottom:8 }}>
            <div style={{ flex:1 }}><label className="lbl">% Plan</label><TInput type="number" value={r.plan} onChange={e => set(r.id, "plan", e.target.value)} /></div>
            <div style={{ flex:1 }}><label className="lbl">% Real</label><TInput type="number" value={r.real} onChange={e => set(r.id, "real", e.target.value)} /></div>
            {atr && <span className="chip" style={{ background:"var(--rojo)", color:"#fff", alignSelf:"flex-end", marginBottom:11 }}>−{gap}%</span>}
          </div>
          <input className="inp" style={{ marginBottom:8 }} placeholder="Restricción / condición previa" value={r.restriccion} onChange={e => set(r.id, "restriccion", e.target.value)} />
          <div style={{ display:"flex", gap:8 }}>
            <div style={{ flex:1 }}><Sel value={r.restEstado} onChange={e => set(r.id, "restEstado", e.target.value)} options={["Pendiente","En riesgo","Liberada"]} /></div>
            <div style={{ flex:1 }}><TInput type="date" value={r.restFecha} onChange={e => set(r.id, "restFecha", e.target.value)} /></div>
          </div>
          <div style={{ marginTop:6 }}><span className="chip" style={{ background: rc(r.restEstado), color:"#fff" }}>{r.restEstado}</span></div>
        </div>
      ); })}
      <datalist id="plp">{PARTIDAS.map(p => <option key={p} value={p} />)}</datalist>
      <button className="btn" onClick={add} style={{ background:"var(--surface3)", color:"var(--ink)", padding:12, width:"100%" }}><Plus size={15} style={{verticalAlign:-2}} /> Agregar partida</button>
    </div>
  );
}

/* ============================ PUNTO DE PARTIDA (línea base) ============================ */
const blankPartida = () => ({ fecha: hoy(), estadoLocal:"", areaTotal:"", intervencion:"", preexistentes:"", medidas:[], planosRev:[], controlPoints:[], fotos:[], notas:"" });
function PartidaScreen({ obra, data, save, saveCrono }) {
  const [d, setD] = useState(data || blankPartida());
  useEffect(() => { setD(data || blankPartida()); }, [obra?.id, data]);
  if (!obra) return null;
  const persist = (nd) => { setD(nd); save(obra.id, nd); };
  const setF = (k, v) => setD(s => ({ ...s, [k]: v }));
  const addRow = (k, row) => persist({ ...d, [k]: [...d[k], { id: uid(), ...row }] });
  const setRow = (k, id, patch) => persist({ ...d, [k]: d[k].map(r => r.id === id ? { ...r, ...patch } : r) });
  const delRow = (k, id) => persist({ ...d, [k]: d[k].filter(r => r.id !== id) });
  const addFotos = async (e) => { const files = Array.from(e.target.files || []); const nv = []; for (const file of files.slice(0,6)) { const img = await compressImage(file); if (img) nv.push({ id: uid(), data: img, cap:"" }); } persist({ ...d, fotos: [...d.fotos, ...nv].slice(0,10) }); e.target.value=""; };
  const cargarCrono = () => { const base = obra.fechaInicio || hoy(); if (!confirm("¿Cargar el cronograma base de 15 días en la pestaña Cronograma?")) return; saveCrono(obra.id, CRONO_TEMPLATE.map(t => ({ id: uid(), partida: t.p, inicio: addDays(base, t.di - 1), fin: addDays(base, t.df - 1), avance: 0, resp: "" }))); alert("Cronograma base cargado."); };
  return (
    <div style={{ padding:14 }}>
      <div style={{ fontSize:13, color:"var(--ink2)", marginBottom:10, lineHeight:1.5 }}>Línea base de la obra: estado al recibir, medidas, alcance, y los <b>puntos de control</b> que aparecerán en cada visita.</div>
      <Section title="Levantamiento inicial" icon={Flag}>
        <div style={{ display:"flex", gap:10 }}>
          <div style={{ flex:1 }}><Field label="Fecha"><TInput type="date" value={d.fecha} onChange={e => setF("fecha", e.target.value)} onBlur={() => persist(d)} /></Field></div>
          <div style={{ flex:1 }}><Field label="Área (m²)"><TInput type="number" value={d.areaTotal} onChange={e => setF("areaTotal", e.target.value)} onBlur={() => persist(d)} /></Field></div>
        </div>
        <Field label="Estado del local recibido"><TArea value={d.estadoLocal} onChange={e => setF("estadoLocal", e.target.value)} onBlur={() => persist(d)} rows={2} /></Field>
        <Field label="Alcance de intervención"><TArea value={d.intervencion} onChange={e => setF("intervencion", e.target.value)} onBlur={() => persist(d)} /></Field>
        <Field label="Condiciones / vicios preexistentes"><TArea placeholder="Daños o condiciones previas (deslinde de responsabilidad)" value={d.preexistentes} onChange={e => setF("preexistentes", e.target.value)} onBlur={() => persist(d)} rows={2} /></Field>
      </Section>
      <Section title="Medidas (plano vs. real)" icon={Ruler}>
        {d.medidas.map(m => (
          <div key={m.id} style={{ border:"1px solid var(--line)", borderRadius:10, padding:10, marginBottom:8 }}>
            <div style={{ display:"flex", gap:8, marginBottom:8 }}><input className="inp" placeholder="Ambiente / elemento" value={m.elem} onChange={e => setRow("medidas", m.id, { elem: e.target.value })} /><button className="btn" onClick={() => delRow("medidas", m.id)} style={{ background:"transparent", padding:6 }}><Trash2 size={18} color="var(--rojo)" /></button></div>
            <div style={{ display:"flex", gap:8 }}>
              <div style={{ flex:1 }}><label className="lbl">Plano</label><TInput value={m.plano} onChange={e => setRow("medidas", m.id, { plano: e.target.value })} /></div>
              <div style={{ flex:1 }}><label className="lbl">Real</label><TInput value={m.real} onChange={e => setRow("medidas", m.id, { real: e.target.value })} /></div>
            </div>
            <input className="inp" style={{ marginTop:8 }} placeholder="Observación" value={m.obs} onChange={e => setRow("medidas", m.id, { obs: e.target.value })} />
          </div>
        ))}
        <button className="btn" onClick={() => addRow("medidas", { elem:"", plano:"", real:"", obs:"" })} style={{ background:"var(--surface3)", color:"var(--ink)", padding:9, width:"100%" }}><Plus size={15} style={{verticalAlign:-2}} /> Agregar medida</button>
      </Section>
      <Section title="Puntos a controlar en cada visita" icon={ListChecks}>
        <div className="mono" style={{ fontSize:12, color:"var(--ink2)", marginBottom:8 }}>Aparecerán en cada visita como checklist.</div>
        {d.controlPoints.map(c => (
          <div key={c.id} style={{ display:"flex", gap:8, marginBottom:8 }}>
            <input className="inp" placeholder="Punto de control" value={c.txt} onChange={e => setRow("controlPoints", c.id, { txt: e.target.value })} />
            <button className="btn" onClick={() => delRow("controlPoints", c.id)} style={{ background:"transparent", padding:6 }}><Trash2 size={18} color="var(--rojo)" /></button>
          </div>
        ))}
        <button className="btn" onClick={() => addRow("controlPoints", { txt:"" })} style={{ background:"var(--surface3)", color:"var(--ink)", padding:9, width:"100%" }}><Plus size={15} style={{verticalAlign:-2}} /> Agregar punto de control</button>
      </Section>
      <Section title="Fotos del estado inicial" icon={Camera}>
        <div style={{ display:"flex", gap:6 }}>
          <label className="btn" style={{ flex:1, background:"linear-gradient(135deg, var(--accent), #ff8855)", color:"#fff", padding:10, textAlign:"center", fontWeight:600, fontSize:13 }}><Camera size={15} style={{verticalAlign:-3}} /> Tomar foto<input type="file" accept="image/*" capture="environment" multiple onChange={addFotos} style={{ display:"none" }} /></label>
          <label className="btn" style={{ flex:1, background:"var(--surface3)", color:"var(--ink)", padding:10, textAlign:"center", fontSize:13 }}><Upload size={14} style={{verticalAlign:-3}} /> Galería<input type="file" accept="image/*" multiple onChange={addFotos} style={{ display:"none" }} /></label>
        </div>
        {d.fotos.length > 0 && (
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginTop:10 }}>
            {d.fotos.map(p => (
              <div key={p.id} style={{ position:"relative" }}>
                <img src={p.data} alt="" style={{ width:"100%", height:100, objectFit:"cover", borderRadius:8 }} />
                <button onClick={() => persist({ ...d, fotos: d.fotos.filter(x => x.id !== p.id) })} style={{ position:"absolute", top:4, right:4, background:"rgba(0,0,0,.6)", border:"none", borderRadius:999, padding:3, cursor:"pointer" }}><X size={14} color="#fff" /></button>
              </div>
            ))}
          </div>
        )}
      </Section>
    </div>
  );
}

/* ============================ ENTREGA ARUMA (checklist + filtro bloqueante) ============================ */
const blankEntrega = () => ({ meta:{ fechaEntrega: hoy(), contrataGeneral:"", empresaAACC:"", empresaElectrica:"", respRecepcion:"", administrador:"", zonal:"" }, items:{}, estado:"En proceso" });
function EntregaScreen({ obra, data, save, cerebro=[], apiKey, zonasObra=[] }) {
  const [d, setD] = useState(data || blankEntrega());
  const [openSec, setOpenSec] = useState("Filtro de entrega (bloqueante)");
  const [informe, setInforme] = useState({ open:false, texto:"", load:false });
  // ZONA seleccionada: "general" = entrega global, "z:<id>" = entrega de esa zona
  const [zonaSel, setZonaSel] = useState("general");
  useEffect(() => { setD(data || blankEntrega()); }, [obra?.id, data]);
  if (!obra) return null;
  const persist = (nd) => { setD(nd); save(obra.id, nd); };
  const setMeta = (k, v) => setD(s => ({ ...s, meta: { ...s.meta, [k]: v } }));
  // Items prefix: si hay zona seleccionada, los items se guardan con prefijo "z:<id>:"
  const itemPrefix = zonaSel === "general" ? "" : zonaSel + ":";
  const setItem = (key, patch) => persist({ ...d, items: { ...d.items, [itemPrefix+key]: { estado:"Pendiente", obs:"", fotos:[], ...d.items[itemPrefix+key], ...patch } } });
  const getItem = (key) => d.items[itemPrefix+key] || {};
  const addFotoItem = async (key, e) => {
    const files = Array.from(e.target.files || []); e.target.value = "";
    const nv = [];
    for (const file of files.slice(0,3)) { const img = await compressImage(file, 1100, 0.55); if (img) nv.push({ id: uid(), data: img }); }
    const cur = getItem(key).fotos || [];
    setItem(key, { fotos: [...cur, ...nv].slice(0, 5) });
  };
  const stCol = (e) => e === "Conforme" ? "var(--verde)" : e === "No conforme" ? "var(--rojo)" : e === "No aplica" ? "var(--ink2)" : "var(--surface3)";

  // Dossier solo se evalúa cuando la obra está al 100% global (todos los demás items conformes/NA)
  const esDossier = (sec) => sec.toLowerCase().startsWith("dossier");
  // Si estamos en zona específica: ocultar Dossier
  const SECS_VISIBLES = zonaSel !== "general" ? ENTREGA_SECS.filter(s => !esDossier(s)) : ENTREGA_SECS;

  // Conteos del SCOPE actual (zona o general)
  let conf=0, noc=0, pend=0, na=0; const blockers=[];
  SECS_VISIBLES.forEach(sec => ENTREGA[sec].forEach((it, i) => { const st = getItem(sec+"#"+i).estado || "Pendiente"; if (st==="Conforme") conf++; else if (st==="No conforme") noc++; else if (st==="No aplica") na++; else pend++; if (sec.startsWith("Filtro") && st==="No conforme") blockers.push(it); }));
  const bloqueado = blockers.length > 0;
  const totalScope = SECS_VISIBLES.reduce((a, sec) => a + ENTREGA[sec].length, 0);
  const pctScope = totalScope ? Math.round(((conf + na) / totalScope) * 100) : 0;

  // Para evaluar si la obra está al 100% (incluye TODAS las zonas + general, excluyendo dossier)
  const obraCompleta100 = (() => {
    const scopes = ["", ...zonasObra.map(z => "z:"+z.id+":")];
    for (const sc of scopes) {
      for (const sec of ENTREGA_SECS) {
        if (esDossier(sec)) continue;
        for (let i=0; i<ENTREGA[sec].length; i++) {
          const st = (d.items[sc+sec+"#"+i]||{}).estado;
          if (st !== "Conforme" && st !== "No aplica") return false;
        }
      }
    }
    return true;
  })();

  // Observaciones consolidadas del SCOPE actual
  const observaciones = [];
  SECS_VISIBLES.forEach(sec => ENTREGA[sec].forEach((it, i) => {
    const r = getItem(sec+"#"+i);
    if (r?.estado === "No conforme") observaciones.push({ sec, item: it, obs: r.obs || "", fotos: r.fotos || [] });
  }));

  const generarInforme = async () => {
    if (!observaciones.length) return alert("No hay observaciones (ítems 'No conforme') para reportar.");
    if (!apiKey) {
      // Sin IA, generar texto crudo
      const L = ["INFORME DE OBSERVACIONES — ENTREGA", `Obra: ${obra?.cliente} · ${obra?.nombre}`, `Fecha entrega: ${d.meta.fechaEntrega}`, `Total observaciones: ${observaciones.length}`, ""];
      observaciones.forEach((o, i) => { L.push(`${i+1}. [${o.sec}] ${o.item}`); if (o.obs) L.push(`   Observación: ${o.obs}`); if (o.fotos.length) L.push(`   📷 ${o.fotos.length} foto(s)`); L.push(""); });
      setInforme({ open:true, texto: L.join("\n"), load:false });
      return;
    }
    setInforme({ open:true, texto:"", load:true });
    const cb = cerebroContexto(cerebro, "entrega aruma observaciones");
    const prompt = `Eres el copiloto técnico de Renzo Moscol (Supervisor de Producción GLD). Generá un INFORME EJECUTIVO DE OBSERVACIONES DE ENTREGA, profesional y completo, expandiendo y redactando técnicamente cada observación que el supervisor anotó breve en obra.

Formato:

INFORME DE OBSERVACIONES — ENTREGA DE TIENDA
Obra: ${obra?.cliente} · ${obra?.nombre}
${obra?.direccion ? "Local: "+obra.direccion+"\n" : ""}Fecha de entrega: ${d.meta.fechaEntrega}
Contrata general: ${d.meta.contrataGeneral || "—"}
Responsable de recepción: ${d.meta.respRecepcion || "—"}
Total de observaciones: ${observaciones.length}
Estado: ${bloqueado ? "⛔ ENTREGA BLOQUEADA (filtro no cumplido)" : (pend > 0 ? "⚠ En revisión" : "✓ Conforme al filtro")}

1. RESUMEN EJECUTIVO
[2-3 líneas: panorama general del estado de entrega, severidad de las observaciones, criticidad respecto a la fecha de apertura]

2. OBSERVACIONES BLOQUEANTES (Filtro de entrega)
[listá las observaciones de la sección "Filtro de entrega" si las hay, expandidas. Si no hay, indicalo claramente]

3. OBSERVACIONES POR SECCIÓN
[por cada sección con observaciones, listalas numeradas. Por cada una:
   a. Ítem afectado
   b. Observación expandida y técnica (tomá la nota breve del supervisor y desarrollala)
   c. Causa probable
   d. Acción correctiva sugerida
   e. Responsable sugerido
   f. Prioridad (Alta/Media/Baja)
]

4. ACCIONES INMEDIATAS RECOMENDADAS
[3-5 acciones priorizadas para destrabar la entrega]

5. CONCLUSIÓN
[cierre ejecutivo: ¿se puede entregar? ¿cuándo es realista? riesgos]

DATOS:
Observaciones registradas (${observaciones.length}):
${JSON.stringify(observaciones.map(o => ({ seccion: o.sec, item: o.item, obs: o.obs, fotos: o.fotos.length })), null, 2)}

Conteos globales: ${conf} conforme · ${noc} no conforme · ${na} N/A · ${pend} pendiente${cb ? "\n\nCEREBRO:\n"+cb : ""}

Sé técnico, expandí cada observación a frase profesional completa. No agregues texto fuera del formato.`;
    const t = await askClaude([{ role:"user", content: prompt }], apiKey, 3000);
    setInforme({ open:true, texto: t, load:false });
  };

  return (
    <div style={{ padding:14 }}>
      {/* Selector de zona */}
      {zonasObra.length > 0 && (
        <div className="card" style={{ padding:11, marginBottom:10 }}>
          <div className="lbl" style={{ marginBottom:7 }}><Layers size={11} style={{verticalAlign:-1, marginRight:4}} color="var(--cyan)" /> Entrega por zona</div>
          <div style={{ display:"flex", gap:5, overflowX:"auto", paddingBottom:4 }}>
            <button onClick={() => setZonaSel("general")} className="btn" style={{ flex:"0 0 auto", padding:"7px 12px", fontSize:12.5, background: zonaSel === "general" ? "var(--accent)" : "var(--surface)", color: zonaSel === "general" ? "#fff" : "var(--ink2)", border:`1px solid ${zonaSel === "general" ? "var(--accent)" : "var(--border)"}`, whiteSpace:"nowrap" }}>General / Obra completa</button>
            {zonasObra.map(z => (
              <button key={z.id} onClick={() => setZonaSel("z:"+z.id)} className="btn" style={{ flex:"0 0 auto", padding:"7px 12px", fontSize:12.5, background: zonaSel === "z:"+z.id ? "var(--accent)" : "var(--surface)", color: zonaSel === "z:"+z.id ? "#fff" : "var(--ink2)", border:`1px solid ${zonaSel === "z:"+z.id ? "var(--accent)" : "var(--border)"}`, whiteSpace:"nowrap" }}>{z.nombre}</button>
            ))}
          </div>
          {zonaSel !== "general" && <div style={{ fontSize:11, color:"var(--ink3)", marginTop:7, lineHeight:1.4 }}>📌 Entregando <b>{zonasObra.find(z => "z:"+z.id === zonaSel)?.nombre}</b>. El <b>Dossier</b> se oculta — solo aparece en "General" y cuando toda la obra está al 100%.</div>}
        </div>
      )}

      <div className="card" style={{ padding:13, marginBottom:10, borderLeft:`4px solid ${bloqueado ? "var(--rojo)" : pend ? "var(--ambar)" : "var(--verde)"}` }}>
        <div className="disp" style={{ fontSize:14, marginBottom:5, color:"var(--ink)" }}>
          {zonaSel !== "general" && <span className="chip" style={{ background:"var(--cyan)", color:"#0a0d13", marginRight:6 }}>{zonasObra.find(z => "z:"+z.id === zonaSel)?.nombre}</span>}
          {bloqueado ? "⛔ Entrega bloqueada" : pend ? "En revisión" : "✓ Filtro cumplido"}
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <span className="mono" style={{ fontSize:12, color:"var(--ink2)" }}>{conf} conf · {noc} no conf · {na} N/A · {pend} pend.</span>
          <span className="mono" style={{ fontSize:13, fontWeight:700, color: pctScope === 100 ? "var(--verde)" : pctScope > 80 ? "var(--ambar)" : "var(--ink2)" }}>{pctScope}%</span>
        </div>
        <div style={{ height:4, background:"var(--surface3)", borderRadius:99, marginTop:7 }}>
          <div style={{ width: pctScope+"%", height:"100%", background: pctScope === 100 ? "var(--verde)" : pctScope > 80 ? "var(--ambar)" : "var(--accent)", borderRadius:99 }} />
        </div>
      </div>
      <Section title="Datos de la entrega" icon={PackageCheck}>
        <Field label="Fecha de entrega"><TInput type="date" value={d.meta.fechaEntrega} onChange={e => setMeta("fechaEntrega", e.target.value)} onBlur={() => persist(d)} /></Field>
        <Field label="Contrata general"><TInput value={d.meta.contrataGeneral} onChange={e => setMeta("contrataGeneral", e.target.value)} onBlur={() => persist(d)} placeholder="RAD 415" /></Field>
        <Field label="Responsable de recepción (OP)"><TInput value={d.meta.respRecepcion} onChange={e => setMeta("respRecepcion", e.target.value)} onBlur={() => persist(d)} /></Field>
        <div style={{ display:"flex", gap:10 }}>
          <div style={{ flex:1 }}><Field label="Administrador"><TInput value={d.meta.administrador} onChange={e => setMeta("administrador", e.target.value)} onBlur={() => persist(d)} /></Field></div>
          <div style={{ flex:1 }}><Field label="Zonal"><TInput value={d.meta.zonal} onChange={e => setMeta("zonal", e.target.value)} onBlur={() => persist(d)} /></Field></div>
        </div>
      </Section>

      {observaciones.length > 0 && (
        <div className="card" style={{ padding:14, marginBottom:12, background:"linear-gradient(135deg, rgba(244,63,94,.06), rgba(255,107,53,.04))", border:"1px solid var(--rojo)" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
            <div className="lbl" style={{ marginBottom:0, color:"var(--rojo)" }}>📋 {observaciones.length} observaciones registradas</div>
          </div>
          <button onClick={generarInforme} className="btn" style={{ background:"linear-gradient(135deg, var(--ia), #c4b5fd)", color:"#fff", padding:13, width:"100%", boxShadow:"0 4px 16px -4px var(--ia-glow)" }}><Sparkles size={15} style={{verticalAlign:-3}} /> Generar informe de observaciones {apiKey ? "(IA)" : "(básico)"}</button>
        </div>
      )}

      {SECS_VISIBLES.map(sec => { const items = ENTREGA[sec]; const done = items.filter((_, i) => { const s = getItem(sec+"#"+i).estado; return s && s !== "Pendiente"; }).length; const open = openSec === sec; const isFiltro = sec.startsWith("Filtro"); const isDoss = esDossier(sec); const obsSec = items.filter((_, i) => getItem(sec+"#"+i).estado === "No conforme").length; const dossierBloqueado = isDoss && !obraCompleta100; return (
        <div key={sec} className="card" style={{ marginBottom:8, overflow:"hidden", border: isFiltro ? "1.5px solid var(--rojo)" : isDoss ? "1.5px solid var(--cyan)" : "1px solid var(--border)", opacity: dossierBloqueado ? .6 : 1 }}>
          <button className="btn" onClick={() => { if (dossierBloqueado) return alert("Dossier solo se evalúa cuando la obra esté al 100% (todas las zonas + general conformes/N.A., excepto dossier mismo)."); setOpenSec(open ? "" : sec); }} style={{ width:"100%", background: isFiltro ? "rgba(244,63,94,.06)" : isDoss ? "rgba(34,211,238,.06)" : "var(--surface)", color:"var(--ink)", padding:12, display:"flex", justifyContent:"space-between", alignItems:"center", borderRadius:0 }}>
            <span className="disp" style={{ fontSize:14, textAlign:"left" }}>{isFiltro && <ShieldCheck size={14} color="var(--rojo)" style={{verticalAlign:-2, marginRight:4}} />}{isDoss && <PackageCheck size={14} color="var(--cyan)" style={{verticalAlign:-2, marginRight:4}} />}{sec}{dossierBloqueado && <span className="chip" style={{ background:"var(--ink3)", color:"var(--ink)", fontSize:9.5, marginLeft:6 }}>🔒 100%</span>}</span>
            <span style={{ display:"flex", alignItems:"center", gap:6 }}>
              {obsSec > 0 && <span className="chip" style={{ background:"var(--rojo)", color:"#fff", fontSize:10 }}>{obsSec} obs</span>}
              <span className="mono" style={{ fontSize:11, color:"var(--ink2)" }}>{done}/{items.length}</span>
              {open ? <ChevronDown size={16} /> : <ChevronRight size={16} />}
            </span>
          </button>
          {open && !dossierBloqueado && (
            <div style={{ padding:12, borderTop:"1px solid var(--border)" }}>
              {items.map((it, i) => { const key = sec+"#"+i; const r = getItem(key); const st = r.estado || "Pendiente"; const fotos = r.fotos || []; return (
                <div key={key} style={{ borderBottom:"1px solid var(--border-soft)", padding:"11px 0" }}>
                  <div style={{ fontSize:13.5, lineHeight:1.4, marginBottom:7 }}>{it}</div>
                  <div style={{ display:"flex", gap:5, marginBottom: st === "No conforme" ? 8 : 0 }}>
                    {["Conforme","No conforme","No aplica"].map(e => (
                      <button key={e} className="btn" onClick={() => setItem(key, { estado: e })} style={{ flex:1, padding:"7px 0", fontSize:12, background: st === e ? stCol(e) : "var(--surface)", color: st === e ? "#fff" : "var(--ink2)", border:`1.5px solid ${stCol(e)}` }}>{e === "No conforme" ? "No conf." : e === "No aplica" ? "N/A" : "Conf."}</button>
                    ))}
                  </div>
                  {st === "No conforme" && (
                    <>
                      <TArea placeholder="Observación / descargo (qué falta, qué está mal)" value={r.obs || ""} onChange={e => setItem(key, { obs: e.target.value })} rows={2} />
                      <div style={{ marginTop:8 }}>
                        <div style={{ display:"flex", gap:6, marginBottom:6 }}>
                          <label className="btn" style={{ flex:1, background:"linear-gradient(135deg, var(--accent), #ff8855)", color:"#fff", padding:"7px 8px", textAlign:"center", fontSize:11.5, fontWeight:600 }}><Camera size={12} style={{verticalAlign:-2}} /> Tomar foto<input type="file" accept="image/*" capture="environment" multiple onChange={e => addFotoItem(key, e)} style={{ display:"none" }} /></label>
                          <label className="btn" style={{ flex:1, background:"var(--surface3)", color:"var(--ink)", padding:"7px 8px", textAlign:"center", fontSize:11.5 }}><Upload size={12} style={{verticalAlign:-2}} /> Galería<input type="file" accept="image/*" multiple onChange={e => addFotoItem(key, e)} style={{ display:"none" }} /></label>
                        </div>
                        {fotos.length > 0 && (
                          <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                            {fotos.map(p => (
                              <div key={p.id} style={{ position:"relative" }}>
                                <img src={p.data} alt="" style={{ width:62, height:62, objectFit:"cover", borderRadius:6, border:"1px solid var(--border)" }} />
                                <button onClick={() => setItem(key, { fotos: fotos.filter(x => x.id !== p.id) })} style={{ position:"absolute", top:-5, right:-5, background:"var(--rojo)", border:"none", borderRadius:99, padding:2, cursor:"pointer" }}><X size={10} color="#fff" /></button>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </>
                  )}
                </div>
              ); })}
            </div>
          )}
        </div>
      ); })}

      <Modal open={informe.open} onClose={() => setInforme({ open:false, texto:"", load:false })} title={`Informe de observaciones — ${obra.nombre}`} maxWidth={620}>
        {informe.load && <div style={{ textAlign:"center", padding:30 }}><span className="dot" /><span className="dot" /><span className="dot" /><div style={{ marginTop:10, fontSize:12, color:"var(--ink2)" }}>Redactando informe ejecutivo con IA…</div></div>}
        {informe.texto && (
          <>
            <div className="card" style={{ padding:13, background:"var(--surface)", marginBottom:12, maxHeight:"50vh", overflowY:"auto" }}>
              <pre className="mono" style={{ whiteSpace:"pre-wrap", fontSize:12.5, margin:0, lineHeight:1.55, color:"var(--ink)" }}>{informe.texto}</pre>
            </div>
            {observaciones.some(o => o.fotos.length) && (
              <div style={{ marginBottom:12 }}>
                <div className="lbl" style={{ marginBottom:7 }}>📷 Fotos de observaciones</div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:6 }}>
                  {observaciones.flatMap(o => o.fotos.map(f => ({ ...f, item: o.item }))).slice(0,12).map((p, i) => (
                    <div key={i}>
                      <img src={p.data} alt="" style={{ width:"100%", height:80, objectFit:"cover", borderRadius:6, border:"1px solid var(--border)" }} />
                      <div style={{ fontSize:9.5, color:"var(--ink3)", marginTop:2, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{p.item}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={async () => { const r = await shareOrCopy(informe.texto); alert(r === "copy" ? "Copiado." : "Listo."); }} className="btn" style={{ flex:1, background:"var(--surface3)", color:"var(--ink)", padding:11 }}><Copy size={14} style={{verticalAlign:-2}} /> Copiar</button>
              <a href={mailtoHref("", `[GLD] Informe de observaciones — ${obra.nombre} — Entrega ${d.meta.fechaEntrega}`, informe.texto)} className="btn" style={{ flex:1, background:"linear-gradient(135deg, var(--accent), #ff8855)", color:"#fff", padding:11, textAlign:"center", textDecoration:"none" }}><Mail size={14} style={{verticalAlign:-2}} /> Enviar</a>
            </div>
          </>
        )}
      </Modal>
    </div>
  );
}

/* ============================ OBRA HUB ============================ */
function ObraHub({ obras, obraId, setObraId, calidad, plan, crono, visitas, saveCal, savePlan, saveCrono, entregas, saveEntrega, partidas, savePartida, incidencias, decisiones, notas, cronoDocs={}, saveCronoDoc, cerebro=[], apiKey, savePlanDiario, onUpdateVisita, planosIdx={}, loadPlano, savePlano, delPlano, zonas={}, saveZonas }) {
